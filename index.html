<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobusMarket</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#050b14;
    color:white;
}

/* INTRO */
#intro {
    height:100vh;
    background:linear-gradient(#021224,#041d2e);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#intro img {
    width:260px;
    margin-bottom:20px;
}

.btn {
    padding:14px;
    width:80%;
    border-radius:25px;
    margin:10px;
    border:none;
    font-size:16px;
}

.primary {
    background:linear-gradient(90deg,#3cff9a,#1fb4ff);
    color:white;
}

.secondary {
    background:transparent;
    border:1px solid #2b4d6d;
    color:white;
}

/* HOME */
#home {
    display:none;
    padding:15px;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.search {
    margin-top:10px;
    padding:10px;
    border-radius:15px;
    background:#0c1c2e;
}

/* BANNER */
.banner {
    margin-top:15px;
    padding:15px;
    border-radius:20px;
    background:linear-gradient(90deg,#0c2d2f,#0b402f);
}

/* CATEGORY */
.categories {
    display:flex;
    gap:10px;
    margin-top:15px;
}

.cat {
    background:#0b1e2f;
    padding:10px;
    border-radius:15px;
}

/* PRODUCTS */
.products {
    display:flex;
    gap:10px;
    margin-top:15px;
}

.card {
    background:#081a2a;
    padding:10px;
    border-radius:15px;
    width:120px;
}

.img-box {
    background:white;
    height:90px;
    border-radius:10px;
}

/* NAVBAR */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#071521;
    padding:10px 0;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="https://i.imgur.com/3ZQ3ZQ3.png" />
    <h1>GlobusMarket</h1>
    <p>Тез, қулай ва ишончли харид</p>

    <button class="btn primary" onclick="start()">Davom etish</button>
    <button class="btn secondary">Kirish</button>
</div>

<!-- HOME -->
<div id="home">

<div class="header">
    <h2>GlobusMarket</h2>
</div>

<div class="search">🔍 Махсулот қидириш...</div>

<div class="banner">
    <h3>Тез етказиб бериш</h3>
    <p>30 дақиқа ичида</p>
</div>

<div class="categories">
    <div class="cat">Ichimliklar</div>
    <div class="cat">Shirinliklar</div>
    <div class="cat">Sut</div>
</div>

<div class="products">
    <div class="card">
        <div class="img-box"></div>
        Coca Cola<br>12 000 so'm
    </div>

    <div class="card">
        <div class="img-box"></div>
        Pepsi<br>12 000 so'm
    </div>
</div>

</div>

<div class="nav">
    <div>Home</div>
    <div>Search</div>
    <div>Cart</div>
    <div>Profile</div>
</div>

<script>
function start(){
    document.getElementById('intro').style.display='none';
    document.getElementById('home').style.display='block';
}
</script>

</body>
</html>
