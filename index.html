<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobusMarket</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 10%, rgba(60, 255, 160, 0.08), transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(40, 130, 255, 0.08), transparent 30%),
        #05070a;
      color: white;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
    }

    .app-shell {
      width: min(100%, 390px);
      height: min(100vh - 24px, 820px);
      position: relative;
      border-radius: 34px;
      overflow: hidden;
      background: #06101f;
      box-shadow:
        0 26px 70px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(140, 220, 255, 0.18);
    }

    .screen {
      position: absolute;
      inset: 0;
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s ease;
    }

    .app-shell.show-home .intro {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.025);
      pointer-events: none;
    }

    .app-shell.show-home .home {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      z-index: 3;
    }

    /* Invisible hit zones so this looks exactly like the approved mockup */
    .tap-zone {
      position: absolute;
      z-index: 10;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .continue-zone {
      left: 8%;
      right: 8%;
      bottom: 15.5%;
      height: 8.5%;
      border-radius: 18px;
    }

    .login-zone {
      left: 8%;
      right: 8%;
      bottom: 8.5%;
      height: 5.5%;
      border-radius: 16px;
    }

    .register-zone {
      left: 28%;
      right: 28%;
      bottom: 4.5%;
      height: 3.8%;
    }

    .home-button-zone {
      left: 0;
      bottom: 0;
      width: 25%;
      height: 11.5%;
    }

    .search-button-zone {
      left: 25%;
      bottom: 0;
      width: 25%;
      height: 11.5%;
    }

    .cart-button-zone {
      left: 50%;
      bottom: 0;
      width: 25%;
      height: 11.5%;
    }

    .profile-button-zone {
      left: 75%;
      bottom: 0;
      width: 25%;
      height: 11.5%;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: rgba(4, 12, 25, 0.86);
      color: #eafff7;
      border: 1px solid rgba(99, 255, 184, 0.24);
      box-shadow: 0 12px 24px rgba(0,0,0,.34);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 420px) {
      body {
        padding: 0;
        background: #05070a;
      }

      .app-shell {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="appShell" aria-label="GlobusMarket preview">
    <section class="screen intro" aria-label="GlobusMarket intro">
      <button class="tap-zone continue-zone" id="continueBtn" aria-label="Davom etish"></button>
      <button class="tap-zone login-zone" id="introLoginBtn" aria-label="Kirish"></button>
      <button class="tap-zone register-zone" id="introRegisterBtn" aria-label="Ro'yxatdan o'tish"></button>
    </section>

    <section class="screen home" aria-label="GlobusMarket home">
      <button class="tap-zone home-button-zone" data-toast="Home"></button>
      <button class="tap-zone search-button-zone" data-toast="Search кейин қиламиз"></button>
      <button class="tap-zone cart-button-zone" data-toast="Cart кейин қиламиз"></button>
      <button class="tap-zone profile-button-zone" data-toast="Profile кейин қиламиз"></button>
    </section>

    <div class="toast" id="toast">OK</div>
  </main>

  <script>
    const appShell = document.getElementById("appShell");
    const toast = document.getElementById("toast");

    document.getElementById("continueBtn").addEventListener("click", () => {
      appShell.classList.add("show-home");
    });

    document.getElementById("introLoginBtn").addEventListener("click", () => showToast("Kirish ekrani кейин қиламиз"));
    document.getElementById("introRegisterBtn").addEventListener("click", () => showToast("Ro'yxatdan o'tish кейин қиламиз"));

    document.querySelectorAll("[data-toast]").forEach((btn) => {
      btn.addEventListener("click", () => showToast(btn.dataset.toast));
    });

    let toastTimer;
    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1300);
    }
  </script>
</body>
</html>
