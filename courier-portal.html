<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GlobusMarket · Kuryer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://api-maps.yandex.ru/2.1/?apikey=98fbccfc-0ccc-46cc-923a-cfc8b9267d3e&lang=uz_UZ" async></script>
  <style>
    :root {
      --black: #050508;
      --ink: #101014;
      --surface: #121218;
      --gold: #ffcc00;
      --gold2: #e6a800;
      --line: rgba(255, 204, 0, 0.22);
      --txt: #f4f4f5;
      --muted: #9ca3af;
      --radius: 18px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--txt);
      background: linear-gradient(165deg, #12121a 0%, var(--black) 42%, #08080c 100%);
    }
    .bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px calc(12px + env(safe-area-inset-top));
      background: rgba(10, 10, 10, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .bar strong { font-size: 15px; letter-spacing: 0.02em; color: var(--gold); }
    .bar small { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .lang { display: flex; gap: 8px; }
    .lang button {
      border: 1px solid var(--line);
      background: var(--ink);
      color: var(--txt);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 14px 16px max(100px, calc(88px + env(safe-area-inset-bottom))); }
    .driver-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 16px 16px 14px;
      background: linear-gradient(155deg, rgba(255, 204, 0, 0.1), rgba(18, 18, 24, 0.98));
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .driver-card h1 {
      margin: 0 0 4px;
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.02em;
      line-height: 1.2;
      max-width: 100%;
      word-break: break-word;
    }
    .driver-card #whoPhone {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .route-active-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255, 204, 0, 0.14);
      border: 1px solid rgba(255, 204, 0, 0.35);
      color: #fff3b8;
    }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .feed-section { margin-top: 4px; }
    .section-title,
    .feed-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 12px;
    }
    .route-drawer {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 14px 14px 12px;
      background: linear-gradient(180deg, rgba(22, 22, 30, 0.98), rgba(10, 10, 14, 0.99));
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .route-panel-title {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fde68a;
    }
    .route-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .route-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 204, 0, 0.12);
      background: rgba(8, 8, 12, 0.65);
      min-height: 48px;
    }
    .route-row-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--black);
    }
    .route-row-main { flex: 1; min-width: 0; }
    .route-row-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt);
      line-height: 1.4;
      word-break: break-word;
    }
    .route-row-link {
      display: block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      text-align: center;
      border: 1px solid var(--line);
      background: rgba(255, 204, 0, 0.08);
      color: #fff8dc;
      width: 100%;
      box-sizing: border-box;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: linear-gradient(165deg, rgba(26, 26, 32, 0.98), rgba(12, 12, 16, 0.99));
      margin-bottom: 10px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .card:active { transform: scale(0.99); }
    .row1 {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px 10px;
      width: 100%;
    }
    .row1 b {
      font-size: 15px;
      flex: 1 1 auto;
      min-width: 0;
      word-break: break-word;
      line-height: 1.3;
    }
    .row1 .row1-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
      max-width: 100%;
    }
    .pill {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--gold);
      white-space: nowrap;
    }
    .addr { margin-top: 8px; font-size: 13px; color: #e5e5e5; line-height: 1.35; }
    .sum { margin-top: 8px; font-size: 14px; font-weight: 800; color: var(--gold); }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    button.main, .btn-link {
      flex: 1;
      min-width: 120px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 11px 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.main {
      background: linear-gradient(100deg, var(--gold), var(--gold2));
      border: none;
      color: var(--black);
    }
    button.main:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-link {
      background: transparent;
      color: var(--txt);
      text-decoration: none;
      text-align: center;
    }
    .err { color: #ffb4c0; font-size: 14px; margin-top: 8px; }
    .gate { padding: 20px 16px; text-align: center; }
    .gate a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      background: linear-gradient(100deg, var(--gold), var(--gold2));
      color: var(--black);
      font-weight: 800;
      text-decoration: none;
    }
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .sheet-backdrop.on { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      max-height: 88vh;
      background: #0e0e0e;
      border-radius: 22px 22px 0 0;
      border: 1px solid var(--line);
      border-bottom: none;
      transform: translateY(110%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.on { transform: translateY(0); }
    .sheet-head {
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--line);
    }
    .sheet-head .row1 { align-items: flex-start; }
    .grab {
      width: 44px;
      height: 5px;
      border-radius: 99px;
      background: #444;
      margin: 4px auto 10px;
    }
    .sheet-body { overflow: auto; padding: 12px 14px 18px; flex: 1; }
    #detailMap {
      height: 38vh;
      min-height: 220px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }
    #detailMap img { max-width: none; }
    .kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
    .kpi div {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .kpi b { display: block; color: var(--gold); font-size: 15px; margin-top: 4px; }
    .fab-logout {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--ink);
      color: var(--txt);
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div>
      <strong id="brand">GlobusMarket</strong>
      <small id="brandSub">Kuryer</small>
    </div>
    <div class="lang">
      <button type="button" id="langUz">UZ</button>
      <button type="button" id="langRu">RU</button>
    </div>
  </div>

  <div id="gate" class="wrap gate" style="display:none;">
    <p class="muted" id="gateMsg"></p>
    <a href="/" id="gateShop">Bosh sahifa</a>
  </div>

  <div id="app" class="wrap" style="display:none;">
    <header class="driver-card">
      <h1 id="whoName">—</h1>
      <p class="muted" id="whoPhone">—</p>
      <p class="route-active-badge" id="routeActiveHint" style="display:none;"></p>
    </header>
    <section id="myRoutePanel" class="route-drawer" style="display:none;">
      <h2 class="route-panel-title" id="myRouteHeading">Mening marshrutim</h2>
      <p class="muted" id="myRouteEta" style="margin:0 0 8px;"></p>
      <div id="myRouteList" class="route-list"></div>
    </section>
    <section class="feed-section">
      <h2 class="section-title" id="feedTitle">Buyurtmalar</h2>
      <div id="feed"></div>
      <p class="muted" id="feedHint" style="margin-top:12px;"></p>
    </section>
  </div>

  <button type="button" class="fab-logout" id="logoutBtn" style="display:none;">Chiqish</button>

  <div id="backdrop" class="sheet-backdrop"></div>
  <div id="sheet" class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-head">
      <div class="grab"></div>
      <div class="row1">
        <b id="dTitle">#</b>
        <span class="row1-meta">
          <span class="pill" id="dRouteStop" style="display:none;"></span>
          <span class="pill" id="dStatus">—</span>
        </span>
      </div>
    </div>
    <div class="sheet-body">
      <div id="detailMap"></div>
      <div class="kpi">
        <div><span id="lblDist">Masofa</span><b id="dDist">—</b></div>
        <div><span id="lblEta">Taxminiy vaqt</span><b id="dEta">—</b></div>
      </div>
      <p class="muted" id="dAddr"></p>
      <p class="muted" id="dItems"></p>
      <div class="actions">
        <button type="button" class="main" id="claimBtn">Qabul qilish</button>
        <a class="btn-link" id="openCourierBtn" href="#" target="_blank" rel="noopener" style="display:none;">Kuryer sahifasi</a>
      </div>
      <p class="err" id="sheetErr" style="display:none;"></p>
    </div>
  </div>

  <script>
    const LS = 'gm_courier_portal_token';
    const langKey = 'gm_courier_portal_lang';
    let lang = localStorage.getItem(langKey) || 'uz';
    let token = '';
    let profile = null;
    let orders = [];
    let selected = null;
    let pollTimer = null;
    let yMap = null;
    let yRoute = null;
    let yStart = null;
    let yEnd = null;
    let ymapsReadyPromise = null;

    const STORE = { lat: 39.654572, lng: 66.958871 };
    const T = {
      uz: {
        brand: 'GlobusMarket',
        brandSub: 'Kuryer · taksi uslubi',
        feedTitle: 'Faol buyurtmalar',
        feedHint: '«Kuryer kutilmoqda» holatidagi buyurtmani bosing va qabul qiling. Bir nechtasini ketma-ket olishingiz mumkin (navbat raqami). Keyin kuryer sahifasidan yo‘lga chiqasiz.',
        routePill: 'Navbat',
        activeStops: 'Faol yetkazishingiz',
        myRouteTitle: 'Mening marshrutim',
        myRouteEta: 'Taxminiy umumiy vaqt',
        openCourierShort: 'Kuryer',
        logout: 'Chiqish',
        gate: 'Havola yaroqsiz. Marketplace profilidan qayta ariza yuboring.',
        shop: 'Bosh sahifa',
        claim: 'O‘zimga biriktirish',
        courierPage: 'Kuryer sahifasi (QR)',
        dist: 'Masofa',
        eta: 'Taxminiy vaqt',
        km: 'km',
        min: 'daq',
        busy: 'Boshqa kuryer oldin qabul qilgan',
        loading: 'Yuklanmoqda...',
        emptyFeed: 'Hozircha yetkazish buyurtmalari yo‘q'
      },
      ru: {
        brand: 'GlobusMarket',
        brandSub: 'Курьер · такси-стиль',
        feedTitle: 'Активные заказы',
        feedHint: 'Нажмите заказ в статусе «курьер ожидается» и примите. Можно взять несколько по очереди (номер в маршруте). Затем откройте страницу курьера для выезда.',
        routePill: 'Очередь',
        activeStops: 'Активных доставок',
        myRouteTitle: 'Мой маршрут',
        myRouteEta: 'Примерное общее время',
        openCourierShort: 'Курьер',
        logout: 'Выйти',
        gate: 'Ссылка недействительна. Подайте заявку снова из профиля.',
        shop: 'На главную',
        claim: 'Забрать себе',
        courierPage: 'Страница курьера (QR)',
        dist: 'Дистанция',
        eta: 'Время',
        km: 'км',
        min: 'мин',
        busy: 'Уже принят другим курьером',
        loading: 'Загрузка...',
        emptyFeed: 'Пока нет заказов для доставки'
      }
    };
    function tr(k) {
      return (T[lang] || T.uz)[k] || k;
    }
    function money(n) {
      return `${Number(n || 0).toLocaleString('ru-RU')} so'm`;
    }
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function statusLabel(st) {
      const m = {
        ready_for_courier: lang === 'ru' ? 'Курьер ожидается' : 'Kuryer kutilmoqda',
        courier_assigned: lang === 'ru' ? 'Назначен' : 'Biriktirildi',
        out_for_delivery: lang === 'ru' ? 'В пути' : 'Yo‘lda'
      };
      return m[st] || st;
    }
    function mineByPhone(o) {
      return Boolean(
        profile &&
          String(o.courierPhone || '').trim() &&
          String(o.courierPhone).trim() === String(profile.phone || '').trim()
      );
    }

    async function loadRouteHint() {
      const hintEl = document.getElementById('routeActiveHint');
      const panel = document.getElementById('myRoutePanel');
      const listEl = document.getElementById('myRouteList');
      const etaEl = document.getElementById('myRouteEta');
      const headEl = document.getElementById('myRouteHeading');
      if (!profile) return;
      if (headEl) headEl.textContent = tr('myRouteTitle');
      try {
        const d = await api('/courier-portal/my-route');
        const n = Array.isArray(d.orders) ? d.orders.length : 0;
        const eta = Number(d.routeEtaHintMinutes) || 0;
        if (hintEl) {
          if (n > 0) {
            hintEl.style.display = 'block';
            hintEl.textContent = `${tr('activeStops')}: ${n}`;
          } else {
            hintEl.style.display = 'none';
          }
        }
        if (panel && listEl && etaEl) {
          if (n > 0) {
            panel.style.display = 'block';
            etaEl.textContent = `${tr('myRouteEta')}: ~${eta} ${tr('min')}`;
            const sorted = [...d.orders].sort(
              (a, b) => (Number(a.courierStopSeq) || 0) - (Number(b.courierStopSeq) || 0)
            );
            listEl.innerHTML = sorted
              .map((o) => {
                const addr =
                  [o.addressText, o.customerAddress, o.location].map((x) => String(x || '').trim()).find(Boolean) ||
                  '—';
                const ct = String(o.courierToken || '').trim();
                const href = ct ? `${location.origin}/courier/${encodeURIComponent(ct)}` : '#';
                const link = ct
                  ? `<a class="route-row-link" href="${esc(href)}" target="_blank" rel="noopener">${esc(tr('openCourierShort'))} #${esc(
                      o.orderNumber || ''
                    )}</a>`
                  : '';
                return `<div class="route-row"><span class="route-row-num">${esc(String(o.courierStopSeq || '?'))}</span><div class="route-row-main"><div class="route-row-title">#${esc(
                  o.orderNumber || o.id
                )} · ${esc(addr)}</div>${link}</div></div>`;
              })
              .join('');
          } else {
            panel.style.display = 'none';
            listEl.innerHTML = '';
          }
        }
      } catch (_) {
        if (hintEl) hintEl.style.display = 'none';
        if (panel) panel.style.display = 'none';
      }
    }
    function applyLang() {
      document.documentElement.lang = lang;
      document.getElementById('brand').textContent = tr('brand');
      document.getElementById('brandSub').textContent = tr('brandSub');
      document.getElementById('feedTitle').textContent = tr('feedTitle');
      document.getElementById('feedHint').textContent = tr('feedHint');
      document.getElementById('logoutBtn').textContent = tr('logout');
      document.getElementById('gateMsg').textContent = tr('gate');
      document.getElementById('gateShop').textContent = tr('shop');
      document.getElementById('claimBtn').textContent = tr('claim');
      document.getElementById('openCourierBtn').textContent = tr('courierPage');
      document.getElementById('lblDist').textContent = tr('dist');
      document.getElementById('lblEta').textContent = tr('eta');
      renderFeed();
      void loadRouteHint();
      if (selected) openSheet(selected);
    }

    function readToken() {
      const q = new URLSearchParams(location.search).get('t');
      if (q) {
        localStorage.setItem(LS, q);
        history.replaceState({}, '', '/courier-portal');
      }
      return localStorage.getItem(LS) || '';
    }

    async function api(path, opt) {
      const res = await fetch('/api/v1' + path, {
        headers: {
          'Content-Type': 'application/json',
          'X-Courier-Portal-Token': token
        },
        ...opt
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || 'Error');
      return data;
    }

    function renderFeed() {
      const el = document.getElementById('feed');
      if (!el) return;
      if (!orders.length) {
        el.innerHTML = `<p class="muted">${esc(tr('emptyFeed'))}</p>`;
        return;
      }
      const sorted = [...orders].sort((a, b) => {
        const ma = mineByPhone(a);
        const mb = mineByPhone(b);
        if (ma && !mb) return -1;
        if (!ma && mb) return 1;
        if (ma && mb) {
          const sa = Number(a.courierStopSeq);
          const sb = Number(b.courierStopSeq);
          if (Number.isFinite(sa) && Number.isFinite(sb) && sa !== sb) return sa - sb;
          if (Number.isFinite(sa) && !Number.isFinite(sb)) return -1;
          if (!Number.isFinite(sa) && Number.isFinite(sb)) return 1;
        }
        return String(b.updated_at || '').localeCompare(String(a.updated_at || ''));
      });
      el.innerHTML = sorted
        .map((o) => {
          const addr = [o.addressText, o.customerAddress, o.location].map((x) => String(x || '').trim()).find(Boolean) || '—';
          const mine = mineByPhone(o);
          const stopPill =
            mine && o.courierStopSeq != null && Number(o.courierStopSeq) > 0
              ? `<span class="pill" title="${esc(tr('routePill'))}">${esc(String(o.courierStopSeq))}</span>`
              : '';
          return `
            <article class="card" data-id="${esc(o.id)}">
              <div class="row1">
                <b>#${esc(o.orderNumber || o.id)}</b>
                <span class="row1-meta">
                  ${stopPill}
                  <span class="pill">${esc(statusLabel(o.status))}</span>
                </span>
              </div>
              <div class="addr">${esc(addr)}</div>
              <div class="sum">${esc(money(o.total))}</div>
              ${mine ? `<div class="muted" style="margin-top:6px;font-size:12px;">✓ ${lang === 'ru' ? 'Ваш заказ' : 'Sizning buyurtmangiz'}</div>` : ''}
            </article>
          `;
        })
        .join('');
      el.querySelectorAll('.card').forEach((c) => {
        c.onclick = () => {
          const id = c.getAttribute('data-id');
          const o = orders.find((x) => String(x.id) === String(id));
          if (o) openSheet(o);
        };
      });
    }

    function closeSheet() {
      document.getElementById('backdrop').classList.remove('on');
      document.getElementById('sheet').classList.remove('on');
      selected = null;
    }

    function ensureYmaps() {
      if (window.__yandexMapsFailed) return Promise.reject(new Error('yandex'));
      if (!window.ymaps || typeof window.ymaps.ready !== 'function') return Promise.reject(new Error('yandex'));
      if (!ymapsReadyPromise) {
        ymapsReadyPromise = new Promise((resolve, reject) => {
          const t = setTimeout(() => reject(new Error('timeout')), 9000);
          window.ymaps.ready(() => {
            clearTimeout(t);
            if (window.ymaps && window.ymaps.Map) resolve(window.ymaps);
            else reject(new Error('map'));
          });
        });
      }
      return ymapsReadyPromise;
    }

    function hasCoord(lat, lng) {
      const la = Number(lat);
      const ln = Number(lng);
      if (!Number.isFinite(la) || !Number.isFinite(ln)) return false;
      if (Math.abs(la) > 90 || Math.abs(ln) > 180) return false;
      return !(la === 0 && ln === 0);
    }

    function drawRoute(o) {
      const errEl = document.getElementById('sheetErr');
      errEl.style.display = 'none';
      const box = document.getElementById('detailMap');
      if (yMap) {
        try {
          yMap.destroy();
        } catch (_) {}
        yMap = yRoute = yStart = yEnd = null;
      }
      if (box) box.innerHTML = '';

      ensureYmaps()
        .then((ymaps) => {
          if (!box) return;
          const endLat = Number(o.locationLat);
          const endLng = Number(o.locationLng);
          const startLat = STORE.lat;
          const startLng = STORE.lng;
          if (!hasCoord(endLat, endLng)) {
            document.getElementById('dDist').textContent = '—';
            document.getElementById('dEta').textContent = '—';
            box.innerHTML = `<div class="muted" style="padding:16px;">${lang === 'ru' ? 'Нет координат для маршрута' : 'Marshrut uchun koordinata yo‘q'}</div>`;
            return;
          }

          yMap = new ymaps.Map(box, { center: [endLat, endLng], zoom: 12, controls: ['zoomControl'] }, { suppressMapOpenBlock: true });

          yStart = new ymaps.Placemark([startLat, startLng], { balloonContent: 'GlobusMarket' }, { preset: 'islands#blueCircleDotIcon' });
          yMap.geoObjects.add(yStart);

          yEnd = new ymaps.Placemark([endLat, endLng], { balloonContent: 'Manzil' }, { preset: 'islands#greenDotIcon' });
          yMap.geoObjects.add(yEnd);

          yRoute = new ymaps.multiRouter.MultiRoute(
            {
              referencePoints: [[startLat, startLng], [endLat, endLng]],
              params: { routingMode: 'auto' }
            },
            {
              boundsAutoApply: true,
              routeActiveStrokeWidth: 6,
              routeActiveStrokeColor: '#FFD60A',
              routeStrokeWidth: 0
            }
          );
          yRoute.model.events.add('requestsuccess', () => {
            const ar = yRoute.getActiveRoute();
            if (!ar) return;
            let distM = 0;
            let durS = 0;
            try {
              const d0 = ar.properties.get('distance');
              const t0 = ar.properties.get('duration');
              distM = typeof d0 === 'object' && d0 && typeof d0.value === 'number' ? d0.value : Number(d0) || 0;
              durS = typeof t0 === 'object' && t0 && typeof t0.value === 'number' ? t0.value : Number(t0) || 0;
            } catch (_) {}
            const km = (distM / 1000).toFixed(1);
            const mins = Math.max(1, Math.round(durS / 60));
            document.getElementById('dDist').textContent = `${km} ${tr('km')}`;
            document.getElementById('dEta').textContent = `${mins} ${tr('min')}`;
          });
          yMap.geoObjects.add(yRoute);
        })
        .catch(() => {
          errEl.textContent = lang === 'ru' ? 'Карта недоступна' : 'Xarita yuklanmadi';
          errEl.style.display = 'block';
        });
    }

    function openSheet(o) {
      selected = o;
      document.getElementById('dTitle').textContent = `#${o.orderNumber || o.id}`;
      document.getElementById('dStatus').textContent = statusLabel(o.status);
      const routeEl = document.getElementById('dRouteStop');
      if (mineByPhone(o) && o.courierStopSeq != null && Number(o.courierStopSeq) > 0) {
        routeEl.textContent = `${tr('routePill')} ${o.courierStopSeq}`;
        routeEl.style.display = 'inline-block';
      } else {
        routeEl.textContent = '';
        routeEl.style.display = 'none';
      }
      const addr = [o.addressText, o.customerAddress, o.location].map((x) => String(x || '').trim()).find(Boolean) || '—';
      document.getElementById('dAddr').textContent = addr;
      const items = Array.isArray(o.items) ? o.items : [];
      document.getElementById('dItems').textContent =
        items.length > 0
          ? items.map((it) => `${it.title || it.name || '—'} × ${it.qty || it.quantity || 1}`).join(' · ')
          : '';
      document.getElementById('dDist').textContent = '…';
      document.getElementById('dEta').textContent = '…';

      const mine = mineByPhone(o);
      const canClaim = o.status === 'ready_for_courier' && !String(o.courierName || '').trim();
      const claimBtn = document.getElementById('claimBtn');
      const openBtn = document.getElementById('openCourierBtn');
      claimBtn.style.display = canClaim ? 'block' : 'none';
      claimBtn.disabled = false;
      const ct = String(o.courierToken || '').trim();
      if ((o.status === 'courier_assigned' || o.status === 'out_for_delivery') && mine && ct) {
        openBtn.style.display = 'block';
        openBtn.href = `${location.origin}/courier/${encodeURIComponent(ct)}`;
      } else {
        openBtn.style.display = 'none';
        openBtn.href = '#';
      }
      document.getElementById('sheetErr').style.display = 'none';

      document.getElementById('backdrop').classList.add('on');
      document.getElementById('sheet').classList.add('on');
      setTimeout(() => drawRoute(o), 80);
    }

    async function loadFeed() {
      const el = document.getElementById('feed');
      if (el) el.innerHTML = `<p class="muted">${esc(tr('loading'))}</p>`;
      const data = await api('/courier-portal/feed');
      orders = Array.isArray(data.orders) ? data.orders : [];
      renderFeed();
      void loadRouteHint();
    }

    async function boot() {
      applyLang();
      token = readToken();
      if (!token) {
        document.getElementById('gate').style.display = 'block';
        return;
      }
      try {
        const res = await fetch('/api/v1/courier-portal/session?token=' + encodeURIComponent(token), { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.application) {
          localStorage.removeItem(LS);
          document.getElementById('gate').style.display = 'block';
          return;
        }
        profile = data.application;
        document.getElementById('whoName').textContent = profile.fullName || '—';
        document.getElementById('whoPhone').textContent = profile.phone || '—';
        document.getElementById('app').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'block';
        await loadFeed();
        pollTimer = setInterval(loadFeed, 5000);
      } catch (_) {
        document.getElementById('gate').style.display = 'block';
      }
    }

    document.getElementById('backdrop').onclick = closeSheet;
    document.getElementById('claimBtn').onclick = async () => {
      if (!selected) return;
      const btn = document.getElementById('claimBtn');
      const err = document.getElementById('sheetErr');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = tr('loading');
      try {
        await api(`/courier-portal/orders/${encodeURIComponent(selected.id)}/claim`, { method: 'POST', body: '{}' });
        await loadFeed();
        const fresh = orders.find((x) => String(x.id) === String(selected.id));
        if (fresh) openSheet(fresh);
        else closeSheet();
      } catch (e) {
        err.textContent = e.message || tr('busy');
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = tr('claim');
      }
    };

    document.getElementById('logoutBtn').onclick = () => {
      localStorage.removeItem(LS);
      if (pollTimer) clearInterval(pollTimer);
      location.href = '/';
    };
    document.getElementById('langUz').onclick = () => {
      lang = 'uz';
      localStorage.setItem(langKey, lang);
      applyLang();
    };
    document.getElementById('langRu').onclick = () => {
      lang = 'ru';
      localStorage.setItem(langKey, lang);
      applyLang();
    };

    boot();
  </script>
</body>
</html>
