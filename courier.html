<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GlobusMarket · Kuryer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --line: rgba(255, 214, 10, 0.32);
      --txt: #fafafa;
      --muted: #a3a3a3;
      --muted2: #e5e5e5;
      --acc: #ffd60a;
      --acc2: #f5b800;
      --warn: #ffb020;
      --danger: #ff6b7a;
      --radius: 16px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      background: linear-gradient(180deg, #141414 0%, var(--bg) 50%);
      color: var(--txt);
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    .topbar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.96);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand strong { font-size: 15px; letter-spacing: 0.02em; }
    .brand small { color: var(--muted); font-size: 12px; }
    .lang-row { display: flex; gap: 8px; }
    .lang-row button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(20, 20, 20, 0.85);
      color: var(--muted2);
      font-weight: 600;
      cursor: pointer;
    }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px calc(28px + env(safe-area-inset-bottom));
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .panel {
      background: linear-gradient(165deg, rgba(24, 24, 24, 0.98), rgba(8, 8, 8, 0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .panel h2 { margin: 0 0 8px; font-size: 17px; }
    .panel h3 { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted2); }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .ok { color: #ffe566; font-size: 13px; margin-top: 6px; }
    .warn { color: #ffd4a8; font-size: 12px; margin-top: 6px; line-height: 1.35; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      color: var(--muted2);
    }
    input, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(18, 18, 18, 0.95);
      color: var(--txt);
      font: inherit;
      margin-top: 8px;
    }
    button { cursor: pointer; font-weight: 700; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .primary {
      background: linear-gradient(100deg, var(--acc), var(--acc2));
      border: none;
      color: #031018;
    }
    .nav-block {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 214, 10, 0.06);
    }
    .nav-head {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--acc);
    }
    .nav-hint { margin: 0 0 10px; font-size: 12px; line-height: 1.35; }
    .nav-primary {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 14px 14px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(100deg, var(--acc), var(--acc2));
      color: var(--bg);
    }
    .nav-primary:disabled,
    .nav-primary[aria-disabled='true'] {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0; }
    .nav-row button { margin-top: 0; }
    .nav-fallback {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--acc2);
    }
    .nav-app-link {
      display: block;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted2);
      margin: 0 0 10px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .nav-app-link[hidden] {
      display: none !important;
    }
    .route-kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    #courierMap {
      height: min(42vh, 320px);
      min-height: 200px;
      border-radius: 14px;
      margin-top: 10px;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    #courierMap img { max-width: none; }
    #nextOrderBar.panel {
      border-left: 4px solid var(--acc);
      background: linear-gradient(95deg, rgba(255, 214, 10, 0.14) 0%, rgba(18, 18, 22, 0.98) 48%);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
    }
    #nextOrderBar.panel h3 {
      color: var(--acc);
      font-weight: 800;
      letter-spacing: 0.03em;
    }
    #nextOrderBar .primary {
      box-shadow: 0 4px 14px rgba(255, 214, 10, 0.25);
    }
    #courierActions {
      position: sticky;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 30;
      box-shadow: 0 -14px 36px rgba(0, 0, 0, 0.55);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong id="brandTitle">GlobusMarket · Kuryer</strong>
      <small id="brandSub">Yetkazib berish</small>
    </div>
    <div class="lang-row">
      <button type="button" id="langUzBtn">UZ</button>
      <button type="button" id="langRuBtn">RU</button>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2 id="panelTitle">Courier</h2>
      <span id="statusBadge" class="badge" hidden></span>
      <p id="msg" class="muted" style="margin-top:8px;"></p>
      <div id="orderInfo" class="muted"></div>
    </section>
    <section class="panel">
      <div id="liveMsg" class="ok" style="display:none;"></div>
      <div id="liveHint" class="muted" style="display:none;margin-top:6px;"></div>
      <div id="wakeWarn" class="warn" style="display:none;"></div>
      <div id="gpsWarn" class="warn" style="display:none;"></div>
      <div id="signalWarn" class="warn" style="display:none;"></div>
      <button id="enableGpsBtn" type="button" class="primary" style="margin-top:10px;">GPS</button>
    </section>
    <section class="panel">
      <h3 id="addrHeading">Manzil</h3>
      <div id="destinationMeta" class="muted"></div>
      <p class="muted" id="routeBatchLine" style="display:none;margin-top:8px;font-size:13px;line-height:1.4;"></p>
      <div id="routeStatus" class="warn" style="display:none;"></div>
      <div class="route-kpi">
        <div class="muted" id="routeDistance">—</div>
        <div class="muted" id="routeEta">—</div>
      </div>
      <div class="muted" id="routeHint" style="margin-top:8px;">—</div>
      <div class="nav-block" id="navBlock">
        <h4 class="nav-head" id="navHead">Marshrut</h4>
        <p class="muted nav-hint" id="navHint"></p>
        <button type="button" class="nav-primary" id="openYandexNavi"></button>
        <a id="openYandexNaviAppLink" class="nav-app-link" href="#" rel="noopener" hidden></a>
        <div class="nav-row">
          <button id="openGoogleNav" type="button">Google Maps</button>
          <button id="openYandexNav" type="button">Yandex Maps</button>
        </div>
        <a id="navWebFallback" class="nav-fallback" href="#" target="_blank" rel="noopener" hidden>Brauzerda marshrut</a>
      </div>
      <div id="courierMap"></div>
    </section>
    <section class="panel" id="nextOrderBar" style="display:none;">
      <h3 id="nextOrderTitle" style="margin:0 0 8px;font-size:15px;">Keyingi buyurtma</h3>
      <a id="nextOrderLink" class="primary" href="#" style="display:block;text-align:center;text-decoration:none;padding:14px;border-radius:12px;font-weight:800;">Ochish</a>
      <p class="muted" id="nextOrderHint" style="margin-top:8px;font-size:12px;"></p>
    </section>
    <section class="panel">
      <input id="courierName" type="text" autocomplete="name" inputmode="text" placeholder="" />
      <input id="courierPhone" type="tel" autocomplete="tel" inputmode="tel" placeholder="" />
      <button id="acceptBtn" class="primary" type="button"></button>
      <button id="deliverBtn" type="button" style="display:none;background:rgba(255,214,10,0.18);border-color:rgba(255,214,10,0.55);color:#fff8d6;"></button>
      <div id="successMsg" class="ok" style="display:none;margin-top:10px;"></div>
    </section>
  </main>
  <script src="https://api-maps.yandex.ru/2.1/?apikey=98fbccfc-0ccc-46cc-923a-cfc8b9267d3e&lang=uz_UZ" async></script>
  <script>
    const token = location.pathname.split('/').filter(Boolean).pop();
    const langKey = 'courier_lang';
    let currentLang = localStorage.getItem(langKey) || 'uz';
    const i18n = {
      uz: {
        brandTitle: 'GlobusMarket · Kuryer',
        brandSub: 'Yetkazib berish',
        panelTitle: 'Buyurtma',
        courierName: 'Kuryer ismi',
        courierPhone: 'Kuryer telefoni',
        accept: 'Buyurtmani qabul qildim (yo‘lga chiqaman)',
        delivered: 'Mijozga topshirildi',
        done: 'Buyurtma yakunlandi',
        loading: 'Yuklanmoqda...',
        error: 'Xatolik',
        enableGps: 'GPS ni yoqish',
        addrHeading: 'Yetkazish manzili',
        liveTracking: 'Mijoz sizni kuzatib turibdi',
        liveHint: 'Yetkazish tugaguncha sahifani yopmang, ekran o‘chmasin.',
        wakeWarn: 'Ekranni o‘chirmang — kuzatuv vaqtincha to‘xtashi mumkin.',
        gpsWarn: 'GPS ruxsati yo‘q. Sozlamalardan Location ni yoqing.',
        signalWarn: 'GPS signali vaqtincha yo‘qoldi',
        routeFail: 'Marshrut yuklanmadi',
        invalidQr: 'Bu havola yaroqsiz yoki ishlatilgan.',
        dist: 'Masofa',
        eta: 'Taxminiy vaqt',
        hint: 'Keyingi yo‘nalish',
        orient: 'Orientir',
        straight: 'to‘g‘ri',
        left: 'chapga',
        right: 'o‘ngga',
        min: 'daq',
        km: 'km',
        status: 'Holat',
        navSection: 'Marshrut',
        navHint: 'Marshrut pastdagi xaritada (Yandex Maps API). Katta tugma — HTTPS marshrut. Navigator havolasi — faqat ilova o‘rnatilgan bo‘lsa.',
        navYandexPrimary: 'Marshrut: Yandex Xarita (HTTPS)',
        navYandexNaviApp: 'Navigator ilovasi',
        navGoogle: 'Google Maps',
        navYandexMaps: 'Yandex Xarita',
        navWebFallback: 'Brauzerda marshrut (zaxira)',
        navVoiceStart: 'Yo‘lga chiqamiz!',
        routeMulti: 'Marshrut: %1 ta nuqta · navbatingiz %2',
        nextOrderTitle: 'Keyingi buyurtma',
        nextOrderOpen: 'Kuryer sahifasini ochish',
        nextOrderHint: 'Marshrutda yana faol buyurtma bo‘lsa, shu yerda ochasiz.',
        acceptHiddenHint: '«Qabul» tugmasi faqat buyurtma kuryerga tayyor yoki kuryer biriktirilgan bo‘lganda chiqadi. Barcha qatorlarni pastga suring.'
      },
      ru: {
        brandTitle: 'GlobusMarket · Курьер',
        brandSub: 'Доставка',
        panelTitle: 'Заказ',
        courierName: 'Имя курьера',
        courierPhone: 'Телефон курьера',
        accept: 'Принял заказ (выезжаю)',
        delivered: 'Передано клиенту',
        done: 'Заказ завершён',
        loading: 'Загрузка...',
        error: 'Ошибка',
        enableGps: 'Включить GPS',
        addrHeading: 'Адрес доставки',
        liveTracking: 'Клиент видит вас на карте',
        liveHint: 'Не закрывайте страницу до конца доставки.',
        wakeWarn: 'Не гасите экран — иначе трекинг может прерваться.',
        gpsWarn: 'Нет доступа к GPS. Включите геолокацию в настройках.',
        signalWarn: 'Сигнал GPS временно потерян',
        routeFail: 'Маршрут не загрузился',
        invalidQr: 'Ссылка недействительна или уже использована.',
        dist: 'Дистанция',
        eta: 'Примерно время',
        hint: 'Направление',
        orient: 'Ориентир',
        straight: 'прямо',
        left: 'налево',
        right: 'направо',
        min: 'мин',
        km: 'км',
        status: 'Статус',
        navSection: 'Маршрут',
        navHint: 'Маршрут на карте ниже (API Яндекс Карт). Большая кнопка — HTTPS-маршрут. Ссылка «Навигатор» — если приложение установлено.',
        navYandexPrimary: 'Маршрут: Яндекс Карты (HTTPS)',
        navYandexNaviApp: 'Приложение Навигатор',
        navGoogle: 'Google Maps',
        navYandexMaps: 'Яндекс Карты',
        navWebFallback: 'Маршрут в браузере (запасной вариант)',
        navVoiceStart: 'Поехали!',
        routeMulti: 'Маршрут: %1 остановок · ваша очередь %2',
        nextOrderTitle: 'Следующий заказ',
        nextOrderOpen: 'Открыть страницу курьера',
        nextOrderHint: 'Если в маршруте ещё есть активная доставка — откройте здесь.',
        acceptHiddenHint: 'Кнопка «Принять» появляется только когда заказ готов курьеру или курьер уже назначен. Прокрутите страницу вниз.'
      }
    };
    function t(key) {
      return (i18n[currentLang] || i18n.uz)[key] || key;
    }
    let order = null;
    let routeOrders = [];
    let trackingInterval = null;
    let gpsEnabled = false;
    let gpsRequested = false;
    let gpsPermissionDenied = false;
    let wakeLockSentinel = null;
    const wakeLockSupported = 'wakeLock' in navigator;
    let lastLocationSuccessAt = 0;
    let lastKnownPosition = null;
    let yMap = null;
    let yCourierMark = null;
    let yDestMark = null;
    let yMultiRoute = null;
    let ymapsReadyPromise = null;
    let lastRouteFetchAt = 0;
    let lastRouteStart = null;
    let lastRouteEnd = null;
    const ROUTE_REFRESH_MS = 10000;
    const STORE_LOCATION = {
      lat: 39.654572,
      lng: 66.958871,
      name: 'GlobusMarket',
      mapsUrl: 'https://maps.google.com/maps?q=39.654572,66.958871&ll=39.654572,66.958871&z=16'
    };

    function applyLang() {
      document.documentElement.lang = currentLang;
      document.getElementById('brandTitle').textContent = t('brandTitle');
      document.getElementById('brandSub').textContent = t('brandSub');
      document.getElementById('panelTitle').textContent = t('panelTitle');
      document.getElementById('addrHeading').textContent = t('addrHeading');
      document.getElementById('enableGpsBtn').textContent = t('enableGps');
      document.getElementById('courierName').placeholder = t('courierName');
      document.getElementById('courierPhone').placeholder = t('courierPhone');
      document.getElementById('acceptBtn').textContent = t('accept');
      document.getElementById('deliverBtn').textContent = t('delivered');
      document.getElementById('successMsg').textContent = t('done');
      document.getElementById('liveMsg').textContent = t('liveTracking');
      document.getElementById('liveHint').textContent = t('liveHint');
      document.getElementById('wakeWarn').textContent = t('wakeWarn');
      document.getElementById('gpsWarn').textContent = t('gpsWarn');
      document.getElementById('signalWarn').textContent = t('signalWarn');
      document.getElementById('navHead').textContent = t('navSection');
      document.getElementById('navHint').textContent = t('navHint');
      document.getElementById('openYandexNavi').textContent = t('navYandexPrimary');
      const appL = document.getElementById('openYandexNaviAppLink');
      if (appL) appL.textContent = t('navYandexNaviApp');
      document.getElementById('openGoogleNav').textContent = t('navGoogle');
      document.getElementById('openYandexNav').textContent = t('navYandexMaps');
      const fb = document.getElementById('navWebFallback');
      if (fb) fb.textContent = t('navWebFallback');
      const nt = document.getElementById('nextOrderTitle');
      if (nt) nt.textContent = t('nextOrderTitle');
      const nl = document.getElementById('nextOrderLink');
      if (nl) nl.textContent = t('nextOrderOpen');
      const nh = document.getElementById('nextOrderHint');
      if (nh) nh.textContent = t('nextOrderHint');
      if (order) render();
    }

    async function api(path, options = {}) {
      const res = await fetch('/api/v1' + path, { headers: { 'Content-Type': 'application/json' }, ...options });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || t('error'));
      return data;
    }

    function setBusy(btn, busy) {
      if (!btn) return;
      btn.disabled = !!busy;
      btn.dataset.old = btn.dataset.old || btn.textContent;
      btn.textContent = busy ? t('loading') : btn.dataset.old;
    }

    function normCourierStatus(s) {
      const a = {
        new: 'created',
        sent_to_tsd: 'preparing',
        picking: 'preparing',
        picked: 'ready_for_courier',
        waiting_courier: 'ready_for_courier'
      };
      const r = String(s || '')
        .trim()
        .toLowerCase()
        .replace(/-/g, '_')
        .replace(/\s+/g, '_');
      return a[r] || r;
    }

    function render() {
      if (!order) return;
      const st = normCourierStatus(order.status);
      const nextBar = document.getElementById('nextOrderBar');
      if (nextBar && st !== 'delivered') nextBar.style.display = 'none';
      const badge = document.getElementById('statusBadge');
      badge.hidden = false;
      badge.textContent = st;
      document.getElementById('orderInfo').innerHTML = `#${order.orderNumber} · ${(order.items || []).length} ta · ${Number(order.total || 0).toLocaleString('ru-RU')} so'm<br>${escapeHtml(String(order.customerAddress || order.location || '-'))}`;
      document.getElementById('destinationMeta').innerHTML = `#${order.orderNumber || '-'}<br>${escapeHtml(String(order.addressText || order.customerAddress || order.location || '-'))}<br>${t('orient')}: ${escapeHtml(String(order.landmarkText || '-'))}<br>Jami: ${Number(order.total || 0).toLocaleString('ru-RU')} so'm`;
      const rb = document.getElementById('routeBatchLine');
      if (rb) {
        const n = Array.isArray(routeOrders) ? routeOrders.length : 0;
        const seq = order.courierStopSeq != null ? Number(order.courierStopSeq) : null;
        if (n > 1 && seq) {
          rb.style.display = 'block';
          rb.textContent = t('routeMulti').replace('%1', String(n)).replace('%2', String(seq));
        } else {
          rb.style.display = 'none';
          rb.textContent = '';
        }
      }
      document.getElementById('msg').textContent = `${t('status')}: ${st}`;
      const acceptBtn = document.getElementById('acceptBtn');
      const deliverBtn = document.getElementById('deliverBtn');
      const successMsg = document.getElementById('successMsg');
      const nameInput = document.getElementById('courierName');
      const phoneInput = document.getElementById('courierPhone');
      successMsg.style.display = 'none';

      if (st === 'ready_for_courier' || st === 'courier_assigned') {
        nameInput.style.display = 'block';
        phoneInput.style.display = 'block';
        nameInput.readOnly = false;
        phoneInput.readOnly = false;
        acceptBtn.style.display = 'block';
        deliverBtn.style.display = 'none';
        stopTracking();
      } else if (st === 'out_for_delivery') {
        nameInput.style.display = 'block';
        phoneInput.style.display = 'block';
        nameInput.value = order.courierName || '';
        phoneInput.value = order.courierPhone || '';
        nameInput.readOnly = true;
        phoneInput.readOnly = true;
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'block';
        ensureTracking();
      } else if (st === 'delivered') {
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'none';
        nameInput.style.display = 'none';
        phoneInput.style.display = 'none';
        successMsg.style.display = 'block';
        stopTracking(true);
      } else {
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'none';
        nameInput.style.display = 'block';
        phoneInput.style.display = 'block';
        nameInput.readOnly = false;
        phoneInput.readOnly = false;
        stopTracking();
        document.getElementById('msg').textContent = `${t('status')}: ${st} — ${t('acceptHiddenHint')}`;
      }

      const courierLinkOkWithUsedToken = ['ready_for_courier', 'courier_assigned', 'out_for_delivery'].includes(st);
      if (st === 'cancelled' || (order.courierTokenUsed && !courierLinkOkWithUsedToken)) {
        document.getElementById('msg').textContent = t('invalidQr');
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'none';
        nameInput.style.display = 'none';
        phoneInput.style.display = 'none';
        badge.hidden = true;
        stopTracking();
      }
      renderGpsStatus();
      updateNavButtons();
    }

    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderGpsStatus() {
      const liveMsg = document.getElementById('liveMsg');
      const liveHint = document.getElementById('liveHint');
      const wakeWarn = document.getElementById('wakeWarn');
      const gpsWarn = document.getElementById('gpsWarn');
      const signalWarn = document.getElementById('signalWarn');
      const enableGpsBtn = document.getElementById('enableGpsBtn');
      liveMsg.style.display = gpsEnabled ? 'block' : 'none';
      liveHint.style.display = gpsEnabled ? 'block' : 'none';
      wakeWarn.style.display = gpsEnabled && !wakeLockSupported ? 'block' : 'none';
      gpsWarn.style.display = gpsPermissionDenied ? 'block' : 'none';
      signalWarn.style.display = gpsEnabled && lastLocationSuccessAt && Date.now() - lastLocationSuccessAt > 20000 ? 'block' : 'none';
      const canTrack = normCourierStatus(order?.status) === 'out_for_delivery';
      enableGpsBtn.style.display = canTrack && !gpsEnabled ? 'block' : 'none';
      enableGpsBtn.disabled = !canTrack;
    }

    async function acquireWakeLock() {
      if (!wakeLockSupported || wakeLockSentinel || !order || normCourierStatus(order.status) !== 'out_for_delivery') return;
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
        });
      } catch (_) {}
    }

    async function releaseWakeLock() {
      if (!wakeLockSentinel) return;
      try {
        await wakeLockSentinel.release();
      } catch (_) {}
      wakeLockSentinel = null;
    }

    function stopTracking(markStopped = false) {
      if (trackingInterval) {
        clearInterval(trackingInterval);
        trackingInterval = null;
      }
      gpsEnabled = false;
      if (markStopped && order) order.courierTrackingStoppedAt = new Date().toISOString();
      releaseWakeLock();
      renderGpsStatus();
    }

    async function sendCurrentLocation() {
      if (!navigator.geolocation || !order || normCourierStatus(order.status) !== 'out_for_delivery' || !gpsRequested) return;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            try {
              const out = await api('/courier/' + token + '/location', {
                method: 'POST',
                body: JSON.stringify({
                  lat: pos.coords.latitude,
                  lng: pos.coords.longitude,
                  accuracy: pos.coords.accuracy
                })
              });
              order = out.order || order;
              lastKnownPosition = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                accuracy: pos.coords.accuracy
              };
              gpsEnabled = true;
              lastLocationSuccessAt = Date.now();
              renderGpsStatus();
              maybeUpdateRoute();
              updateNavButtons();
            } catch (_) {}
            resolve();
          },
          () => {
            gpsPermissionDenied = true;
            gpsEnabled = false;
            renderGpsStatus();
            resolve();
          },
          { enableHighAccuracy: true, maximumAge: 3000, timeout: 9000 }
        );
      });
    }

    async function ensureTracking() {
      if (trackingInterval || !order || normCourierStatus(order.status) !== 'out_for_delivery') return;
      renderGpsStatus();
      await acquireWakeLock();
      await sendCurrentLocation();
      trackingInterval = setInterval(() => {
        sendCurrentLocation();
      }, 5000);
    }

    function hasValidCoords(lat, lng) {
      const latNum = Number(lat);
      const lngNum = Number(lng);
      if (!Number.isFinite(latNum) || !Number.isFinite(lngNum)) return false;
      if (Math.abs(latNum) > 90 || Math.abs(lngNum) > 180) return false;
      if (latNum === 0 && lngNum === 0) return false;
      return true;
    }

    function ensureYmaps() {
      if (window.__yandexMapsFailed) return Promise.reject(new Error('maps'));
      if (!window.ymaps || typeof window.ymaps.ready !== 'function') {
        return Promise.reject(new Error('maps'));
      }
      if (!ymapsReadyPromise) {
        ymapsReadyPromise = new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error('timeout')), 9000);
          try {
            window.ymaps.ready(() => {
              clearTimeout(timer);
              if (window.ymaps && window.ymaps.Map) resolve(window.ymaps);
              else reject(new Error('no map'));
            });
          } catch (e) {
            clearTimeout(timer);
            reject(e);
          }
        });
      }
      return ymapsReadyPromise;
    }

    function ensureYandexMap(centerLat, centerLng) {
      return ensureYmaps().then((ymaps) => {
        const el = document.getElementById('courierMap');
        if (!el || !ymaps) return ymaps;
        if (!yMap) {
          yMap = new ymaps.Map(
            el,
            { center: [centerLat, centerLng], zoom: 13, controls: ['zoomControl'] },
            { suppressMapOpenBlock: true }
          );
        }
        return ymaps;
      });
    }

    function setRouteFallback(message) {
      const routeStatus = document.getElementById('routeStatus');
      routeStatus.style.display = 'block';
      routeStatus.textContent = message;
      if (yMultiRoute && yMap) {
        try {
          yMap.geoObjects.remove(yMultiRoute);
        } catch (_) {}
        yMultiRoute = null;
      }
    }

    function updateRouteKpi(distanceMeters = 0, durationSec = 0, hint = '-') {
      const km = (Number(distanceMeters || 0) / 1000).toFixed(1);
      const mins = Math.max(1, Math.round(Number(durationSec || 0) / 60));
      document.getElementById('routeDistance').textContent = `${t('dist')}: ${km} ${t('km')}`;
      document.getElementById('routeEta').textContent = `${t('eta')}: ${mins} ${t('min')}`;
      document.getElementById('routeHint').textContent = `${t('hint')}: ${hint}`;
    }

    function buildDirectionHint(coords = []) {
      if (!Array.isArray(coords) || coords.length < 2) return t('straight');
      const [aLng, aLat] = coords[0];
      const [bLng, bLat] = coords[1];
      const dx = Number(bLng) - Number(aLng);
      const dy = Number(bLat) - Number(aLat);
      if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? t('right') : t('left');
      return t('straight');
    }

    function navAddressText(o) {
      const x = o || order;
      if (!x) return '';
      return String(x.addressText || x.customerAddress || x.deliveryAddress || x.location || '').trim();
    }

    function navCoordForUrl(n) {
      const x = Number(n);
      if (!Number.isFinite(x)) return '0';
      return x.toFixed(6);
    }

    /** Ovoz va marshrut ochish bir xil «tap» ichida — iOS Safari uchun shart. */
    function playNavVoiceImmediate() {
      const phrase = t('navVoiceStart');
      try {
        if (!phrase || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(phrase);
        u.lang = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        u.rate = 1.08;
        u.pitch = 1;
        u.volume = 1;
        window.speechSynthesis.speak(u);
      } catch (_) {}
    }

    function routeOriginPoint() {
      return hasValidCoords(lastKnownPosition?.lat, lastKnownPosition?.lng)
        ? { lat: Number(lastKnownPosition.lat), lng: Number(lastKnownPosition.lng) }
        : { lat: STORE_LOCATION.lat, lng: STORE_LOCATION.lng };
    }

    function yandexMapsRouteHttpsUrl() {
      if (!order) return null;
      const from = routeOriginPoint();
      const parts = [];
      const pushPt = (lat, lng) => {
        const la = Number(lat);
        const ln = Number(lng);
        if (!hasValidCoords(la, ln)) return;
        const seg = `${navCoordForUrl(la)},${navCoordForUrl(ln)}`;
        if (parts.length && parts[parts.length - 1] === seg) return;
        parts.push(seg);
      };
      pushPt(from.lat, from.lng);
      const sorted = [...(routeOrders || [])].sort(
        (a, b) => (Number(a.courierStopSeq) || 0) - (Number(b.courierStopSeq) || 0)
      );
      for (const ro of sorted) {
        if (hasValidCoords(ro.locationLat, ro.locationLng)) pushPt(ro.locationLat, ro.locationLng);
      }
      if (parts.length >= 2) {
        return `https://yandex.ru/maps/?rtext=${parts.join('~')}`;
      }
      if (hasValidCoords(order.locationLat, order.locationLng)) {
        return `https://yandex.ru/maps/?rtext=${from.lat},${from.lng}~${Number(order.locationLat)},${Number(order.locationLng)}`;
      }
      const t = navAddressText();
      if (!t) return null;
      return `https://yandex.ru/maps/?text=${encodeURIComponent(t)}`;
    }

    function googleMapsDirUrl() {
      if (!order) return null;
      const from = routeOriginPoint();
      const pts = [];
      const pushUnique = (lat, lng) => {
        if (!hasValidCoords(lat, lng)) return;
        const s = `${Number(lat)},${Number(lng)}`;
        if (pts.length && pts[pts.length - 1] === s) return;
        pts.push(s);
      };
      pushUnique(from.lat, from.lng);
      const sorted = [...(routeOrders || [])].sort(
        (a, b) => (Number(a.courierStopSeq) || 0) - (Number(b.courierStopSeq) || 0)
      );
      for (const ro of sorted) {
        if (hasValidCoords(ro.locationLat, ro.locationLng)) pushUnique(ro.locationLat, ro.locationLng);
      }
      if (pts.length < 2 && hasValidCoords(order.locationLat, order.locationLng)) {
        pushUnique(order.locationLat, order.locationLng);
      }
      if (pts.length < 2) return null;
      const origin = pts[0];
      const destination = pts[pts.length - 1];
      const mid = pts.slice(1, -1);
      let u = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;
      if (mid.length) u += `&waypoints=${mid.join('|')}`;
      return u;
    }

    function yandexNaviDeepUrl() {
      if (!order || !hasValidCoords(order.locationLat, order.locationLng)) return null;
      const from = routeOriginPoint();
      const tLat = Number(order.locationLat);
      const tLng = Number(order.locationLng);
      return `yandexnavi://build_route_on_map?lat_from=${navCoordForUrl(from.lat)}&lon_from=${navCoordForUrl(from.lng)}&lat_to=${navCoordForUrl(tLat)}&lon_to=${navCoordForUrl(tLng)}`;
    }

    function openYandexRouteHttpsNewTab() {
      const u = yandexMapsRouteHttpsUrl();
      if (!u) return;
      window.open(u, '_blank', 'noopener,noreferrer');
    }

    function updateNavButtons() {
      const hasDestinationCoords = hasValidCoords(order?.locationLat, order?.locationLng);
      const hasAddressFallback = navAddressText().length > 0;
      const hasRouteMulti =
        Array.isArray(routeOrders) &&
        routeOrders.some((ro) => hasValidCoords(ro.locationLat, ro.locationLng));
      const ok = hasDestinationCoords || hasAddressFallback || hasRouteMulti;
      ['openGoogleNav', 'openYandexNav', 'openYandexNavi'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.disabled = !ok;
      });
      const fb = document.getElementById('navWebFallback');
      const appL = document.getElementById('openYandexNaviAppLink');
      if (appL) {
        const deep = yandexNaviDeepUrl();
        if (order && ok && deep) {
          appL.href = deep;
          appL.hidden = false;
        } else {
          appL.hidden = true;
          appL.href = '#';
        }
      }
      if (!fb) return;
      if (order && ok) {
        if (hasDestinationCoords) {
          fb.href = yandexMapsRouteHttpsUrl() || '#';
        } else {
          fb.href = `https://yandex.ru/maps/?text=${encodeURIComponent(navAddressText())}`;
        }
        fb.hidden = false;
      } else {
        fb.hidden = true;
        fb.href = '#';
      }
    }

    function buildMapReferencePoints(start, ord, mates) {
      const pts = [];
      const pushUnique = (lat, lng) => {
        if (!hasValidCoords(lat, lng)) return;
        const la = Number(lat);
        const ln = Number(lng);
        const key = `${la.toFixed(5)},${ln.toFixed(5)}`;
        if (pts.length) {
          const p = pts[pts.length - 1];
          const prev = `${Number(p[0]).toFixed(5)},${Number(p[1]).toFixed(5)}`;
          if (prev === key) return;
        }
        pts.push([la, ln]);
      };
      pushUnique(start.lat, start.lng);
      const sorted = [...(mates || [])].sort(
        (a, b) => (Number(a.courierStopSeq) || 0) - (Number(b.courierStopSeq) || 0)
      );
      for (const ro of sorted) {
        if (hasValidCoords(ro.locationLat, ro.locationLng)) pushUnique(ro.locationLat, ro.locationLng);
      }
      if (ord && hasValidCoords(ord.locationLat, ord.locationLng)) pushUnique(ord.locationLat, ord.locationLng);
      return pts.length >= 2 ? pts : null;
    }

    async function maybeUpdateRoute(force = false) {
      if (!order || normCourierStatus(order.status) !== 'out_for_delivery') return;
      const now = Date.now();
      const start = hasValidCoords(lastKnownPosition?.lat, lastKnownPosition?.lng)
        ? { lat: Number(lastKnownPosition.lat), lng: Number(lastKnownPosition.lng) }
        : { lat: STORE_LOCATION.lat, lng: STORE_LOCATION.lng };
      const refPts = buildMapReferencePoints(start, order, routeOrders);
      if (!refPts || refPts.length < 2) return;
      const end = { lat: refPts[refPts.length - 1][0], lng: refPts[refPts.length - 1][1] };
      const movedMinor =
        lastRouteStart &&
        Math.abs(lastRouteStart.lat - start.lat) < 0.0004 &&
        Math.abs(lastRouteStart.lng - start.lng) < 0.0004 &&
        lastRouteEnd &&
        Math.abs(lastRouteEnd.lat - end.lat) < 0.0001 &&
        Math.abs(lastRouteEnd.lng - end.lng) < 0.0001;
      if (!force && movedMinor && now - lastRouteFetchAt < ROUTE_REFRESH_MS) return;
      if (!force && now - lastRouteFetchAt < ROUTE_REFRESH_MS) return;
      lastRouteFetchAt = now;
      lastRouteStart = start;
      lastRouteEnd = end;

      const routeStatus = document.getElementById('routeStatus');
      routeStatus.style.display = 'none';
      routeStatus.textContent = '';

      try {
        const ymaps = await ensureYandexMap(start.lat, start.lng);
        if (!yMap || !ymaps) {
          setRouteFallback(t('routeFail'));
          return;
        }

        if (!yCourierMark) {
          yCourierMark = new ymaps.Placemark(
            [start.lat, start.lng],
            { balloonContent: 'Kuryer' },
            { preset: 'islands#yellowCircleDotIcon' }
          );
          yMap.geoObjects.add(yCourierMark);
        } else {
          yCourierMark.geometry.setCoordinates([start.lat, start.lng]);
        }
        if (!yDestMark) {
          yDestMark = new ymaps.Placemark([end.lat, end.lng], { balloonContent: 'Manzil' }, { preset: 'islands#greenDotIcon' });
          yMap.geoObjects.add(yDestMark);
        } else {
          yDestMark.geometry.setCoordinates([end.lat, end.lng]);
        }

        if (yMultiRoute) {
          try {
            yMap.geoObjects.remove(yMultiRoute);
          } catch (_) {}
          yMultiRoute = null;
        }

        yMultiRoute = new ymaps.multiRouter.MultiRoute(
          {
            referencePoints: refPts,
            params: { routingMode: 'auto' }
          },
          {
            boundsAutoApply: true,
            routeActiveStrokeWidth: 6,
            routeActiveStrokeColor: '#FFD60A',
            routeStrokeWidth: 0
          }
        );

        const onRouteReady = () => {
          const ar = yMultiRoute.getActiveRoute();
          if (!ar) return;
          let distM = 0;
          let durS = 0;
          try {
            const d0 = ar.properties.get('distance');
            const t0 = ar.properties.get('duration');
            distM = typeof d0 === 'object' && d0 && typeof d0.value === 'number' ? d0.value : Number(d0) || 0;
            durS = typeof t0 === 'object' && t0 && typeof t0.value === 'number' ? t0.value : Number(t0) || 0;
          } catch (_) {}
          const hintCoords =
            refPts.length >= 2
              ? [
                  [refPts[refPts.length - 2][1], refPts[refPts.length - 2][0]],
                  [refPts[refPts.length - 1][1], refPts[refPts.length - 1][0]]
                ]
              : [
                  [start.lng, start.lat],
                  [end.lng, end.lat]
                ];
          updateRouteKpi(distM, durS, buildDirectionHint(hintCoords));
        };

        yMultiRoute.model.events.add('requestsuccess', onRouteReady);
        yMap.geoObjects.add(yMultiRoute);
      } catch (_) {
        setRouteFallback(t('routeFail'));
      }
    }

    function flushLastKnownLocation() {
      if (!lastKnownPosition) return;
      api('/courier/' + token + '/location', {
        method: 'POST',
        body: JSON.stringify({
          lat: lastKnownPosition.lat,
          lng: lastKnownPosition.lng,
          accuracy: lastKnownPosition.accuracy
        })
      }).catch(() => null);
    }

    async function refresh() {
      try {
        const data = await api('/courier/' + token);
        order = data.order;
        routeOrders = Array.isArray(data.routeOrders) ? data.routeOrders : [];
        render();
      } catch (e) {
        document.getElementById('msg').textContent = e.message || t('error');
      }
    }

    function prepareGeolocationPermission() {
      if (!navigator.permissions || !navigator.permissions.query) return;
      navigator.permissions.query({ name: 'geolocation' }).catch(() => {});
    }

    document.getElementById('acceptBtn').onclick = async () => {
      const btn = document.getElementById('acceptBtn');
      const nameInput = document.getElementById('courierName');
      const phoneInput = document.getElementById('courierPhone');
      setBusy(btn, true);
      try {
        const data = await api('/courier/' + token + '/accept', {
          method: 'POST',
          body: JSON.stringify({
            courierName: nameInput.value.trim(),
            courierPhone: phoneInput.value.trim()
          })
        });
        await refresh();
        ensureTracking();
        void maybeUpdateRoute(true);
        const mapEl = document.getElementById('courierMap');
        if (mapEl && normCourierStatus(order.status) === 'out_for_delivery') {
          mapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      } catch (e) {
        document.getElementById('msg').textContent = e.message || t('error');
      } finally {
        setBusy(btn, false);
      }
    };

    document.getElementById('deliverBtn').onclick = async () => {
      const btn = document.getElementById('deliverBtn');
      setBusy(btn, true);
      try {
        const data = await api('/courier/' + token + '/deliver', { method: 'POST' });
        order = data.order;
        stopTracking(true);
        const bar = document.getElementById('nextOrderBar');
        const link = document.getElementById('nextOrderLink');
        if (bar && link && data.nextCourierToken) {
          bar.style.display = 'block';
          link.href = `${location.origin}/courier/${encodeURIComponent(data.nextCourierToken)}`;
        } else if (bar) {
          bar.style.display = 'none';
        }
        render();
      } catch (e) {
        document.getElementById('msg').textContent = e.message || t('error');
      } finally {
        setBusy(btn, false);
      }
    };

    document.getElementById('enableGpsBtn').onclick = async () => {
      gpsRequested = true;
      gpsPermissionDenied = false;
      await sendCurrentLocation();
      renderGpsStatus();
    };

    document.getElementById('langUzBtn').onclick = () => {
      currentLang = 'uz';
      localStorage.setItem(langKey, currentLang);
      applyLang();
    };
    document.getElementById('langRuBtn').onclick = () => {
      currentLang = 'ru';
      localStorage.setItem(langKey, currentLang);
      applyLang();
    };

    document.getElementById('openGoogleNav').addEventListener('click', () => {
      if (!order) return;
      playNavVoiceImmediate();
      const multi = googleMapsDirUrl();
      if (multi) {
        window.open(multi, '_blank');
        return;
      }
      if (hasValidCoords(order.locationLat, order.locationLng)) {
        const origin = hasValidCoords(lastKnownPosition?.lat, lastKnownPosition?.lng)
          ? `${Number(lastKnownPosition.lat)},${Number(lastKnownPosition.lng)}`
          : `${STORE_LOCATION.lat},${STORE_LOCATION.lng}`;
        window.open(
          `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${Number(order.locationLat)},${Number(order.locationLng)}`,
          '_blank'
        );
        return;
      }
      const addr = encodeURIComponent(navAddressText());
      if (!addr) return;
      const origin = hasValidCoords(lastKnownPosition?.lat, lastKnownPosition?.lng)
        ? `${Number(lastKnownPosition.lat)},${Number(lastKnownPosition.lng)}`
        : `${STORE_LOCATION.lat},${STORE_LOCATION.lng}`;
      window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${addr}`, '_blank');
    });
    document.getElementById('openYandexNav').addEventListener('click', () => {
      if (!order) return;
      playNavVoiceImmediate();
      openYandexRouteHttpsNewTab();
    });

    document.getElementById('openYandexNavi').addEventListener('click', () => {
      if (!order || document.getElementById('openYandexNavi').disabled) return;
      playNavVoiceImmediate();
      openYandexRouteHttpsNewTab();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        flushLastKnownLocation();
      } else if (order?.status === 'out_for_delivery') {
        sendCurrentLocation();
        acquireWakeLock();
        maybeUpdateRoute(true);
      }
    });
    window.addEventListener('pagehide', () => flushLastKnownLocation());
    window.addEventListener('pageshow', () => {
      if (order?.status === 'out_for_delivery') {
        sendCurrentLocation();
        acquireWakeLock();
        maybeUpdateRoute(true);
      }
    });

    applyLang();
    refresh();
    prepareGeolocationPermission();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
