<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courier</title>
  <style>
    html,body{min-height:100dvh;overflow-x:hidden}
    body{margin:0;background:#07111f;color:#e8f4ff;font-family:Inter,Segoe UI,Arial,sans-serif}
    .wrap{padding:12px;overflow-y:auto}
    .card{width:min(100% - 24px,520px);margin:24px auto;background:linear-gradient(180deg,#10213d,#0a172e);backdrop-filter:blur(10px);border:1px solid #2f5078;border-radius:16px;padding:16px}
    input,button{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #34567f;background:#0b1830;color:#e8f4ff;margin-top:8px;font-size:17px}
    button{cursor:pointer;font-weight:700}
    .primary{background:linear-gradient(90deg,#2aff9b,#28d8ff);color:#04221c;border:none}
    .muted{color:#9ab8df;font-size:13px}
    .ok{color:#9dffcc;font-size:13px;margin-top:10px}
    .warn{color:#ffcf99;font-size:12px;margin-top:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin-top:0;">Courier QR</h2>
      <p id="msg" class="muted"></p>
      <div id="orderInfo" class="muted"></div>
      <div id="liveMsg" class="ok" style="display:none;">Mijoz sizni kuzatib turibdi</div>
      <div id="liveHint" class="muted" style="display:none;">Yetkazish tugaguncha sahifani yopmang va ekran o‘chmasin</div>
      <div id="wakeWarn" class="warn" style="display:none;">Telefon ekranini o‘chirmang, aks holda live kuzatuv vaqtincha to‘xtashi mumkin</div>
      <div id="gpsWarn" class="warn" style="display:none;">GPS ruxsati berilmadi</div>
      <div id="signalWarn" class="warn" style="display:none;">GPS signali vaqtincha yo‘qoldi</div>
      <input id="courierName" placeholder="Courier name" />
      <input id="courierPhone" placeholder="Courier phone" />
      <button id="acceptBtn" class="primary">Buyurtmani qabul qildim</button>
      <button id="deliverBtn" style="display:none;">Mijozga topshirildi</button>
      <div id="successMsg" class="muted" style="display:none;margin-top:10px;color:#9dffcc;">Buyurtma yakunlandi</div>
    </div>
  </div>
  <script>
    const token = location.pathname.split('/').pop();
    let order = null;
    let trackingInterval = null;
    let gpsEnabled = false;
    let gpsPermissionDenied = false;
    let wakeLockSentinel = null;
    let wakeLockSupported = 'wakeLock' in navigator;
    let lastLocationSuccessAt = 0;
    let lastKnownPosition = null;
    async function api(path, options={}) {
      const res = await fetch('/api/v1'+path, { headers: { 'Content-Type':'application/json' }, ...options });
      const data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.message || 'Xatolik');
      return data;
    }
    function setBusy(btn, busy){
      if(!btn) return;
      btn.disabled = !!busy;
      btn.dataset.old = btn.dataset.old || btn.textContent;
      btn.textContent = busy ? 'Yuklanmoqda...' : btn.dataset.old;
    }
    function render(){
      if(!order) return;
      document.getElementById('orderInfo').innerHTML = `#${order.orderNumber} · ${(order.items||[]).length} item · ${Number(order.total||0).toLocaleString('ru-RU')} so'm<br>${order.customerAddress || order.location || '-'}`;
      document.getElementById('msg').textContent = `Status: ${order.status}`;
      const acceptBtn = document.getElementById('acceptBtn');
      const deliverBtn = document.getElementById('deliverBtn');
      const successMsg = document.getElementById('successMsg');
      const nameInput = document.getElementById('courierName');
      const phoneInput = document.getElementById('courierPhone');
      successMsg.style.display = 'none';

      if (order.status === 'waiting_courier') {
        nameInput.style.display = 'block';
        phoneInput.style.display = 'block';
        nameInput.readOnly = false;
        phoneInput.readOnly = false;
        acceptBtn.style.display = 'block';
        deliverBtn.style.display = 'none';
        stopTracking();
      } else if (order.status === 'out_for_delivery') {
        nameInput.style.display = 'block';
        phoneInput.style.display = 'block';
        nameInput.value = order.courierName || '';
        phoneInput.value = order.courierPhone || '';
        nameInput.readOnly = true;
        phoneInput.readOnly = true;
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'block';
        ensureTracking();
      } else if (order.status === 'delivered') {
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'none';
        nameInput.style.display = 'none';
        phoneInput.style.display = 'none';
        successMsg.style.display = 'block';
        stopTracking(true);
      }

      if (order.courierTokenUsed || order.status === 'cancelled') {
        document.getElementById('msg').textContent = 'Bu QR kod ishlatilgan yoki yaroqsiz';
        acceptBtn.style.display = 'none';
        deliverBtn.style.display = 'none';
        nameInput.style.display = 'none';
        phoneInput.style.display = 'none';
        stopTracking();
      }
      renderGpsStatus();
    }

    function renderGpsStatus() {
      const liveMsg = document.getElementById('liveMsg');
      const liveHint = document.getElementById('liveHint');
      const wakeWarn = document.getElementById('wakeWarn');
      const gpsWarn = document.getElementById('gpsWarn');
      const signalWarn = document.getElementById('signalWarn');
      if (!liveMsg || !liveHint || !wakeWarn || !gpsWarn || !signalWarn) return;
      liveMsg.style.display = gpsEnabled ? 'block' : 'none';
      liveHint.style.display = gpsEnabled ? 'block' : 'none';
      wakeWarn.style.display = gpsEnabled && !wakeLockSupported ? 'block' : 'none';
      gpsWarn.style.display = gpsPermissionDenied ? 'block' : 'none';
      signalWarn.style.display = (gpsEnabled && lastLocationSuccessAt && (Date.now() - lastLocationSuccessAt > 20000)) ? 'block' : 'none';
    }

    async function acquireWakeLock() {
      if (!wakeLockSupported || wakeLockSentinel || !order || order.status !== 'out_for_delivery') return;
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
        });
      } catch {
        // ignore and rely on manual screen-on warning
      }
    }

    async function releaseWakeLock() {
      if (!wakeLockSentinel) return;
      try {
        await wakeLockSentinel.release();
      } catch {
        // no-op
      }
      wakeLockSentinel = null;
    }

    function stopTracking(markStopped = false) {
      if (trackingInterval) {
        clearInterval(trackingInterval);
        trackingInterval = null;
      }
      gpsEnabled = false;
      if (markStopped && order) order.courierTrackingStoppedAt = new Date().toISOString();
      releaseWakeLock();
      renderGpsStatus();
    }

    async function sendCurrentLocation() {
      if (!navigator.geolocation || !order || order.status !== 'out_for_delivery') return;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          try {
            const out = await api('/courier/'+token+'/location', {
              method: 'POST',
              body: JSON.stringify({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                accuracy: pos.coords.accuracy
              })
            });
            order = out.order || order;
            lastKnownPosition = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy
            };
            gpsEnabled = true;
            lastLocationSuccessAt = Date.now();
            renderGpsStatus();
          } catch (e) {
            // no-op to keep delivery flow unblocked
          }
          resolve();
        }, () => {
          gpsPermissionDenied = true;
          gpsEnabled = false;
          renderGpsStatus();
          resolve();
        }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 9000 });
      });
    }

    async function ensureTracking() {
      if (trackingInterval || !order || order.status !== 'out_for_delivery') return;
      gpsEnabled = true;
      renderGpsStatus();
      await acquireWakeLock();
      await sendCurrentLocation();
      if (gpsPermissionDenied) return;
      trackingInterval = setInterval(() => { sendCurrentLocation(); }, 5000);
    }

    function prepareGeolocationPermission() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(() => {}, () => {}, { timeout: 3000, maximumAge: 60000 });
    }

    function flushLastKnownLocation() {
      if (!lastKnownPosition) return;
      api('/courier/'+token+'/location', {
        method: 'POST',
        body: JSON.stringify(lastKnownPosition)
      }).catch(() => null);
    }
    async function refresh(){
      try{
        const data = await api('/courier/'+token);
        order = data.order;
        render();
      }catch(e){
        document.getElementById('msg').textContent = e.message;
      }
    }
    document.getElementById('acceptBtn').onclick = async ()=>{
      const btn = document.getElementById('acceptBtn');
      setBusy(btn, true);
      try{
        const data = await api('/courier/'+token+'/accept',{method:'POST',body:JSON.stringify({courierName:courierName.value,courierPhone:courierPhone.value})});
        order = data.order; render();
        ensureTracking();
      }catch(e){alert(e.message)}
      finally{setBusy(btn,false);}
    };
    document.getElementById('deliverBtn').onclick = async ()=>{
      const btn = document.getElementById('deliverBtn');
      setBusy(btn, true);
      try{
        const data = await api('/courier/'+token+'/deliver',{method:'POST'});
        order = data.order;
        stopTracking(true);
        render();
      }catch(e){alert(e.message)}
      finally{setBusy(btn,false);}
    };
    refresh();
    prepareGeolocationPermission();
    setInterval(refresh, 5000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        flushLastKnownLocation();
      } else {
        if (order?.status === 'out_for_delivery') {
          sendCurrentLocation();
          acquireWakeLock();
        }
      }
    });
    window.addEventListener('pagehide', () => {
      flushLastKnownLocation();
    });
    window.addEventListener('pageshow', () => {
      if (order?.status === 'out_for_delivery') {
        sendCurrentLocation();
        acquireWakeLock();
      }
    });
  </script>
</body>
</html>
