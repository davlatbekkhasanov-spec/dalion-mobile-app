<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050b14;
      --bg2: #0a1628;
      --card: #0d1b31;
      --line: rgba(90, 140, 210, 0.35);
      --txt: #eef6ff;
      --muted: #8aa3c8;
      --muted2: #b6c9e6;
      --acc: #2ef0a8;
      --acc2: #38cfff;
      --warn: #ffc14a;
      --danger: #ff6b7a;
      --st-new: #38cfff;
      --st-work: #9b7dff;
      --st-ready: #ffc14a;
      --st-out: #2ef0a8;
      --st-done: #6b8cff;
      --st-cancel: #ff6b7a;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 0;
      height: 100vh;
      max-height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-feature-settings: "tnum" 1;
      color: var(--txt);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(56, 207, 255, 0.12), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(158, 120, 255, 0.1), transparent 50%),
        linear-gradient(180deg, #070f1c 0%, var(--bg) 45%);
    }
    @supports (height: 100svh) {
      body {
        height: 100svh;
        max-height: 100svh;
      }
    }
    .wrap {
      flex: 1 1 0%;
      min-height: 0;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }
    .ops-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
      padding: 12px 14px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(16, 32, 58, 0.92), rgba(8, 18, 34, 0.88));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .ops-brand { display: flex; flex-direction: column; gap: 2px; min-width: 140px; }
    .ops-brand strong { font-size: 15px; letter-spacing: 0.02em; }
    .ops-brand small { color: var(--muted); font-size: 12px; }
    .ops-clock {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.04em;
      padding: 6px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(6, 14, 28, 0.65);
      color: var(--muted2);
    }
    .ops-tools { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1; justify-content: flex-end; }
    input, button {
      background: rgba(10, 22, 42, 0.9);
      border: 1px solid var(--line);
      color: var(--txt);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { background: transparent; }
    .primary {
      background: linear-gradient(100deg, var(--acc), var(--acc2));
      border: none;
      color: #031018;
      font-weight: 700;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; width: 100%; }
    .chip {
      border: 1px solid var(--line);
      background: rgba(8, 18, 34, 0.75);
      color: var(--muted2);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .chip.on {
      border-color: rgba(46, 240, 168, 0.55);
      color: #e8fff6;
      background: rgba(15, 48, 38, 0.55);
      box-shadow: 0 0 0 1px rgba(46, 240, 168, 0.15);
    }
    .stats-bar {
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 18, 34, 0.72);
      padding: 10px 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    }
    .stats-bar[hidden] { display: none !important; }
    .stats-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }
    .stat-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      font-size: 12px;
      color: var(--muted2);
    }
    .stat-chip b {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .stat-money b { font-size: 13px; }
    .sla {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      width: fit-content;
      margin-bottom: 6px;
    }
    .sla-ok {
      color: #c6ffe8;
      border-color: rgba(46, 240, 168, 0.35);
      background: rgba(12, 42, 30, 0.55);
    }
    .sla-warn {
      color: #1a1204;
      border-color: rgba(255, 193, 74, 0.55);
      background: linear-gradient(90deg, rgba(255, 193, 74, 0.95), rgba(255, 214, 120, 0.9));
    }
    .sla-hot {
      color: #fff;
      border-color: rgba(255, 107, 122, 0.65);
      background: linear-gradient(90deg, rgba(200, 48, 72, 0.95), rgba(255, 107, 122, 0.85));
      box-shadow: 0 0 16px rgba(255, 80, 100, 0.25);
    }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .sync-pill {
      font-size: 12px;
      color: var(--muted2);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      max-width: min(420px, 100%);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #2d7f5f;
      color: #9cffcf;
      background: rgba(15, 42, 34, 0.75);
      font-size: 11px;
      font-weight: 700;
    }
    .badge.offline { border-color: #8a4352; color: #ffc8d3; background: rgba(42, 17, 24, 0.75); }
    .token-required {
      flex-shrink: 0;
      border: 1px dashed rgba(193, 122, 139, 0.65);
      background: rgba(43, 17, 25, 0.75);
      color: #ffcad5;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(268px, 1fr));
      grid-template-rows: minmax(0, 1fr);
      gap: 12px;
      flex: 1 1 0%;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      padding-bottom: 4px;
      scrollbar-color: rgba(120, 160, 220, 0.35) transparent;
    }
    .grid.is-loading { opacity: 0.55; pointer-events: none; }
    .col {
      scroll-snap-align: start;
      background: linear-gradient(180deg, rgba(18, 34, 58, 0.95), rgba(8, 18, 34, 0.92));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      align-self: stretch;
      min-height: 0;
      height: 100%;
      min-width: 268px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25);
    }
    .token-input-wrap {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(10, 22, 42, 0.9);
      overflow: hidden;
    }
    .token-input-wrap input {
      border: none;
      border-radius: 0;
      min-width: 140px;
      max-width: 200px;
      background: transparent;
    }
    .token-input-wrap input:focus {
      outline: none;
    }
    #tokenRevealBtn {
      border: none;
      border-left: 1px solid var(--line);
      border-radius: 0;
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      background: rgba(6, 14, 28, 0.55);
    }
    .col-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .col-head h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted2);
    }
    .count-pill {
      font-size: 12px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.65);
      color: var(--txt);
    }
    .col-bar {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .col-bar > i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
      width: 0%;
      transition: width 0.35s ease;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 0%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .ops-card {
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(165deg, rgba(14, 28, 52, 0.98), rgba(8, 16, 32, 0.98));
      border-radius: 14px;
      padding: 12px 12px 12px 14px;
      cursor: pointer;
      overflow: hidden;
    }
    .ops-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--accent, var(--st-new));
    }
    .ops-card.accent-new::before { background: var(--st-new); }
    .ops-card.accent-work::before { background: var(--st-work); }
    .ops-card.accent-ready::before { background: var(--st-ready); }
    .ops-card.accent-out::before { background: var(--st-out); }
    .ops-card.accent-done::before { background: var(--st-done); }
    .ops-card.accent-cancel::before { background: var(--st-cancel); }
    .ops-card__top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .ops-card__no { font-size: 17px; font-weight: 800; letter-spacing: 0.02em; }
    .ops-card__rel { font-size: 12px; font-weight: 600; color: var(--muted2); white-space: nowrap; }
    .ops-card__sum { font-size: 18px; font-weight: 800; color: #fff; white-space: nowrap; }
    .ops-card__who {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 10px;
      margin-bottom: 6px;
    }
    .ops-card__who b { font-size: 14px; }
    .ops-card__who a { color: var(--acc2); text-decoration: none; font-weight: 700; font-size: 13px; }
    .ops-card__who a:hover { text-decoration: underline; }
    .ops-card__addr {
      color: var(--muted2);
      font-size: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .ops-card__thumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .thumb {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
    }
    .thumb-more {
      font-size: 11px;
      font-weight: 800;
      padding: 0 8px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      border-radius: 10px;
      border: 1px dashed var(--line);
      color: var(--muted2);
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    .pill {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pill.payme { border-color: rgba(46, 240, 168, 0.45); color: #cfffec; }
    .pill.cash { border-color: rgba(255, 193, 74, 0.45); color: #ffecc2; }
    .pill.paid { border-color: rgba(46, 240, 168, 0.55); background: rgba(12, 48, 32, 0.45); color: #d8ffef; }
    .pill.unpaid { border-color: rgba(255, 107, 122, 0.45); color: #ffd7dc; }
    .ops-card__foot { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 18, 0.82);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 50;
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(920px, 100%);
      max-height: 95vh;
      overflow: auto;
      background: linear-gradient(180deg, #122642, #081425);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .modal h2 { margin: 0; font-size: 20px; }
    .items { display: grid; gap: 10px; margin-top: 12px; }
    .item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: rgba(10, 22, 42, 0.85);
      border-radius: 12px;
      padding: 10px;
    }
    .item img { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; background: #fff; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .actions button { min-height: 52px; font-size: 16px; font-weight: 700; }
    .actions a.primary { min-height: 52px; font-size: 16px; grid-column: 1 / -1; }
    .full { grid-column: 1 / -1; }
    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      max-width: 360px;
      background: rgba(11, 26, 47, 0.95);
      color: #d4ecff;
      border: 1px solid var(--line);
      padding: 10px 12px;
      border-radius: 12px;
      display: none;
      z-index: 60;
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }
    .toast.err { border-color: #a0485b; color: #ffd7e0; background: rgba(42, 17, 25, 0.95); }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; position: relative; z-index: 2; }
    .card-actions .primary { padding: 8px 12px; font-size: 13px; border-radius: 10px; min-height: 40px; }
    .sound-tools {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sound-tools input[type="range"]#soundVolume {
      width: 88px;
      max-width: 22vw;
      height: 6px;
      accent-color: var(--acc);
      cursor: pointer;
    }
    .sound-tools input[type="range"]#soundVolume:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    @media (max-width: 1100px) {
      .grid { grid-auto-flow: column; grid-template-columns: repeat(6, minmax(280px, 1fr)); }
    }
  </style>
</head>

  <script>
    (function setupFrontendErrorLogger() {
      const STORAGE_KEY = 'gm_frontend_errors';
      const MAX_ITEMS = 60;
      function readSafe() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) { return []; }
      }
      function writeSafe(items) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (_) {}
      }
      function push(type, message, extra) {
        const items = readSafe();
        items.push({ type, message: String(message || 'unknown'), ts: Date.now(), extra: extra || null });
        while (items.length > MAX_ITEMS) items.shift();
        writeSafe(items);
      }
      window.addEventListener('error', (event) => {
        push('error', event?.message, { source: event?.filename, line: event?.lineno, col: event?.colno });
      });
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event?.reason;
        push('unhandledrejection', reason?.message || String(reason || 'promise rejected'));
      });
    })();

    function getAudioContext() {

    /** kind 'new' = yangi buyurtma (zangdor chim); 'route' = yo'lda (muloyimroq) */
    function playBeep(kind) {
      if (!getSoundOn()) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      const drive = getSoundVolume() / 100;
      if (drive <= 0) return;
      try {
        const t0 = ctx.currentTime;
        const makeup = ctx.createGain();
        makeup.gain.value = drive * 4.75;
        makeup.connect(ctx.destination);

        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(6800, t0);
        lp.Q.setValueAtTime(0.45, t0);
        lp.connect(makeup);

        function bellPartial(start, freq, dur, peak, type) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t0 + start);
          const a = t0 + start;
          const b = a + dur;
          const p = Math.max(0.0008, peak);
          g.gain.setValueAtTime(0.0001, a);
          g.gain.exponentialRampToValueAtTime(p, a + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, b);
          osc.connect(g);
          g.connect(lp);
          osc.start(a);
          osc.stop(b + 0.03);
        }

        if (kind === 'route') {
          bellPartial(0, 196, 0.14, 0.42, 'sine');
          bellPartial(0, 392, 0.3, 0.78, 'triangle');
          bellPartial(0.06, 523.25, 0.26, 0.62, 'sine');
          bellPartial(0.12, 659.25, 0.22, 0.5, 'sine');
        } else {
          bellPartial(0, 392, 0.16, 0.52, 'sine');
          bellPartial(0, 783.99, 0.44, 1, 'triangle');
          bellPartial(0.1, 987.77, 0.38, 0.82, 'triangle');
          bellPartial(0.2, 1174.66, 0.32, 0.62, 'sine');
          bellPartial(0.32, 1318.51, 0.24, 0.44, 'sine');
        }
      } catch (_) {}
    }
    function hapticPing(kind) {
      try {
        if (typeof navigator === 'undefined' || !navigator.vibrate) return;
        if (kind === 'route') navigator.vibrate([65, 40, 95]);

      } catch (_) {}
    }
    function snapshotFeed(list) {
      const arr = Array.isArray(list) ? list : [];
      return {
        ids: new Set(arr.map((o) => String(o.id))),
        status: new Map(arr.map((o) => [String(o.id), normalizeStatus(o.status)]))
      };
    }
    function notifyFeedChanges(prev, next) {
      if (!prev || !prev.ids || prev.ids.size === 0) return;
      const nextArr = Array.isArray(next) ? next : [];
      const newOnes = nextArr.filter((o) => !prev.ids.has(String(o.id)));
      if (newOnes.length) {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
        return;
      }
      let route = false;
      for (const o of nextArr) {
        const id = String(o.id);
        const nowS = normalizeStatus(o.status);
        const was = prev.status.get(id);
        if (was !== undefined && was !== nowS && nowS === 'out_for_delivery') route = true;
      }
      if (route && getSoundOn()) {
        playBeep('route');
        hapticPing('route');
      }
    }

    function escapeHtml(s) {
      return String(s ?? '')

    function moneyFmt(n) {

    function relTime(iso) {
      if (!iso) return '—';
      const ts = new Date(iso).getTime();
      if (!Number.isFinite(ts)) return '—';
      const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
      if (sec < 45) return t('relNow');
      if (sec < 3600) return t('relMin').replace('{n}', String(Math.max(1, Math.floor(sec / 60))));
      if (sec < 86400) return t('relHour').replace('{n}', String(Math.max(1, Math.floor(sec / 3600))));
      return t('relDay').replace('{n}', String(Math.max(1, Math.floor(sec / 86400))));
    }

    function slaTierFromCreated(ts) {
      if (!Number.isFinite(ts)) return { mins: 0, tier: 'sla-ok' };
      const mins = Math.floor((Date.now() - ts) / 60000);
      let tier = 'sla-ok';
      if (mins >= 45) tier = 'sla-hot';
      else if (mins >= 15) tier = 'sla-warn';
      return { mins, tier };
    }

      const st = normalizeStatus(o.status);

      const raw = o.created_at;

      const ts = new Date(raw).getTime();
      if (!Number.isFinite(ts)) return '';
      const { mins, tier } = slaTierFromCreated(ts);
      const label = t('slaMins').replace('{n}', String(mins));
      return `<div class="sla-live sla ${tier}" data-created-ts="${ts}">${escapeHtml(label)}</div>`;
    }

    function getFilteredOrders() {

          const raw = o.created_at || o.updated_at;
          if (!raw) return false;
          return new Date(raw) >= start;
        });

      if (viewFilters.payme) list = list.filter((o) => String(o.paymentMethod || '').toLowerCase() === 'payme');
      if (viewFilters.cash) list = list.filter((o) => String(o.paymentMethod || '').toLowerCase() === 'cash');
      if (viewFilters.active) {

      }
      return list;

        ...options

      `).join('');

      const actions = [];
      const courierTok = String(order.courierToken || '').trim();
      if (courierTok && !['delivered', 'cancelled'].includes(status)) {
        const href = `${window.location.origin}/courier/${encodeURIComponent(courierTok)}`;
        actions.push(
          `<a class="primary" href="${escapeHtml(href)}" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:52px;border-radius:12px;font-weight:700;">${escapeHtml(
            t('courierAppLink')
          )}</a>`
        );
      }
      const next = getNextTransition(order);
      if (next) {
        actions.push(
          `<button type="button" class="primary" data-next="${escapeHtml(String(next.to))}">${escapeHtml(
            String(next.label)
          )}</button>`
        );
      }
      if (status !== 'delivered' && status !== 'cancelled') {
        actions.push('<button type="button" class="full" data-cancel="1">Bekor qilish</button>');
      }
      if (status === 'out_for_delivery') {
        actions.push(
          `<button type="button" disabled class="full">Kurierda: ${escapeHtml(
            String(order.courierName || '-').trim()
          )} ${escapeHtml(String(order.courierPhone || '').trim())}</button>`
        );
      }
      if (status === 'delivered') {
        actions.push('<button type="button" disabled class="full">Yetkazildi</button>');
      }
      document.getElementById('mActions').innerHTML = actions.join('');
      document.getElementById('modalOverlay').classList.add('show');
    }

    async function transitionOrder(orderId, nextStatus) {
      const target = orders.find((o) => String(o.id) === String(orderId));
      if (!target) throw new Error('Order topilmadi');
      const currentStatus = normalizeStatus(target.status);
      const targetStatus = normalizeStatus(nextStatus);
      const allowed = allowedTransitions[currentStatus] || [];
      if (!allowed.includes(targetStatus)) throw new Error(`Mumkin bo‘lmagan status o‘tishi: ${currentStatus} -> ${targetStatus}`);
      const previous = orders.map((o) => ({ ...o }));
      const now = new Date().toISOString();
      orders = orders.map((o) => String(o.id) === String(orderId) ? { ...o, status: targetStatus, updated_at: now } : o);
      renderStatsBar();
      renderColumns();
      try {
        await api(`/admin/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status: targetStatus }) });
        showToast(`${t('statusUpdated')}: ${targetStatus}`);
        await refresh({ silent: true });
      } catch (err) {
        orders = previous;
        renderStatsBar();
        renderColumns();
        await refresh({ silent: true });
        throw err;
      }
    }

    async function printReceipt(order) {
      const qr = await api(`/admin/orders/${order.id}/qr`);
      if (!qr.qrDataUrl) throw new Error('QR render bo‘lmadi');
      const w = window.open('', '_blank', 'width=420,height=700');
      if (!w) throw new Error('Print oynasi ochilmadi');
      const rows = (order.items || []).map((it)=>`<tr><td>${it.name||''}</td><td>${it.quantity||0}</td><td>${Number(it.price||0).toLocaleString('ru-RU')}</td><td>${Number(it.subtotal||0).toLocaleString('ru-RU')}</td></tr>`).join('');
      w.document.write(`
        <html><head><title>Chek</title><style>
          body{font-family:Arial;font-size:12px;width:58mm;max-width:58mm;margin:0 auto}
          table{width:100%;border-collapse:collapse}td{padding:2px 0;border-bottom:1px dashed #ccc;vertical-align:top}
          .center{text-align:center}
          .qr{width:150px;height:150px;object-fit:contain}
          @media print { body{width:58mm} }
        </style></head><body>
        <h3 class="center">GlobusMarket</h3>
        <div>Order: ${order.orderNumber}</div>
        <div>Sana: ${new Date().toLocaleString('ru-RU')}</div>
        <div>Mijoz: ${order.customerName||'-'}</div>
        <div>Tel: ${order.customerPhone||'-'}</div>
        <div>Manzil: ${order.customerAddress||order.location||'-'}</div>
        <table><tr><td><b>Nomi</b></td><td><b>Soni</b></td><td><b>Narx</b></td><td><b>Sum</b></td></tr>${rows}</table>
        <h4>Jami: ${Number(order.total||0).toLocaleString('ru-RU')} so'm</h4>
        <div>Status: ${order.status}</div>
        <div class="center" style="margin-top:8px;"><img id="receiptQr" class="qr" src="${qr.qrDataUrl}" alt="courier qr" /></div>
        <div class="center" style="font-size:11px;margin-top:4px;">Kurier buyurtmani qabul qilish uchun QR kodni skaner qiling</div>
        <div style="word-break:break-all;font-size:10px;margin-top:4px;">${qr.courierUrl}</div>
        </body></html>
      `);
      w.document.close();
      const img = w.document.getElementById('receiptQr');
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('QR render bo‘lmadi')), 2500);
        img.onload = () => { clearTimeout(timeout); resolve(); };
        img.onerror = () => { clearTimeout(timeout); reject(new Error('QR render bo‘lmadi')); };
      });
      w.focus();
      w.print();
    }

    async function loadDisplayOrders() {
      try {
        const { orders: feedOrders } = await fetch('/api/v1/orders-display/feed', {
          headers: { 'Content-Type': 'application/json' }
        }).then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || 'Display feed error');
          return data;
        });
        return { orders: Array.isArray(feedOrders) ? feedOrders : [], source: 'display-feed' };
      } catch (_) {
        const { orders: adminOrders } = await api('/admin/orders');
        return { orders: Array.isArray(adminOrders) ? adminOrders : [], source: 'admin-feed' };
      }
    }

    async function refresh({ silent = false } = {}) {
      if (isRefreshing) return;
      isRefreshing = true;
      const gridEl = document.getElementById('columns');
      if (gridEl && !silent) gridEl.classList.add('is-loading');
      const token = getToken();
      document.getElementById('tokenRequired').style.display = 'none';
      try {
        const prev = snapshotFeed(orders);
        const { orders: list, source } = await loadDisplayOrders();
        orders = list || [];
        notifyFeedChanges(prev, orders);
        renderStatsBar();
        renderColumns();
        if (activeOrder) {
          const upd = orders.find((o) => o.id === activeOrder.id);
          if (upd) renderModal(upd);
        }
        document.getElementById('online').textContent = t('online');
        document.getElementById('online').classList.remove('offline');
        document.getElementById('network').textContent = source === 'display-feed' ? '' : 'Display feed mavjud emas, admin feed ishlatilmoqda';
        pollDelay = 2500;
      } catch (e) {
        document.getElementById('tokenRequired').style.display = token ? 'none' : 'block';
        document.getElementById('online').textContent = t('offline');
        document.getElementById('online').classList.add('offline');
        document.getElementById('network').textContent = token ? 'Aloqa uzildi, qayta ulanmoqda...' : 'Display uchun token yoki server aloqasi kerak';
        if (!silent) showToast(e.message || t('refreshError'), true);
        pollDelay = Math.min(12000, Math.round(pollDelay * 1.5));
      } finally {
        if (gridEl) gridEl.classList.remove('is-loading');
        const lu = document.getElementById('lastUpdated');
        const loc = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        if (lu) {
          lu.dataset.ticking = '1';
          lu.textContent = `${t('syncPrefix')} ${new Date().toLocaleTimeString(loc)} · ${t('intervalSuffix')} ${Math.round(
            pollDelay / 1000
          )}s`;
        }
        isRefreshing = false;
        clearTimeout(pollTimer);
        pollTimer = setTimeout(() => refresh({ silent: true }), pollDelay);
      }
    }

    document.getElementById('tokenInput').value = getToken();
    document.getElementById('tokenRevealBtn').onclick = () => {
      const inp = document.getElementById('tokenInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      syncTokenRevealUi();
    };
    document.getElementById('saveTokenBtn').onclick = () => {
      localStorage.setItem(tokenKey, document.getElementById('tokenInput').value.trim());
      document.getElementById('tokenInput').type = 'password';
      syncTokenRevealUi();
      refresh();
    };

    document.getElementById('fullscreenBtn').onclick = async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(()=>{});
      else await document.exitFullscreen().catch(()=>{});
    };

    document.getElementById('soundToggle').onclick = () => {
      setSoundOn(!getSoundOn());
      syncSoundToggle();
      if (getSoundOn()) {
        const ctx = getAudioContext();
        if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        playBeep('new');
        hapticPing('new');
      }
    };

    (function bindSoundVolume() {
      const el = document.getElementById('soundVolume');
      if (!el) return;
      el.addEventListener('input', (e) => {
        setSoundVolume(e.target.value);
      });
      el.addEventListener('change', () => {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
      });
    })();

    document.getElementById('columns').onclick = (e) => {
      const quickBtn = e.target.closest('[data-quick-next]');
      if (quickBtn) {
        e.preventDefault();
        e.stopPropagation();
        if (quickBtn.disabled) return;
        const orderId = quickBtn.dataset.orderId;
        const prevText = quickBtn.textContent;
        quickBtn.disabled = true;
        quickBtn.textContent = t('loading');
        transitionOrder(orderId, quickBtn.dataset.quickNext).catch((err) => {
          showToast(err.message || t('statusChangeError'), true);
        }).finally(() => {
          quickBtn.disabled = false;
          quickBtn.textContent = prevText;
        });
        return;
      }
      const card = e.target.closest('[data-order-id]');
      if (!card) return;
      const order = orders.find((o) => o.id === card.dataset.orderId);
      if (order) renderModal(order);
    };

    document.getElementById('closeModal').onclick = () => {
      activeOrder = null;
      document.getElementById('modalOverlay').classList.remove('show');
    };

    document.getElementById('mActions').onclick = async (e) => {
      const btn = e.target.closest('button');
      if (!btn || !activeOrder) return;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = t('loading');
      try {
        if (btn.dataset.next) {
          await transitionOrder(activeOrder.id, btn.dataset.next);
        } else if (btn.dataset.cancel) {
          await api(`/admin/orders/${activeOrder.id}/cancel`, { method: 'POST' });
          showToast('Buyurtma bekor qilindi');
        } else if (btn.dataset.tsd) {
          await api(`/admin/orders/${activeOrder.id}/send-to-tsd`, { method: 'POST' });
        } else if (btn.dataset.print) {
          await printReceipt(activeOrder);
        }
        await refresh({ silent: true });
      } catch (err) {
        showToast(err.message || 'Xatolik', true);
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    };

    (function startOpsClock() {
      const tick = () => {
        const el = document.getElementById('clock');
        if (!el) return;
        const loc = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        el.textContent = new Date().toLocaleTimeString(loc, {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
      };
      tick();
      setInterval(tick, 1000);
    })();

    setInterval(tickSlaLabels, 30000);

    document.getElementById('filterChips').addEventListener('click', (e) => {
      const b = e.target.closest('[data-filter]');
      if (!b) return;
      const k = b.dataset.filter;
      if (!Object.prototype.hasOwnProperty.call(viewFilters, k)) return;
      viewFilters[k] = !viewFilters[k];
      if (k === 'payme' && viewFilters.payme) viewFilters.cash = false;
      if (k === 'cash' && viewFilters.cash) viewFilters.payme = false;
      renderFilterChips();
      renderColumns();
    });

    document.getElementById('langUzBtn').onclick = () => { currentLang = 'uz'; localStorage.setItem(langKey, currentLang); applyLang(); };
    document.getElementById('langRuBtn').onclick = () => { currentLang = 'ru'; localStorage.setItem(langKey, currentLang); applyLang(); };
    applyLang();
    refresh();
  </script>
</body>
</html>
