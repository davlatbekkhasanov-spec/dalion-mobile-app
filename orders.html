<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #040a12;
      --bg2: #0a1628;
      --card: #0d1b31;
      --line: rgba(90, 140, 210, 0.32);
      --line-strong: rgba(120, 180, 255, 0.45);
      --txt: #f4f9ff;
      --muted: #8aa3c8;
      --muted2: #c5d8f2;
      --acc: #2ef0a8;
      --acc2: #38cfff;
      --warn: #ffc14a;
      --danger: #ff6b7a;
      --live: #3dffb8;
      --st-new: #38cfff;
      --st-work: #9b7dff;
      --st-ready: #ffc14a;
      --st-out: #2ef0a8;
      --st-done: #6b8cff;
      --st-cancel: #ff6b7a;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.5);
      --shadow-card: 0 10px 28px rgba(0, 0, 0, 0.35);
      --radius: 18px;
      --radius-sm: 12px;
      --glass: rgba(12, 24, 44, 0.72);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 0;
      height: 100vh;
      max-height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-feature-settings: "tnum" 1;
      color: var(--txt);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(56, 207, 255, 0.14), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(158, 120, 255, 0.12), transparent 50%),
        linear-gradient(180deg, #070f1c 0%, var(--bg) 45%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(56, 207, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 207, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 20%, transparent 70%);
    }
    @supports (height: 100svh) {
      body {
        height: 100svh;
        max-height: 100svh;
      }
    }
    .wrap {
      flex: 1 1 0%;
      min-height: 0;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }
    .ops-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 12px 14px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(18, 36, 64, 0.94), rgba(8, 18, 34, 0.9));
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .ops-bar-row {
      display: flex;
      align-items: center;
      gap: 8px 10px;
      min-width: 0;
    }
    .ops-bar-row--head {
      flex-wrap: nowrap;
      justify-content: space-between;
    }
    .ops-bar-row--tools {
      flex-wrap: nowrap;
    }
    .ops-brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .ops-head-status {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .ops-brand strong { font-size: 15px; letter-spacing: 0.02em; }
    .ops-brand small { color: var(--muted); font-size: 12px; }
    .ops-clock {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.04em;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(6, 14, 28, 0.65);
      color: var(--muted2);
      flex: 0 0 auto;
      width: 7.25rem;
      text-align: center;
      box-sizing: border-box;
    }
    .ops-bar-row--tools .ops-tools {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      flex: 1 1 100%;
      width: 100%;
      min-width: 0;
      justify-content: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      padding-bottom: 2px;
    }
    .ops-tools > * { flex-shrink: 0; }
    #fullscreenBtn {
      min-width: 2.75rem;
      width: 2.75rem;
      padding-left: 0;
      padding-right: 0;
      font-size: 18px;
      line-height: 1;
    }
    #saveTokenBtn {
      min-width: 6.75rem;
      white-space: nowrap;
    }
    #langUzBtn, #langRuBtn {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    #soundToggle {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    .ops-network {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      min-height: 0;
      max-height: 0;
      overflow: hidden;
      padding: 0;
    }
    .ops-network:not(:empty) {
      min-height: 1.35em;
      max-height: 2.7em;
      padding: 0 2px 2px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex: 1 1 100%;
      width: 100%;
      min-width: 0;
    }
    input, button {
      background: rgba(10, 22, 42, 0.9);
      border: 1px solid var(--line);
      color: var(--txt);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { background: transparent; }
    .primary {
      background: linear-gradient(100deg, var(--acc), var(--acc2));
      border: none;
      color: #031018;
      font-weight: 700;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(8, 18, 34, 0.75);
      color: var(--muted2);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .chip.on {
      border-color: rgba(46, 240, 168, 0.55);
      color: #e8fff6;
      background: rgba(15, 48, 38, 0.55);
      box-shadow: 0 0 0 1px rgba(46, 240, 168, 0.15);
    }
    .stats-bar {
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 18, 34, 0.72);
      padding: 10px 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
      min-height: 46px;
      box-sizing: border-box;
    }
    .stats-bar[hidden] { display: none !important; }
    .courier-staff-bar {
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(90deg, rgba(255, 193, 7, 0.1), rgba(8, 18, 34, 0.75));
      padding: 8px 10px;
      min-height: 44px;
      max-height: 120px;
      overflow: auto;
      box-sizing: border-box;
    }
    .courier-staff-bar[hidden] { display: none !important; }
    .cstaff-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .cstaff-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--warn);
      width: 100%;
    }
    .cstaff-chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      color: var(--muted2);
    }
    .cstaff-chip small {
      color: var(--muted);
      margin-left: 6px;
      font-weight: 600;
    }
    .stats-inner {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }
    @media (max-width: 1100px) {
      .stats-inner {
        grid-template-columns: repeat(5, minmax(128px, 1fr));
        overflow-x: auto;
        padding-bottom: 2px;
      }
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14, 28, 50, 0.9), rgba(6, 14, 28, 0.85));
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .stat-chip b {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .stat-chip.stat-money b { font-size: 14px; }
    .stat-money b { font-size: 13px; }
    .sla {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      width: fit-content;
      margin-bottom: 6px;
    }
    .sla-ok {
      color: #c6ffe8;
      border-color: rgba(46, 240, 168, 0.35);
      background: rgba(12, 42, 30, 0.55);
    }
    .sla-warn {
      color: #1a1204;
      border-color: rgba(255, 193, 74, 0.55);
      background: linear-gradient(90deg, rgba(255, 193, 74, 0.95), rgba(255, 214, 120, 0.9));
    }
    .sla-hot {
      color: #fff;
      border-color: rgba(255, 107, 122, 0.65);
      background: linear-gradient(90deg, rgba(200, 48, 72, 0.95), rgba(255, 107, 122, 0.85));
      box-shadow: 0 0 16px rgba(255, 80, 100, 0.25);
    }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .sync-pill {
      font-size: 11px;
      color: var(--muted2);
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 12, 24, 0.55);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 9.5rem;
      box-sizing: border-box;
    }
    .sync-pill--live {
      border-color: rgba(61, 255, 184, 0.4);
      background: linear-gradient(90deg, rgba(12, 42, 32, 0.75), rgba(8, 22, 40, 0.75));
      box-shadow: 0 0 20px rgba(46, 240, 168, 0.08);
    }
    .sync-pill__time {
      display: inline-block;
      min-width: 4.6rem;
      text-align: center;
      font-weight: 600;
    }
    .sync-pill__live {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--live);
    }
    .badge {
      padding: 5px 11px 5px 8px;
      border-radius: 999px;
      border: 1px solid #2d7f5f;
      color: #9cffcf;
      background: rgba(15, 42, 34, 0.75);
      font-size: 11px;
      font-weight: 800;
      min-width: 5.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-sizing: border-box;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge--live { box-shadow: 0 0 24px rgba(46, 240, 168, 0.12); }
    .badge.offline {
      border-color: #8a4352;
      color: #ffc8d3;
      background: rgba(42, 17, 24, 0.75);
      box-shadow: none;
    }
    .badge.offline .live-dot { background: #ff8a9a; box-shadow: none; animation: none; }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 rgba(61, 255, 184, 0.55);
      animation: livePulse 2s ease-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0% { box-shadow: 0 0 0 0 rgba(61, 255, 184, 0.55); }
      70% { box-shadow: 0 0 0 8px rgba(61, 255, 184, 0); }
      100% { box-shadow: 0 0 0 0 rgba(61, 255, 184, 0); }
    }
    .token-required {
      flex-shrink: 0;
      border: 1px dashed rgba(193, 122, 139, 0.65);
      background: rgba(43, 17, 25, 0.75);
      color: #ffcad5;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
    }
    .grid {
      display: grid;
      grid-template-columns:
        minmax(220px, 0.85fr)
        minmax(304px, 1.52fr)
        minmax(268px, 1.18fr)
        minmax(248px, 1.06fr)
        minmax(200px, 0.72fr)
        minmax(188px, 0.62fr);
      grid-template-rows: minmax(0, 1fr);
      gap: 12px;
      flex: 1 1 0%;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      padding-bottom: 4px;
      scrollbar-color: rgba(120, 160, 220, 0.35) transparent;
    }
    .grid.is-loading { pointer-events: none; }
    .col {
      --col-accent: var(--acc2);
      scroll-snap-align: start;
      background: linear-gradient(180deg, rgba(20, 38, 66, 0.96), rgba(8, 18, 34, 0.94));
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 10px 12px;
      display: flex;
      flex-direction: column;
      align-self: stretch;
      min-height: 0;
      height: 100%;
      min-width: 0;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25);
      position: relative;
      overflow: hidden;
    }
    .col::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--col-accent), transparent 85%);
      opacity: 0.95;
      pointer-events: none;
    }
    .col[data-col="new"] { --col-accent: var(--st-new); }
    .col[data-col="preparing"] { --col-accent: var(--st-work); }
    .col[data-col="ready"] { --col-accent: var(--st-ready); }
    .col[data-col="out_for_delivery"] { --col-accent: var(--st-out); }
    .col[data-col="delivered"] { --col-accent: var(--st-done); }
    .col[data-col="cancelled"] { --col-accent: var(--st-cancel); }
    .col--busy {
      border-color: color-mix(in srgb, var(--col-accent) 42%, var(--line));
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.32), inset 0 1px 0 color-mix(in srgb, var(--col-accent) 18%, transparent);
    }
    .col--preparing.col--busy .list { scrollbar-color: color-mix(in srgb, var(--st-work) 55%, transparent) transparent; }
    .token-input-wrap {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(10, 22, 42, 0.9);
      overflow: hidden;
    }
    .token-input-wrap input {
      border: none;
      border-radius: 0;
      min-width: 140px;
      max-width: 200px;
      background: transparent;
    }
    .token-input-wrap input:focus {
      outline: none;
    }
    #tokenRevealBtn {
      border: none;
      border-left: 1px solid var(--line);
      border-radius: 0;
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      background: rgba(6, 14, 28, 0.55);
    }
    .col-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0 8px;
      padding-top: 2px;
      flex-shrink: 0;
      flex-wrap: nowrap;
    }
    .col-head__title {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .col-mark {
      width: 10px;
      height: 10px;
      margin-top: 4px;
      border-radius: 50%;
      background: var(--col-accent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--col-accent) 65%, transparent);
      flex-shrink: 0;
    }
    .col-icon {
      opacity: 0.85;
      margin-right: 2px;
    }
    .col-head h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--txt);
      flex: 1 1 auto;
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }
    .col--preparing .col-head h3 { font-size: 12px; letter-spacing: 0.04em; }
    .count-pill {
      font-size: 12px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      padding: 4px 10px;
      min-width: 2.2em;
      text-align: center;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--col-accent) 35%, var(--line));
      background: color-mix(in srgb, var(--col-accent) 12%, rgba(5, 12, 24, 0.72));
      color: var(--txt);
      flex-shrink: 0;
    }
    .count-pill:empty,
    .count-pill[data-count="0"] {
      opacity: 0.55;
      border-color: var(--line);
      background: rgba(5, 12, 24, 0.55);
    }
    .col-bar {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .col-bar > i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--col-accent), color-mix(in srgb, var(--col-accent) 40%, var(--acc2)));
      width: 0%;
      transition: width 0.35s ease;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 0%;
      min-height: 88px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .list-empty {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 16px 10px;
      border: 1px dashed color-mix(in srgb, var(--col-accent) 28%, var(--line));
      border-radius: 12px;
      background: rgba(5, 12, 24, 0.35);
      text-align: center;
    }
    .list-empty p {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.45;
      max-width: 16ch;
    }
    .ops-card {
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(165deg, rgba(16, 32, 58, 0.98), rgba(8, 16, 32, 0.98));
      border-radius: 16px;
      padding: 12px 12px 12px 15px;
      cursor: pointer;
      overflow: hidden;
      min-width: 0;
      box-shadow: var(--shadow-card);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .ops-card:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.42);
    }
    .ops-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--accent, var(--st-new));
    }
    .ops-card.accent-new::before { background: var(--st-new); }
    .ops-card.accent-work::before { background: var(--st-work); }
    .ops-card.accent-ready::before { background: var(--st-ready); }
    .ops-card.accent-out::before { background: var(--st-out); }
    .ops-card.accent-done::before { background: var(--st-done); }
    .ops-card.accent-cancel::before { background: var(--st-cancel); }
    .ops-card__hero {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px 10px;
      margin-bottom: 10px;
    }
    .ops-card__no {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }
    .ops-card__sum {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
      margin-left: auto;
    }
    .ops-card__rel {
      width: 100%;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .ops-card__customer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 12px;
      margin-bottom: 6px;
    }
    .ops-card__customer b {
      font-size: 15px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .ops-card__customer a {
      color: var(--acc2);
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }
    .ops-card__customer a:hover { text-decoration: underline; }
    .ops-card__addr {
      display: flex;
      gap: 6px;
      align-items: flex-start;

    (function setupFrontendErrorLogger() {
      const STORAGE_KEY = 'gm_frontend_errors';
      const MAX_ITEMS = 60;
      function readSafe() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) { return []; }
      }
      function writeSafe(items) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (_) {}
      }
      function push(type, message, extra) {
        const items = readSafe();
        items.push({ type, message: String(message || 'unknown'), ts: Date.now(), extra: extra || null });
        while (items.length > MAX_ITEMS) items.shift();
        writeSafe(items);
      }
      window.addEventListener('error', (event) => {
        push('error', event?.message, { source: event?.filename, line: event?.lineno, col: event?.colno });
      });
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event?.reason;
        push('unhandledrejection', reason?.message || String(reason || 'promise rejected'));
      });
    })();

    let orders = [];

    const POLL_MS_FALLBACK = 3000;

    function saveExpandedCols() {
      localStorage.setItem(expandedColsKey, JSON.stringify([...expandedCols]));
    }
    function isColCollapsed(group) {
      if (group.items.length > 0) return false;
      return !expandedCols.has(group.key);
    }
    function colStaleCount(items) {
      return items.filter((o) => {
        const ts = new Date(o.created_at || 0).getTime();
        return Number.isFinite(ts) && Date.now() - ts > 20 * 60000;
      }).length;
    }
    function setFocusMode(on) {
      document.body.classList.toggle('mode-focus', on);
      localStorage.setItem(focusModeKey, on ? '1' : '0');
      const btn = document.getElementById('focusModeBtn');
      if (btn) {
        btn.classList.toggle('on', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.textContent = on ? t('focusOn') : t('focusOff');
      }
    }
    function syncSettingsTokenFields() {
      const tok = getToken();
      const inp = document.getElementById('tokenInputSettings');
      const main = document.getElementById('tokenInput');
      if (main) main.value = tok;
      if (inp) inp.value = tok;
    }

      syncSettingsTokenFields();
      document.getElementById('settingsTitle').textContent = t('settingsTitle');

      document.getElementById('saveTokenSettingsBtn').textContent = t('saveToken');
      document.getElementById('settingsOverlay').classList.add('show');

      document.getElementById('settingsOverlay').classList.remove('show');

    const allowedTransitions = {
      created: ['payment_pending', 'payment_confirmed', 'preparing', 'cancelled'],
      payment_pending: ['payment_confirmed', 'preparing', 'cancelled'],
      payment_confirmed: ['preparing', 'cancelled'],

      ready_for_courier: ['courier_assigned', 'out_for_delivery', 'cancelled'],
      courier_assigned: ['out_for_delivery', 'cancelled'],

    function normalizeStatus(status) {

    function getAudioContext() {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      if (!webAudioCtx) webAudioCtx = new AC();
      return webAudioCtx;
    }
    /** kind 'new' = yangi buyurtma (zangdor chim); 'route' = yo'lda (muloyimroq) */
    function playBeep(kind) {
      if (!getSoundOn()) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      const drive = getSoundVolume() / 100;
      if (drive <= 0) return;
      try {
        const t0 = ctx.currentTime;
        const makeup = ctx.createGain();
        makeup.gain.value = drive * 4.75;
        makeup.connect(ctx.destination);

        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(6800, t0);
        lp.Q.setValueAtTime(0.45, t0);
        lp.connect(makeup);

        function bellPartial(start, freq, dur, peak, type) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t0 + start);
          const a = t0 + start;
          const b = a + dur;
          const p = Math.max(0.0008, peak);
          g.gain.setValueAtTime(0.0001, a);
          g.gain.exponentialRampToValueAtTime(p, a + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, b);
          osc.connect(g);
          g.connect(lp);
          osc.start(a);
          osc.stop(b + 0.03);
        }

        if (kind === 'route') {
          bellPartial(0, 196, 0.14, 0.42, 'sine');
          bellPartial(0, 392, 0.3, 0.78, 'triangle');
          bellPartial(0.06, 523.25, 0.26, 0.62, 'sine');
          bellPartial(0.12, 659.25, 0.22, 0.5, 'sine');
        } else {
          bellPartial(0, 392, 0.16, 0.52, 'sine');
          bellPartial(0, 783.99, 0.44, 1, 'triangle');
          bellPartial(0.1, 987.77, 0.38, 0.82, 'triangle');
          bellPartial(0.2, 1174.66, 0.32, 0.62, 'sine');
          bellPartial(0.32, 1318.51, 0.24, 0.44, 'sine');
        }
      } catch (_) {}
    }
    function hapticPing(kind) {
      try {
        if (typeof navigator === 'undefined' || !navigator.vibrate) return;
        if (kind === 'route') navigator.vibrate([65, 40, 95]);
        else navigator.vibrate([95, 55, 95, 55, 180]);
      } catch (_) {}
    }
    function snapshotFeed(list) {
      const arr = Array.isArray(list) ? list : [];
      return {

        status: new Map(arr.map((o) => [String(o.id), normalizeStatus(o.status)]))
      };
    }
    function notifyFeedChanges(prev, next) {
      if (!prev || !prev.ids || prev.ids.size === 0) return;
      const nextArr = Array.isArray(next) ? next : [];
      const newOnes = nextArr.filter((o) => !prev.ids.has(String(o.id)));
      if (newOnes.length) {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
        return;
      }
      let route = false;
      for (const o of nextArr) {
        const id = String(o.id);
        const nowS = normalizeStatus(o.status);
        const was = prev.status.get(id);
        if (was !== undefined && was !== nowS && nowS === 'out_for_delivery') route = true;
      }
      if (route && getSoundOn()) {
        playBeep('route');
        hapticPing('route');
      }
    }

    function escapeHtml(s) {

    function relTime(iso) {
      if (!iso) return '—';
      const ts = new Date(iso).getTime();
      if (!Number.isFinite(ts)) return '—';
      const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
      if (sec < 45) return t('relNow');
      if (sec < 3600) return t('relMin').replace('{n}', String(Math.max(1, Math.floor(sec / 60))));
      if (sec < 86400) return t('relHour').replace('{n}', String(Math.max(1, Math.floor(sec / 3600))));
      return t('relDay').replace('{n}', String(Math.max(1, Math.floor(sec / 86400))));
    }

    function slaTierFromCreated(ts) {
      if (!Number.isFinite(ts)) return { mins: 0, tier: 'sla-ok' };
      const mins = Math.floor((Date.now() - ts) / 60000);
      let tier = 'sla-ok';
      if (mins >= 45) tier = 'sla-hot';
      else if (mins >= 15) tier = 'sla-warn';
      return { mins, tier };
    }
    function formatSlaLabel(mins) {
      const m = Math.max(0, Math.floor(Number(mins) || 0));
      if (m < 90) return t('slaMins').replace('{n}', String(m));
      if (m < 1440) return t('slaHours').replace('{n}', String(Math.floor(m / 60)));
      return t('slaDays').replace('{n}', String(Math.floor(m / 1440)));
    }

    function buildStatsFingerprint(list) {
      const arr = Array.isArray(list) ? list : [];
      if (!arr.length) return '0';
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const today = arr.filter((o) => new Date(o.created_at || 0) >= start);
      const active = arr.filter((o) => !['delivered', 'cancelled'].includes(normalizeStatus(o.status)));
      const sum = (xs) => xs.reduce((s, o) => s + Number(o.total || 0), 0);
      return `${arr.length}:${today.length}:${active.length}:${sum(arr)}:${sum(today)}`;
    }
    function buildColumnsFingerprint() {
      return getFilteredOrders()
        .map((o) => {
          const next = getNextTransition(o);
          return [
            o.id,
            normalizeStatus(o.status),
            o.total || 0,
            o.courierName || '',
            o.paymentStatus || '',

    function schedulePollFallback() {
      clearTimeout(pollTimer);
      if (document.hidden) return;
      pollTimer = setTimeout(() => refresh({ silent: true }), pollDelay);
    }

    function scheduleSseRetry() {
      if (sseRetryTimer || document.hidden) return;
      sseRetryTimer = setTimeout(() => {
        sseRetryTimer = null;
        if (!document.hidden && liveState !== 'live') startLiveFeed();
      }, 12000);
    }

    function startLiveFeed() {
      stopLiveFeed();
      if (document.hidden) {
        setLiveStatus('paused');
        return;
      }
      if (typeof EventSource === 'undefined') {
        setLiveStatus('offline');
        schedulePollFallback();
        return;
      }
      setLiveStatus('connecting');
      feedStream = new EventSource('/api/v1/orders-display/stream');
      feedStream.addEventListener('feed', (ev) => {
        try {
          const data = JSON.parse(ev.data);
          applyFeedFromServer(Array.isArray(data.orders) ? data.orders : [], 'display-stream');
        } catch (_) {
          /* ignore malformed chunk */
        }
      });
      feedStream.addEventListener('error', () => {
        /* server error event */
      });
      feedStream.onopen = () => {
        clearTimeout(pollTimer);
        setLiveStatus('live', 'SSE');
      };
      feedStream.onerror = () => {
        stopLiveFeed();
        setLiveStatus('offline');
        pollDelay = POLL_MS_FALLBACK;
        schedulePollFallback();
        scheduleSseRetry();
      };
    }

      if (feedApplyCount % 5 === 0) loadCourierStaff();
      const nextColFp = buildColumnsFingerprint();
      if (prevColFp === nextColFp && lastColumnsFingerprint === nextColFp) {
        patchCardsLiveMeta();
      } else {
        lastColumnsFingerprint = '';
        scheduleRenderColumns();

      if (activeOrder) {
        const upd = orders.find((o) => o.id === activeOrder.id);
        if (upd) renderModal(upd);

      document.getElementById('network').textContent =
        source === 'display-stream' || source === 'display-feed'

      if (liveState !== 'paused') setLiveStatus('live', source);

        preparing: 'Yig‘ish jarayonida',
        ready_for_courier: 'Kurier biriktirilmoqda',
        courier_assigned: 'Kurier biriktirildi',
        out_for_delivery: 'Yo‘lda',
        delivered: 'Yetkazib berildi',
        cancelled: 'Bekor qilingan'
      }[normalizeStatus(status)] || status || '-';
    }
    function getNextTransition(order) {
      if (!order) return null;
      const status = normalizeStatus(order.status);
      if (status === 'created' || status === 'payment_pending' || status === 'payment_confirmed') {
        return { to: 'preparing', label: 'Tovar terilmoqda' };
      }
      if (status === 'preparing') return { to: 'ready_for_courier', label: 'Kurier kutilmoqda' };
      if (status === 'ready_for_courier') {
        return order.courierName
          ? { to: 'out_for_delivery', label: 'Kurier yo‘lga chiqdi' }
          : { to: 'courier_assigned', label: 'Kurier biriktirish' };
      }
      if (status === 'courier_assigned') return { to: 'out_for_delivery', label: 'Yetkazishga chiqarish' };
      if (status === 'out_for_delivery') return { to: 'delivered', label: 'Yetkazildi' };
      return null;
    }

    async function api(path, options = {}) {
      const token = getToken();
      const res = await fetch('/api/v1' + path, {
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
        ...options
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.message || t('refreshError'));
      return data;
    }

    function renderColumns() {
      scheduleRenderColumns();
    }
    function applyBoardGridColumns(grouped) {
      const grid = document.getElementById('columns');
      if (!grid) return;
      if (window.matchMedia('(max-width: 1100px)').matches) {
        grid.style.gridTemplateColumns = '';
        return;
      }
      const maxCount = Math.max(1, ...grouped.map((g) => g.items.length));
      const parts = grouped.map((group) => {
        if (isColCollapsed(group)) return '56px';
        const meta = statusGroups.find((s) => s.key === group.key) || {};
        const base = meta.boardWeight ?? 1;
        const minW = meta.boardMin ?? 250;
        const load = group.items.length / maxCount;
        const fr = base * (0.58 + 0.42 * load);
        return `minmax(${minW}px, ${fr.toFixed(3)}fr)`;
      });
      grid.style.gridTemplateColumns = parts.join(' ');
    }
    function renderOrderCard(o) {
      const id = escapeHtml(String(o.id));
      const num = escapeHtml(String(o.orderNumber || o.id));
      const name = escapeHtml(String(o.customerName || '').trim() || t('guest'));
      const phoneRaw = String(o.customerPhone || '').trim();
      const phoneHref = phoneRaw ? `tel:${escapeHtml(phoneRaw.replace(/\s+/g, ''))}` : '';
      const phoneTxt = escapeHtml(phoneRaw || '—');
      const addrRaw = [o.customerAddress, o.addressText, o.location]
        .map((x) => String(x || '').trim())
        .find(Boolean);
      const addr = escapeHtml(addrRaw || '—');
      const lm = escapeHtml(String(o.landmarkText || '').trim());
      const landmarkLine = lm
        ? `<div class="muted" style="margin-bottom:4px;font-size:11px;">Orientir: ${lm}</div>`
        : '';
      const next = getNextTransition(o);
      const nextBtn = next
        ? `<button type="button" data-quick-next="${escapeHtml(next.to)}" data-order-id="${id}" class="primary">${escapeHtml(
            next.label
          )}</button>`
        : '<span class="card-action-slot" aria-hidden="true">.</span>';
      const payRow = paymentPillsHtml(o).replace('pill-row', 'ops-card__meta pill-row');
      return `
              <article class="ops-card ${cardAccentClass(o.status)}" data-order-id="${id}">
                <header class="ops-card__hero">
                  <span class="ops-card__no">#${num}</span>
                  <span class="ops-card__sum">${escapeHtml(moneyFmt(o.total))}</span>
                  <span class="ops-card__rel" data-rel-ts="${escapeHtml(String(o.created_at || ''))}">${escapeHtml(relTime(o.created_at))}</span>
                </header>
                <div class="ops-card__customer">
                  <b>${name}</b>
                  ${
                    phoneHref
                      ? `<a href="${phoneHref}">${phoneTxt}</a>`
                      : `<span class="muted">${phoneTxt}</span>`
                  }
                </div>
                <p class="ops-card__addr"><span class="ops-card__pin" aria-hidden="true">📍</span><span class="ops-card__addr-txt">${addr}</span></p>
                ${landmarkLine}
                ${thumbsHtml(o.items)}
                ${payRow}
                ${slaBlockHtml(o)}
                <div class="ops-card__foot">${escapeHtml(`${fmt(o.created_at)} · ↑ ${fmt(o.updated_at)}`)}</div>
                <div class="card-actions">${nextBtn}</div>
              </article>`;
    }
    function renderColumnsNow() {
      const fp = buildColumnsFingerprint();
      if (fp === lastColumnsFingerprint) {
        patchCardsLiveMeta();
        return;
      }
      const scrollMap = captureColumnScroll();
      lastColumnsFingerprint = fp;
      const base = getFilteredOrders();
      const grouped = statusGroups.map((group) => ({
        ...group,
        items: sortColumnOrders(base.filter((o) => group.statuses.includes(normalizeStatus(o.status))))
      }));
      const maxCount = Math.max(1, ...grouped.map((g) => g.items.length));
      grouped.forEach((g) => {
        if (g.items.length > 0) expandedCols.delete(g.key);
      });
      saveExpandedCols();
      document.getElementById('columns').innerHTML = grouped
        .map((group) => {
          const meta = statusGroups.find((s) => s.key === group.key) || {};
          const colIcon = escapeHtml(meta.colIcon || '•');
          if (isColCollapsed(group)) {
            return `
        <section class="col col--collapsed col--${escapeHtml(group.key)}" data-col="${escapeHtml(group.key)}">
          <button type="button" class="col-collapsed-btn" data-col-expand="${escapeHtml(group.key)}" title="${escapeHtml(t('colExpandTitle'))}">
            <span class="col-mark" aria-hidden="true"></span>
            <span class="col-collapsed-label">${escapeHtml(t(group.labelKey))}</span>
            <span class="count-pill" data-count="0">0</span>
          </button>
        </section>`;
          }
          const pct = Math.round((group.items.length / maxCount) * 100);
          const stale = colStaleCount(group.items);
          const staleHint =
            stale > 0
              ? `<span class="col-stale-hint">${escapeHtml(t('colStaleHint').replace('{n}', String(stale)))}</span>`
              : '';
          return `
        <section class="col col--${escapeHtml(group.key)}${group.items.length >= 4 ? ' col--busy' : ''}" data-col="${escapeHtml(group.key)}">
          <div class="col-head">
            <div class="col-head__title">
              <span class="col-mark" aria-hidden="true"></span>
              <h3><span class="col-icon" aria-hidden="true">${colIcon}</span> ${escapeHtml(t(group.labelKey))}</h3>
            </div>
            <span class="count-pill" data-count="${group.items.length}">${group.items.length}</span>
          </div>
          ${staleHint ? `<div style="margin:-4px 0 8px;">${staleHint}</div>` : ''}
          <div class="col-bar" aria-hidden="true"><i style="width:${pct}%"></i></div>
          <div class="list">
            ${group.items.length ? group.items.map((o) => renderOrderCard(o)).join('') : `<motion class="list-empty"><p>${escapeHtml(t('colEmpty'))}</p></div>`}
          </div>
        </section>`;
        })
        .join('');
      applyBoardGridColumns(grouped);
      restoreColumnScroll(scrollMap);
    }

    function renderModal(order) {
      activeOrder = order;
      const status = normalizeStatus(order.status);
      document.getElementById('mOrderTitle').textContent = `${t('order')} #${order.orderNumber || order.id}`;
      const mapLink = (Number.isFinite(Number(order.locationLat)) && Number.isFinite(Number(order.locationLng)))
        ? `https://maps.google.com/?q=${order.locationLat},${order.locationLng}` : '';
      const courierMapLink = (Number.isFinite(Number(order.courierLocationLat)) && Number.isFinite(Number(order.courierLocationLng)))
        ? `https://maps.google.com/?q=${order.courierLocationLat},${order.courierLocationLng}` : '';
      document.getElementById('mMeta').innerHTML = `${escapeHtml(String(order.customerName || '').trim() || t('guest'))} | ${escapeHtml(
        String(order.customerPhone || '-').trim()
      )} | ${escapeHtml(
        String(order.customerAddress || order.addressText || order.location || '-').trim()
      )}<br>Orientir: ${escapeHtml(String(order.landmarkText || '-').trim())}${
        mapLink ? ` | <a href="${escapeHtml(mapLink)}" target="_blank" rel="noopener">Map</a>` : ''
      }<br>Do‘kon manzili: <a href="${escapeHtml(STORE_LOCATION.mapsUrl)}" target="_blank" rel="noopener">${escapeHtml(
        STORE_LOCATION.name
      )}</a><br>Status: ${escapeHtml(String(order.statusLabel || orderStatusLabel(order.status)))}<br>To‘lov: ${escapeHtml(
        String(order.paymentMethod || '-')
      )} / ${escapeHtml(String(order.paymentStatusLabel || order.paymentStatus || '-'))}<br>Cash agreement: ${
        order.cashAgreementAccepted ? 'ha' : 'yo‘q'
      }<br>${
        order.paymentProofUrl
          ? `<a href="${escapeHtml(String(order.paymentProofUrl))}" target="_blank" rel="noopener">Payment proof</a>`
          : 'Payment proof: -'
      }<br>${
        order.courierLocationUpdatedAt
          ? `Kurier joylashuvi: yangilangan ${escapeHtml(fmt(order.courierLocationUpdatedAt))}`
          : 'Kurier joylashuvi: -'
      }${
        courierMapLink
          ? ` | <a href="${escapeHtml(courierMapLink)}" target="_blank" rel="noopener">Xaritada ko‘rish</a>`
          : ''
      }`;
      document.getElementById('mItems').innerHTML = (order.items || []).map((it) => `
        <div class="item">
          ${it.image_url ? `<img src="${escapeHtml(String(it.image_url))}" alt="${escapeHtml(String(it.name || ''))}" />` : `<img alt="" />`}
          <div>
            <div><b>${escapeHtml(String(it.name || '-'))}</b></div>
            <div class="muted">qty: ${escapeHtml(String(it.quantity || 0))} · narx: ${Number(it.price||0).toLocaleString('ru-RU')} so'm</div>
            <div class="muted">stock: ${Number(it.stock || 0)}</div>
          </div>
          <div><strong>${Number(it.subtotal || 0).toLocaleString('ru-RU')} so'm</strong></div>
        </div>
      `).join('');

      const actions = [];
      const courierTok = String(order.courierToken || '').trim();
      if (courierTok && !['delivered', 'cancelled'].includes(status)) {
        const href = `${window.location.origin}/courier/${encodeURIComponent(courierTok)}`;
        actions.push(
          `<a class="primary" href="${escapeHtml(href)}" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:52px;border-radius:12px;font-weight:700;">${escapeHtml(
            t('courierAppLink')
          )}</a>`
        );
      }
      const next = getNextTransition(order);
      if (next) {
        actions.push(
          `<button type="button" class="primary" data-next="${escapeHtml(String(next.to))}">${escapeHtml(
            String(next.label)
          )}</button>`
        );
      }
      if (status !== 'delivered' && status !== 'cancelled') {
        actions.push('<button type="button" class="full" data-cancel="1">Bekor qilish</button>');
      }
      if (status === 'out_for_delivery') {
        actions.push(
          `<button type="button" disabled class="full">Kurierda: ${escapeHtml(
            String(order.courierName || '-').trim()
          )} ${escapeHtml(String(order.courierPhone || '').trim())}</button>`
        );
      }
      if (status === 'delivered') {
        actions.push('<button type="button" disabled class="full">Yetkazildi</button>');
      }
      document.getElementById('mActions').innerHTML = actions.join('');
      document.getElementById('modalOverlay').classList.add('show');
    }

    async function transitionOrder(orderId, nextStatus) {
      const target = orders.find((o) => String(o.id) === String(orderId));
      if (!target) throw new Error('Order topilmadi');
      const currentStatus = normalizeStatus(target.status);
      const targetStatus = normalizeStatus(nextStatus);
      const allowed = allowedTransitions[currentStatus] || [];
      if (!allowed.includes(targetStatus)) throw new Error(`Mumkin bo‘lmagan status o‘tishi: ${currentStatus} -> ${targetStatus}`);
      const previous = orders.map((o) => ({ ...o }));
      const now = new Date().toISOString();
      orders = orders.map((o) => String(o.id) === String(orderId) ? { ...o, status: targetStatus, updated_at: now } : o);
      renderStatsBar();
      renderColumns();
      try {
        await api(`/admin/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status: targetStatus }) });
        showToast(`${t('statusUpdated')}: ${targetStatus}`);
        await refresh({ silent: true });
      } catch (err) {
        orders = previous;
        renderStatsBar();
        renderColumns();
        await refresh({ silent: true });
        throw err;
      }
    }

    async function printReceipt(order) {
      const qr = await api(`/admin/orders/${order.id}/qr`);
      if (!qr.qrDataUrl) throw new Error('QR render bo‘lmadi');
      const w = window.open('', '_blank', 'width=420,height=700');
      if (!w) throw new Error('Print oynasi ochilmadi');
      const rows = (order.items || []).map((it)=>`<tr><td>${it.name||''}</td><td>${it.quantity||0}</td><td>${Number(it.price||0).toLocaleString('ru-RU')}</td><td>${Number(it.subtotal||0).toLocaleString('ru-RU')}</td></tr>`).join('');
      w.document.write(`
        <html><head><title>Chek</title><style>
          body{font-family:Arial;font-size:12px;width:58mm;max-width:58mm;margin:0 auto}
          table{width:100%;border-collapse:collapse}td{padding:2px 0;border-bottom:1px dashed #ccc;vertical-align:top}
          .center{text-align:center}
          .qr{width:150px;height:150px;object-fit:contain}
          @media print { body{width:58mm} }
        </style></head><body>
        <h3 class="center">GlobusMarket</h3>
        <div>Order: ${order.orderNumber}</div>
        <div>Sana: ${new Date().toLocaleString('ru-RU')}</div>
        <div>Mijoz: ${order.customerName||'-'}</div>
        <div>Tel: ${order.customerPhone||'-'}</div>
        <div>Manzil: ${order.customerAddress||order.location||'-'}</div>
        <table><tr><td><b>Nomi</b></td><td><b>Soni</b></td><td><b>Narx</b></td><td><b>Sum</b></td></tr>${rows}</table>
        <h4>Jami: ${Number(order.total||0).toLocaleString('ru-RU')} so'm</h4>
        <div>Status: ${order.status}</div>
        <div class="center" style="margin-top:8px;"><img id="receiptQr" class="qr" src="${qr.qrDataUrl}" alt="courier qr" /></div>
        <div class="center" style="font-size:11px;margin-top:4px;">Kurier buyurtmani qabul qilish uchun QR kodni skaner qiling</div>
        <div style="word-break:break-all;font-size:10px;margin-top:4px;">${qr.courierUrl}</div>
        </body></html>
      `);
      w.document.close();
      const img = w.document.getElementById('receiptQr');
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('QR render bo‘lmadi')), 2500);
        img.onload = () => { clearTimeout(timeout); resolve(); };
        img.onerror = () => { clearTimeout(timeout); reject(new Error('QR render bo‘lmadi')); };
      });
      w.focus();
      w.print();
    }

    async function loadDisplayOrders() {
      try {
        const { orders: feedOrders } = await fetch('/api/v1/orders-display/feed', {
          headers: { 'Content-Type': 'application/json' }
        }).then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || 'Display feed error');
          return data;
        });
        return { orders: Array.isArray(feedOrders) ? feedOrders : [], source: 'display-feed' };
      } catch (_) {
        const { orders: adminOrders } = await api('/admin/orders');
        return { orders: Array.isArray(adminOrders) ? adminOrders : [], source: 'admin-feed' };
      }
    }

    async function refresh({ silent = false } = {}) {
      if (isRefreshing) return;
      isRefreshing = true;
      const gridEl = document.getElementById('columns');
      if (gridEl && !silent) gridEl.classList.add('is-loading');
      const token = getToken();
      document.getElementById('tokenRequired').style.display = 'none';
      try {
        const { orders: list, source } = await loadDisplayOrders();
        courierStaffPollSkip += 1;
        if (courierStaffPollSkip % 5 === 0) await loadCourierStaff();
        applyFeedFromServer(list, source);
        pollDelay = document.hidden ? POLL_MS_HIDDEN : POLL_MS_FALLBACK;
      } catch (e) {
        document.getElementById('tokenRequired').style.display = token ? 'none' : 'block';
        setLiveStatus('offline');
        document.getElementById('network').textContent = token ? 'Aloqa uzildi, qayta ulanmoqda...' : 'Display uchun token yoki server aloqasi kerak';
        if (!silent) showToast(e.message || t('refreshError'), true);
        pollDelay = Math.min(12000, Math.round(pollDelay * 1.5));
        scheduleSseRetry();
      } finally {
        if (gridEl) gridEl.classList.remove('is-loading');
        isRefreshing = false;
        if (liveState === 'live' && feedStream) {
          clearTimeout(pollTimer);
        } else {
          schedulePollFallback();
        }
      }
    }

    document.getElementById('tokenInput').value = getToken();
    document.getElementById('tokenRevealBtn').onclick = () => {
      const inp = document.getElementById('tokenInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      syncTokenRevealUi();
    };
    function persistToken(val) {
      localStorage.setItem(tokenKey, val);
      syncSettingsTokenFields();
      const inp = document.getElementById('tokenInput');
      if (inp) {
        inp.value = val;
        inp.type = 'password';
      }
      syncTokenRevealUi();
      refresh();
    }
    document.getElementById('saveTokenBtn').onclick = () => {
      persistToken(document.getElementById('tokenInput').value.trim());
    };
    document.getElementById('saveTokenSettingsBtn').onclick = () => {
      persistToken(document.getElementById('tokenInputSettings').value.trim());
      closeSettings();
    };
    document.getElementById('settingsBtn').onclick = () => openSettings();
    document.getElementById('closeSettings').onclick = () => closeSettings();
    document.getElementById('settingsOverlay').onclick = (e) => {
      if (e.target.id === 'settingsOverlay') closeSettings();
    };
    document.getElementById('tokenRevealSettingsBtn').onclick = () => {
      const inp = document.getElementById('tokenInputSettings');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    };
    document.getElementById('focusModeBtn').onclick = () => {
      setFocusMode(!document.body.classList.contains('mode-focus'));
    };

    document.getElementById('fullscreenBtn').onclick = async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(()=>{});
      else await document.exitFullscreen().catch(()=>{});
    };

    document.getElementById('soundToggle').onclick = () => {
      setSoundOn(!getSoundOn());
      syncSoundToggle();
      if (getSoundOn()) {
        const ctx = getAudioContext();
        if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        playBeep('new');
        hapticPing('new');
      }
    };

    (function bindSoundVolume() {
      const el = document.getElementById('soundVolume');
      if (!el) return;
      el.addEventListener('input', (e) => {
        setSoundVolume(e.target.value);
      });
      el.addEventListener('change', () => {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
      });
    })();

    document.getElementById('columns').onclick = (e) => {
      const expandBtn = e.target.closest('[data-col-expand]');
      if (expandBtn) {
        e.preventDefault();
        expandedCols.add(expandBtn.dataset.colExpand);
        saveExpandedCols();
        lastColumnsFingerprint = '';
        scheduleRenderColumns();
        return;
      }
      const quickBtn = e.target.closest('[data-quick-next]');
      if (quickBtn) {
        e.preventDefault();
        e.stopPropagation();
        if (quickBtn.disabled) return;
        const orderId = quickBtn.dataset.orderId;
        const prevText = quickBtn.textContent;
        quickBtn.disabled = true;
        quickBtn.textContent = t('loading');
        transitionOrder(orderId, quickBtn.dataset.quickNext).catch((err) => {
          showToast(err.message || t('statusChangeError'), true);
        }).finally(() => {
          quickBtn.disabled = false;
          quickBtn.textContent = prevText;
        });
        return;
      }
      const card = e.target.closest('[data-order-id]');
      if (!card) return;
      const order = orders.find((o) => o.id === card.dataset.orderId);
      if (order) renderModal(order);
    };

    document.getElementById('closeModal').onclick = () => {
      activeOrder = null;
      document.getElementById('modalOverlay').classList.remove('show');
    };

    document.getElementById('mActions').onclick = async (e) => {
      const btn = e.target.closest('button');
      if (!btn || !activeOrder) return;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = t('loading');
      try {
        if (btn.dataset.next) {
          await transitionOrder(activeOrder.id, btn.dataset.next);
        } else if (btn.dataset.cancel) {
          await api(`/admin/orders/${activeOrder.id}/cancel`, { method: 'POST' });
          showToast('Buyurtma bekor qilindi');
        } else if (btn.dataset.tsd) {
          await api(`/admin/orders/${activeOrder.id}/send-to-tsd`, { method: 'POST' });
        } else if (btn.dataset.print) {
          await printReceipt(activeOrder);
        }
        await refresh({ silent: true });
      } catch (err) {
        showToast(err.message || 'Xatolik', true);
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    };

    (function startOpsClock() {
      const tick = () => {
        const el = document.getElementById('clock');
        if (!el) return;
        const loc = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        el.textContent = new Date().toLocaleTimeString(loc, {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
      };
      tick();
      setInterval(tick, 1000);
    })();

    setInterval(tickLiveLabels, 30000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopLiveFeed();
        clearTimeout(pollTimer);
        clearTimeout(sseRetryTimer);
        sseRetryTimer = null;
        setLiveStatus('paused');
      } else {
        pollDelay = POLL_MS_FALLBACK;
        startLiveFeed();
        refresh({ silent: true });
      }
    });

    document.getElementById('filterChips').addEventListener('click', (e) => {
      const b = e.target.closest('[data-filter]');
      if (!b) return;
      const k = b.dataset.filter;
      if (!Object.prototype.hasOwnProperty.call(viewFilters, k)) return;
      viewFilters[k] = !viewFilters[k];
      if (k === 'payme' && viewFilters.payme) viewFilters.cash = false;
      if (k === 'cash' && viewFilters.cash) viewFilters.payme = false;
      renderFilterChips();
      lastColumnsFingerprint = '';
      scheduleRenderColumns();
    });

    document.getElementById('langUzBtn').onclick = () => { currentLang = 'uz'; localStorage.setItem(langKey, currentLang); applyLang(); };
    document.getElementById('langRuBtn').onclick = () => { currentLang = 'ru'; localStorage.setItem(langKey, currentLang); applyLang(); };
    let boardResizeRaf = 0;
    window.addEventListener('resize', () => {
      if (boardResizeRaf) return;
      boardResizeRaf = requestAnimationFrame(() => {
        boardResizeRaf = 0;
        const base = getFilteredOrders();
        const grouped = statusGroups.map((group) => ({
          ...group,
          items: sortColumnOrders(base.filter((o) => group.statuses.includes(normalizeStatus(o.status))))
        }));
        applyBoardGridColumns(grouped);
      });
    });
    applyLang();
    setFocusMode(localStorage.getItem(focusModeKey) === '1');
    startLiveFeed();
    refresh({ silent: true });
  </script>
</body>
