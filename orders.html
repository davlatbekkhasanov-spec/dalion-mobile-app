<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Ops room — dark table default, optional kanban */
    :root {
      --bg: #0f1419;
      --bg2: #141b24;
      --card: #1a2332;
      --card-hover: #222d3f;
      --line: #2d3a4d;
      --line-strong: #3d4f66;
      --txt: #e6edf3;
      --muted: #8b9cb3;
      --muted2: #b4c0d4;
      --acc: #3fb950;
      --acc-hover: #2ea043;
      --warn: #d29922;
      --danger: #f85149;
      --live: #3fb950;
      --st-new: #58a6ff;
      --st-work: #a371f7;
      --st-ready: #d29922;
      --st-out: #3fb950;
      --st-done: #8b9cb3;
      --st-cancel: #f85149;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      --radius: 8px;
      --radius-sm: 6px;
      --space: 10px;
      --font-xs: 12px;
      --font-sm: 13px;
      --font-md: 14px;
      --font-lg: 15px;
      --row-h: 52px;
      --table-row-min: 52px;
      --header-compact-max: 96px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 0;
      height: 100vh;
      max-height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      font-size: var(--font-sm);
      font-feature-settings: "tnum" 1;
      color: var(--txt);
      background: var(--bg);
    }
    @supports (height: 100svh) {
      body {
        height: 100svh;
        max-height: 100svh;
      }
    }
    .wrap {
      flex: 1 1 0%;
      min-height: 0;
      padding: var(--space) clamp(10px, 2vw, 14px);
      display: flex;
      flex-direction: column;
      gap: var(--space);
      box-sizing: border-box;
      overflow: hidden;
    }
    .ops-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    body.viewport-compact .ops-bar-row--head {
      gap: 8px;
    }
    .ops-bar-row {
      display: flex;
      align-items: center;
      gap: 8px 10px;
      min-width: 0;
    }
    .ops-bar-row--head {
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 8px 12px;
    }
    @media (min-width: 900px) {
      .ops-bar-row--head { flex-wrap: nowrap; }
      .ops-head-status { flex: 0 0 auto; }
      .ops-tools {
        flex: 0 0 auto;
        margin-left: auto;
        justify-content: flex-end;
      }
    }
    .ops-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
      justify-content: flex-end;
    }
    .ops-brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .ops-head-status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
      flex: 1 1 auto;
      min-width: 0;
      justify-content: flex-end;
    }
    @media (min-width: 900px) {
      .ops-head-status { flex: 0 0 auto; justify-content: flex-start; }
    }
    .ops-brand strong { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .ops-brand small { display: none; }
    body.viewport-compact .ops-brand small { display: none; }
    .ops-clock {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.02em;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted2);
      flex: 0 0 auto;
      min-width: 6.75rem;
      text-align: center;
      box-sizing: border-box;
    }
    .ops-tools > * { flex-shrink: 0; }
    #fullscreenBtn {
      min-width: 2.75rem;
      width: 2.75rem;
      padding-left: 0;
      padding-right: 0;
      font-size: 18px;
      line-height: 1;
    }
    #saveTokenBtn {
      min-width: 6.75rem;
      white-space: nowrap;
    }
    #tokenToolsInline,
    #saveTokenBtn { display: none !important; }
    @media (max-width: 899px) {
      .ops-tools .chip:not(#focusModeBtn):not(#courierBarToggle) { padding: 8px 10px; font-size: var(--font-xs); }
      #fullscreenBtn, #settingsBtn, #langUzBtn, #langRuBtn, #soundToggle {
        min-width: 2.5rem;
        width: 2.5rem;
        padding: 8px;
      }
      .sound-tools input[type="range"]#soundVolume { width: 64px; }
    }
    #langUzBtn, #langRuBtn {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    #soundToggle {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    .ops-network {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      min-height: 0;
      max-height: 0;
      overflow: hidden;
      padding: 0;
    }
    .ops-network:not(:empty) {
      min-height: 1.35em;
      max-height: 2.7em;
      padding: 0 2px 2px;
    }
    .ops-bar-row--sub {
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }
    .ops-bar-row--sub .chip-row {
      flex: 1 1 auto;
      min-width: 0;
    }
    .ops-bar-row--sub .stats-bar {
      flex: 1 1 auto;
      min-width: 12rem;
      border-bottom: none;
      padding: 0;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex: 1 1 100%;
      width: 100%;
      min-width: 0;
    }
    input, button {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--txt);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font: inherit;
      font-size: var(--font-sm);
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { background: transparent; }
    .btn-ghost:hover { background: var(--card); }
    .primary {
      background: var(--acc);
      border: 1px solid transparent;
      color: #0d1117;
      font-weight: 600;
    }
    .primary:hover:not(:disabled) { background: var(--acc-hover); }
    .chip {
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--muted2);
      font-size: var(--font-xs);
      font-weight: 500;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }
    .chip.on {
      border-color: #238636;
      color: #aff5b4;
      background: rgba(63, 185, 80, 0.12);
    }
    .view-chips {
      display: inline-flex;
      gap: 2px;
      flex-shrink: 0;
      margin-right: 8px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--bg);
    }
    .view-chips .chip {
      font-weight: 600;
      border-color: transparent;
      background: transparent;
    }
    .view-chips .chip.on {
      border-color: transparent;
      color: #0d1117;
      background: var(--acc);
    }
    .stats-bar {
      flex-shrink: 0;
      border: none;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 0 4px 10px;
      min-height: 0;
      box-sizing: border-box;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .stats-bar[hidden] { display: none !important; }
    .stats-inline {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0;
      min-width: min-content;
      font-size: var(--font-sm);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .stats-inline b {
      font-weight: 600;
      color: var(--txt);
      margin-right: 4px;
    }
    .stats-sep {
      color: var(--line-strong);
      padding: 0 10px;
      user-select: none;
    }
    .courier-staff-bar {
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--card);
      padding: 8px 12px;
      min-height: 0;
      max-height: 80px;
      overflow: auto;
      box-sizing: border-box;
    }
    .courier-staff-bar[hidden] { display: none !important; }
    body:not(.courier-bar-open) .courier-staff-bar {
      display: none !important;
    }
    #courierBarToggle { display: none; }
    #courierBarToggle.is-visible { display: inline-flex; }
    .cstaff-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .cstaff-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .cstaff-chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted2);
      white-space: nowrap;
    }
    .cstaff-chip small {
      color: var(--muted);
      margin-left: 6px;
      font-weight: 600;
    }
    .stats-inner { display: contents; }
    .stat-chip { display: none; }
    .sla {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      width: fit-content;
      margin-bottom: 6px;
    }
    .sla-ok {
      color: var(--muted);
      border-color: var(--line);
      background: var(--card);
    }
    .sla-warn {
      color: #f0c14b;
      border-color: #9e6a03;
      background: rgba(210, 153, 34, 0.15);
    }
    .sla-hot {
      color: #ff7b72;
      border-color: #da3633;
      background: rgba(248, 81, 73, 0.12);
    }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .sync-pill {
      font-size: 11px;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      box-sizing: border-box;
    }
    .sync-pill--live {
      border-color: #238636;
      background: rgba(63, 185, 80, 0.1);
    }
    .sync-pill__time {
      display: inline-block;
      min-width: 4.6rem;
      text-align: center;
      font-weight: 600;
    }
    .sync-pill__live {
      display: none;
    }
    .badge {
      padding: 5px 10px 5px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid #238636;
      color: #aff5b4;
      background: rgba(63, 185, 80, 0.1);
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-sizing: border-box;
    }
    .badge.offline {
      border-color: #da3633;
      color: #ffa198;
      background: rgba(248, 81, 73, 0.1);
    }
    .badge.offline .live-dot { background: var(--danger); }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--live);
      flex-shrink: 0;
    }
    .token-required {
      flex-shrink: 0;
      border: 1px dashed #da3633;
      background: rgba(248, 81, 73, 0.08);
      color: #ffa198;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
    }
    .orders-board {
      flex: 1 1 0%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg2);
    }
    .orders-board.is-loading { pointer-events: none; opacity: 0.85; }
    .ops-table-wrap {
      width: 100%;
      flex: 1 1 0%;
      min-height: 0;
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ops-table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      table-layout: fixed;
      font-size: var(--font-sm);
    }
    .ops-table thead {
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .ops-table thead th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      background: #161d27;
      border-bottom: 1px solid var(--line-strong);
      padding: 10px 8px;
      line-height: 1.2;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
    }
    .ops-table .col-status { width: 40px; text-align: center; }
    .ops-table .col-num { width: 88px; }
    .ops-table .col-sum { width: 110px; text-align: right; }
    .ops-table .col-time { width: 70px; }
    .ops-table .col-name { width: auto; }
    .ops-table .col-tel { width: 130px; text-align: left; }
    .ops-table .col-addr { width: auto; }
    .ops-table .col-pay { width: 52px; text-align: center; }
    .ops-table .col-sla { width: 56px; text-align: center; }
    .ops-table .col-act { width: 44px; text-align: center; }
    .ops-table thead th.col-sum { text-align: right; }
    .ops-table thead th.col-tel,
    .ops-table thead th.col-pay,
    .ops-table thead th.col-sla,
    .ops-table thead th.col-act { text-align: center; }
    .ops-table tbody tr.ops-table-group td {
      padding: 8px 10px 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted2);
      background: #121820;
      border-bottom: 1px solid var(--line);
    }
    .ops-table tbody tr.ops-table-group .ops-table-group__dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .ops-table tbody tr.ops-table-group .ops-table-group__count {
      margin-left: 8px;
      font-weight: 500;
      color: var(--muted);
    }
    .ops-table tbody tr.ops-table-arch td {
      padding: 0;
      border: none;
      background: transparent;
    }
    .ops-table-arch-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      padding: 10px 12px;
      border: none;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #121820;
      color: var(--muted2);
      font: inherit;
      font-size: var(--font-xs);
      font-weight: 600;
      text-align: left;
      cursor: pointer;
    }
    .ops-table-arch-btn:hover { background: var(--card); }
    .ops-table-arch-body tr { background: var(--card); }
    .ops-table tbody tr[data-order-id] {
      cursor: pointer;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }
    .ops-table tbody tr[data-order-id] td {
      min-height: var(--table-row-min);
    }
    .ops-table tbody tr[data-order-id]:nth-child(even) { background: #17202c; }
    .ops-table tbody tr[data-order-id]:hover { background: var(--card-hover); }
    .ops-table td {
      padding: 10px 8px;
      vertical-align: middle;
      color: var(--txt);
      line-height: 1.35;
      overflow: hidden;
    }
    .ops-table .col-num,
    .ops-table .col-sum,
    .ops-table .col-time { font-variant-numeric: tabular-nums; }
    .ops-table .col-num { font-weight: 600; white-space: nowrap; }
    .ops-table .col-sum { font-weight: 600; white-space: nowrap; }
    .ops-table .col-time { color: var(--muted); font-size: var(--font-xs); white-space: nowrap; }
    .ops-table .col-name .ops-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ops-table .col-addr .ops-addr {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      color: var(--muted);
      font-size: var(--font-xs);
    }
    .ops-table .col-addr .ops-addr__pin {
      flex: 0 0 auto;
      line-height: 1.3;
      opacity: 0.85;
    }
    .ops-table .col-addr .ops-addr__txt {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      line-height: 1.35;
    }
    .ops-table .col-status { text-align: center; }
    .ops-table .col-status .status-label { display: none; }
    .ops-table .col-time .ops-time {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      max-width: 100%;
    }
    .ops-table .col-time .ops-time__ico { opacity: 0.75; flex-shrink: 0; color: var(--muted); }
    .ops-th-ico {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      vertical-align: middle;
    }
    .ops-ico { display: block; flex-shrink: 0; }
    .ops-tel-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .ops-tel-txt {
      font-size: var(--font-xs);
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .ops-table .col-sla { white-space: nowrap; }
    .ops-table .col-sla .ops-sla {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 2px 5px;
      border-radius: var(--radius-sm);
    }
    .ops-table .col-sla .ops-sla.sla-warn { color: #f0c14b; background: rgba(210, 153, 34, 0.12); }
    .ops-table .col-sla .ops-sla.sla-hot { color: #ffa198; background: rgba(248, 81, 73, 0.12); }
    .ops-table .col-act { white-space: nowrap; }
    .ops-table .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      vertical-align: middle;
      cursor: default;
    }
    .ops-table .status-dot--new { background: var(--st-new); }
    .ops-table .status-dot--work { background: var(--st-work); }
    .ops-table .status-dot--ready { background: var(--st-ready); }
    .ops-table .status-dot--out { background: var(--st-out); }
    .ops-table .status-dot--done { background: var(--st-done); }
    .ops-table .status-dot--cancel { background: var(--st-cancel); }
    .ops-tel-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      color: var(--st-new);
      text-decoration: none;
      line-height: 0;
    }
    .ops-tel-link:hover { background: rgba(88, 166, 255, 0.12); }
    .ops-pay-cell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex-wrap: nowrap;
    }
    .ops-pay-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--bg2);
      color: var(--muted2);
    }
    .ops-pay-badge--payme { border-color: #238636; color: #aff5b4; background: rgba(63, 185, 80, 0.15); }
    .ops-pay-badge--cash { border-color: #9e6a03; color: #f0c14b; background: rgba(210, 153, 34, 0.12); }
    .ops-pay-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }
    .ops-pay-state--paid { color: #3fb950; }
    .ops-pay-state--unpaid { color: #d29922; }
    .ops-sla .ops-ico { color: currentColor; }
    .ops-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-height: 36px;
      max-height: 36px;
      padding: 0;
      line-height: 0;
      border-radius: var(--radius-sm);
      color: inherit;
    }
    .ops-arch-chev {
      display: inline-flex;
      transition: transform 0.15s ease;
    }
    .ops-arch-chev.is-open { transform: rotate(90deg); }
    .ops-kanban {
      flex: 1 1 0%;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(320px, 1fr));
      gap: var(--space);
      padding: var(--space);
      overflow: auto;
      align-content: start;

  <script>
    (function setupFrontendErrorLogger() {
      const STORAGE_KEY = 'gm_frontend_errors';
      const MAX_ITEMS = 60;
      function readSafe() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) { return []; }
      }
      function writeSafe(items) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (_) {}
      }
      function push(type, message, extra) {
        const items = readSafe();
        items.push({ type, message: String(message || 'unknown'), ts: Date.now(), extra: extra || null });
        while (items.length > MAX_ITEMS) items.shift();
        writeSafe(items);
      }
      window.addEventListener('error', (event) => {
        push('error', event?.message, { source: event?.filename, line: event?.lineno, col: event?.colno });
      });
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event?.reason;
        push('unhandledrejection', reason?.message || String(reason || 'promise rejected'));
      });
    })();

    function playBeep(kind) {
      if (!getSoundOn()) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      const drive = getSoundVolume() / 100;
      if (drive <= 0) return;
      try {
        const t0 = ctx.currentTime;
        const makeup = ctx.createGain();
        makeup.gain.value = drive * 4.75;
        makeup.connect(ctx.destination);

        const lp = ctx.createBiquadFilter();

        lp.frequency.setValueAtTime(6800, t0);
        lp.Q.setValueAtTime(0.45, t0);
        lp.connect(makeup);

        function bellPartial(start, freq, dur, peak, type) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t0 + start);
          const a = t0 + start;
          const b = a + dur;
          const p = Math.max(0.0008, peak);
          g.gain.setValueAtTime(0.0001, a);
          g.gain.exponentialRampToValueAtTime(p, a + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, b);
          osc.connect(g);
          g.connect(lp);
          osc.start(a);
          osc.stop(b + 0.03);
        }

        if (kind === 'route') {
          bellPartial(0, 196, 0.14, 0.42, 'sine');
          bellPartial(0, 392, 0.3, 0.78, 'triangle');
          bellPartial(0.06, 523.25, 0.26, 0.62, 'sine');
          bellPartial(0.12, 659.25, 0.22, 0.5, 'sine');
        } else {
          bellPartial(0, 392, 0.16, 0.52, 'sine');
          bellPartial(0, 783.99, 0.44, 1, 'triangle');
          bellPartial(0.1, 987.77, 0.38, 0.82, 'triangle');
          bellPartial(0.2, 1174.66, 0.32, 0.62, 'sine');
          bellPartial(0.32, 1318.51, 0.24, 0.44, 'sine');
        }
      } catch (_) {}

    function stopLiveFeed() {
      if (feedStream) {
        feedStream.close();
        feedStream = null;
      }
    }

    function schedulePollFallback() {
      clearTimeout(pollTimer);
      if (document.hidden) return;
      pollTimer = setTimeout(() => refresh({ silent: true }), pollDelay);
    }

    function scheduleSseRetry() {
      if (sseRetryTimer || document.hidden) return;
      sseRetryTimer = setTimeout(() => {
        sseRetryTimer = null;
        if (!document.hidden && liveState !== 'live') startLiveFeed();
      }, 12000);
    }

    function startLiveFeed() {
      stopLiveFeed();
      if (document.hidden) {
        setLiveStatus('paused');
        return;
      }
      if (typeof EventSource === 'undefined') {
        setLiveStatus('offline');
        schedulePollFallback();
        return;
      }
      setLiveStatus('connecting');
      feedStream = new EventSource('/api/v1/orders-display/stream');
      feedStream.addEventListener('feed', (ev) => {
        try {
          const data = JSON.parse(ev.data);
          applyFeedFromServer(Array.isArray(data.orders) ? data.orders : [], 'display-stream');
        } catch (_) {
          /* ignore malformed chunk */
        }
      });
      feedStream.addEventListener('error', () => {
        /* server error event */
      });
      feedStream.onopen = () => {
        clearTimeout(pollTimer);
        setLiveStatus('live', 'SSE');
      };
      feedStream.onerror = () => {
        stopLiveFeed();
        setLiveStatus('offline');
        pollDelay = POLL_MS_FALLBACK;
        schedulePollFallback();
        scheduleSseRetry();
      };
    }

      if (feedApplyCount % 5 === 0) loadCourierStaff();
      const nextColFp = buildBoardFingerprint();
      if (prevColFp === nextColFp && lastBoardFingerprint === nextColFp) {
        patchRowsLiveMeta();
      } else {

      if (activeOrder) {
        const upd = orders.find((o) => o.id === activeOrder.id);
        if (upd) renderModal(upd);
      }
      document.getElementById('network').textContent =
        source === 'display-stream' || source === 'display-feed'
          ? ''
          : 'Display feed mavjud emas, admin feed ishlatilmoqda';
      if (liveState !== 'paused') setLiveStatus('live', source);
    }

    async function transitionOrder(orderId, nextStatus) {
      const target = orders.find((o) => String(o.id) === String(orderId));
      if (!target) throw new Error('Order topilmadi');
      const currentStatus = normalizeStatus(target.status);
      const targetStatus = normalizeStatus(nextStatus);
      const allowed = allowedTransitions[currentStatus] || [];
      if (!allowed.includes(targetStatus)) throw new Error(`Mumkin bo‘lmagan status o‘tishi: ${currentStatus} -> ${targetStatus}`);
      const previous = orders.map((o) => ({ ...o }));
      const now = new Date().toISOString();
      orders = orders.map((o) => String(o.id) === String(orderId) ? { ...o, status: targetStatus, updated_at: now } : o);
      renderStatsBar();
      renderColumns();
      try {
        await api(`/admin/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status: targetStatus }) });
        showToast(`${t('statusUpdated')}: ${targetStatus}`);
        await refresh({ silent: true });
      } catch (err) {
        orders = previous;
        renderStatsBar();
        renderColumns();
        await refresh({ silent: true });
        throw err;
      }
    }

    async function printReceipt(order) {
      const qr = await api(`/admin/orders/${order.id}/qr`);
      if (!qr.qrDataUrl) throw new Error('QR render bo‘lmadi');
      const w = window.open('', '_blank', 'width=420,height=700');
      if (!w) throw new Error('Print oynasi ochilmadi');
      const rows = (order.items || []).map((it)=>`<tr><td>${it.name||''}</td><td>${it.quantity||0}</td><td>${Number(it.price||0).toLocaleString('ru-RU')}</td><td>${Number(it.subtotal||0).toLocaleString('ru-RU')}</td></tr>`).join('');
      w.document.write(`
        <html><head><title>Chek</title><style>
          body{font-family:Arial;font-size:12px;width:58mm;max-width:58mm;margin:0 auto}
          table{width:100%;border-collapse:collapse}td{padding:2px 0;border-bottom:1px dashed #ccc;vertical-align:top}
          .center{text-align:center}
          .qr{width:150px;height:150px;object-fit:contain}
          @media print { body{width:58mm} }
        </style></head><body>
        <h3 class="center">GlobusMarket</h3>
        <div>Order: ${order.orderNumber}</div>
        <div>Sana: ${new Date().toLocaleString('ru-RU')}</div>
        <div>Mijoz: ${order.customerName||'-'}</div>
        <div>Tel: ${order.customerPhone||'-'}</div>
        <div>Manzil: ${order.customerAddress||order.location||'-'}</div>
        <table><tr><td><b>Nomi</b></td><td><b>Soni</b></td><td><b>Narx</b></td><td><b>Sum</b></td></tr>${rows}</table>
        <h4>Jami: ${Number(order.total||0).toLocaleString('ru-RU')} so'm</h4>
        <div>Status: ${order.status}</div>
        <div class="center" style="margin-top:8px;"><img id="receiptQr" class="qr" src="${qr.qrDataUrl}" alt="courier qr" /></div>
        <div class="center" style="font-size:11px;margin-top:4px;">Kurier buyurtmani qabul qilish uchun QR kodni skaner qiling</div>
        <div style="word-break:break-all;font-size:10px;margin-top:4px;">${qr.courierUrl}</div>
        </body></html>
      `);
      w.document.close();
      const img = w.document.getElementById('receiptQr');
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('QR render bo‘lmadi')), 2500);
        img.onload = () => { clearTimeout(timeout); resolve(); };
        img.onerror = () => { clearTimeout(timeout); reject(new Error('QR render bo‘lmadi')); };
      });
      w.focus();
      w.print();
    }

    async function loadDisplayOrders() {
      try {
        const { orders: feedOrders } = await fetch('/api/v1/orders-display/feed', {
          headers: { 'Content-Type': 'application/json' }
        }).then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || 'Display feed error');
          return data;
        });
        return { orders: Array.isArray(feedOrders) ? feedOrders : [], source: 'display-feed' };
      } catch (_) {
        const { orders: adminOrders } = await api('/admin/orders');
        return { orders: Array.isArray(adminOrders) ? adminOrders : [], source: 'admin-feed' };
      }
    }

    async function refresh({ silent = false } = {}) {
      if (isRefreshing) return;
      isRefreshing = true;
      const boardEl = document.getElementById('ordersBoard');
      if (boardEl && !silent) boardEl.classList.add('is-loading');
      const token = getToken();
      document.getElementById('tokenRequired').style.display = 'none';
      try {
        const { orders: list, source } = await loadDisplayOrders();
        courierStaffPollSkip += 1;
        if (courierStaffPollSkip % 5 === 0) await loadCourierStaff();
        applyFeedFromServer(list, source);
        pollDelay = document.hidden ? POLL_MS_HIDDEN : POLL_MS_FALLBACK;
      } catch (e) {
        document.getElementById('tokenRequired').style.display = token ? 'none' : 'block';
        setLiveStatus('offline');
        document.getElementById('network').textContent = token ? 'Aloqa uzildi, qayta ulanmoqda...' : 'Display uchun token yoki server aloqasi kerak';
        if (!silent) showToast(e.message || t('refreshError'), true);
        pollDelay = Math.min(12000, Math.round(pollDelay * 1.5));
        scheduleSseRetry();
      } finally {
        if (boardEl) boardEl.classList.remove('is-loading');
        isRefreshing = false;
        if (liveState === 'live' && feedStream) {
          clearTimeout(pollTimer);
        } else {
          schedulePollFallback();
        }
      }
    }

        await refresh({ silent: true });
      } catch (err) {
        showToast(err.message || 'Xatolik', true);
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    };

    (function startOpsClock() {
      const tick = () => {
        const el = document.getElementById('clock');
        if (!el) return;
        const loc = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        el.textContent = new Date().toLocaleTimeString(loc, {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
      };
      tick();
      setInterval(tick, 1000);
    })();

    setInterval(tickLiveLabels, 30000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopLiveFeed();
        clearTimeout(pollTimer);
        clearTimeout(sseRetryTimer);
        sseRetryTimer = null;
        setLiveStatus('paused');
      } else {
        pollDelay = POLL_MS_FALLBACK;
        startLiveFeed();
        refresh({ silent: true });
      }
    });

    document.getElementById('filterChips').addEventListener('click', (e) => {
      const viewBtn = e.target.closest('[data-view-mode]');
      if (viewBtn) {
        const mode = viewBtn.dataset.viewMode;
        if (mode === 'table' || mode === 'kanban') {
          setViewMode(mode);
          renderFilterChips();
          lastBoardFingerprint = '';
          scheduleRenderBoard();
        }
        return;
      }
      const b = e.target.closest('[data-filter]');
      if (!b) return;
      const k = b.dataset.filter;
      if (!Object.prototype.hasOwnProperty.call(viewFilters, k)) return;
      viewFilters[k] = !viewFilters[k];
      if (k === 'payme' && viewFilters.payme) viewFilters.cash = false;
      if (k === 'cash' && viewFilters.cash) viewFilters.payme = false;
      renderFilterChips();
      lastBoardFingerprint = '';
      scheduleRenderBoard();
    });

    document.getElementById('langUzBtn').onclick = () => { currentLang = 'uz'; localStorage.setItem(langKey, currentLang); applyLang(); };
    document.getElementById('langRuBtn').onclick = () => { currentLang = 'ru'; localStorage.setItem(langKey, currentLang); applyLang(); };
    window.addEventListener('resize', () => {
      syncViewportChrome();
    });
    applyLang();
    syncViewportChrome();
    setFocusMode(resolveFocusMode());
    startLiveFeed();
    refresh({ silent: true });
  </script>
</body>
</html>
