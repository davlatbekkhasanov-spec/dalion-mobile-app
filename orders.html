<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Ops queue — light desk, list rows (Stripe/Shopify style) */
    :root {
      --bg: #fafafa;
      --bg2: #ffffff;
      --card: #ffffff;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --txt: #111827;
      --muted: #6b7280;
      --muted2: #374151;
      --acc: #059669;
      --acc-hover: #047857;
      --warn: #d97706;
      --danger: #dc2626;
      --live: #059669;
      --st-new: #2563eb;
      --st-work: #7c3aed;
      --st-ready: #d97706;
      --st-out: #059669;
      --st-done: #6b7280;
      --st-cancel: #dc2626;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
      --space: 12px;
      --font-xs: 12px;
      --font-sm: 13px;
      --font-md: 14px;
      --font-lg: 15px;
      --row-h: 60px;
      --header-compact-max: 108px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 0;
      height: 100vh;
      max-height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-feature-settings: "tnum" 1;
      color: var(--txt);
      background: var(--bg);
    }
    @supports (height: 100svh) {
      body {
        height: 100svh;
        max-height: 100svh;
      }
    }
    .wrap {
      flex: 1 1 0%;
      min-height: 0;
      padding: var(--space) clamp(10px, 2vw, 14px);
      display: flex;
      flex-direction: column;
      gap: var(--space);
      box-sizing: border-box;
      overflow: hidden;
    }
    .ops-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 12px 16px;
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    body.viewport-compact .ops-bar {
      max-height: var(--header-compact-max);
      overflow: hidden;
    }
    .ops-bar-row {
      display: flex;
      align-items: center;
      gap: 8px 10px;
      min-width: 0;
    }
    .ops-bar-row--head {
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px 16px;
    }
    @media (min-width: 900px) {
      .ops-bar-row--head { flex-wrap: nowrap; }
      .ops-head-status { flex: 0 0 auto; }
      .ops-tools {
        flex: 0 0 auto;
        margin-left: auto;
        justify-content: flex-end;
      }
    }
    .ops-tools {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      align-items: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .ops-brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .ops-head-status {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .ops-brand strong { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .ops-brand small { display: none; }
    body.viewport-compact .ops-brand small { display: none; }
    .ops-clock {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.02em;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted2);
      flex: 0 0 auto;
      min-width: 6.75rem;
      text-align: center;
      box-sizing: border-box;
    }
    .ops-tools > * { flex-shrink: 0; }
    #fullscreenBtn {
      min-width: 2.75rem;
      width: 2.75rem;
      padding-left: 0;
      padding-right: 0;
      font-size: 18px;
      line-height: 1;
    }
    #saveTokenBtn {
      min-width: 6.75rem;
      white-space: nowrap;
    }
    #tokenToolsInline,
    #saveTokenBtn { display: none !important; }
    @media (max-width: 899px) {
      .ops-tools .chip:not(#focusModeBtn):not(#courierBarToggle) { padding: 8px 10px; font-size: var(--font-xs); }
      #fullscreenBtn, #settingsBtn, #langUzBtn, #langRuBtn, #soundToggle {
        min-width: 2.5rem;
        width: 2.5rem;
        padding: 8px;
      }
      .sound-tools input[type="range"]#soundVolume { width: 64px; }
    }
    #langUzBtn, #langRuBtn {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    #soundToggle {
      min-width: 2.75rem;
      padding-left: 10px;
      padding-right: 10px;
    }
    .ops-network {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      min-height: 0;
      max-height: 0;
      overflow: hidden;
      padding: 0;
    }
    .ops-network:not(:empty) {
      min-height: 1.35em;
      max-height: 2.7em;
      padding: 0 2px 2px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex: 1 1 100%;
      width: 100%;
      min-width: 0;
    }
    input, button {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--txt);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font: inherit;
      font-size: var(--font-sm);
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { background: transparent; }
    .btn-ghost:hover { background: #f3f4f6; }
    .primary {
      background: var(--acc);
      border: 1px solid transparent;
      color: #052e16;
      font-weight: 600;
    }
    .primary:hover:not(:disabled) { background: var(--acc-hover); }
    .chip {
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--muted2);
      font-size: var(--font-xs);
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }
    .chip.on {
      border-color: #86efac;
      color: #065f46;
      background: #ecfdf5;
    }
    .stats-bar {
      flex-shrink: 0;
      border: none;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 0 4px 10px;
      min-height: 0;
      box-sizing: border-box;
    }
    .stats-bar[hidden] { display: none !important; }
    .stats-inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 0;
      font-size: var(--font-sm);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .stats-inline b {
      font-weight: 600;
      color: var(--txt);
      margin-right: 4px;
    }
    .stats-sep {
      color: var(--line-strong);
      padding: 0 10px;
      user-select: none;
    }
    .courier-staff-bar {
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--card);
      padding: 8px 12px;
      min-height: 0;
      max-height: 72px;
      overflow: auto;
      box-sizing: border-box;
    }
    .courier-staff-bar[hidden] { display: none !important; }
    body:not(.courier-bar-open) .courier-staff-bar.courier-collapsible {
      display: none !important;
    }
    #courierBarToggle { display: none; }
    #courierBarToggle.is-visible { display: inline-flex; }
    .cstaff-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .cstaff-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .cstaff-chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted2);
      white-space: nowrap;
    }
    .cstaff-chip small {
      color: var(--muted);
      margin-left: 6px;
      font-weight: 600;
    }
    .stats-inner { display: contents; }
    .stat-chip { display: none; }
    .sla {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      width: fit-content;
      margin-bottom: 6px;
    }
    .sla-ok {
      color: var(--muted);
      border-color: var(--line);
      background: #f9fafb;
    }
    .sla-warn {
      color: #92400e;
      border-color: #fcd34d;
      background: #fffbeb;
    }
    .sla-hot {
      color: #991b1b;
      border-color: #fecaca;
      background: #fef2f2;
    }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .sync-pill {
      font-size: 11px;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      box-sizing: border-box;
    }
    .sync-pill--live {
      border-color: #a7f3d0;
      background: #ecfdf5;
    }
    .sync-pill__time {
      display: inline-block;
      min-width: 4.6rem;
      text-align: center;
      font-weight: 600;
    }
    .sync-pill__live {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--live);
    }
    .badge {
      padding: 5px 10px 5px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid #a7f3d0;
      color: #065f46;
      background: #ecfdf5;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-sizing: border-box;
    }
    .badge--live { }
    .badge.offline {
      border-color: #fecaca;
      color: #991b1b;
      background: #fef2f2;
    }
    .badge.offline .live-dot { background: #dc2626; }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--live);
      flex-shrink: 0;
    }
    .token-required {
      flex-shrink: 0;
      border: 1px dashed #fca5a5;
      background: #fef2f2;
      color: #991b1b;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
    }
    .orders-board {
      flex: 1 1 0%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg2);
    }
    .orders-board.is-loading { pointer-events: none; opacity: 0.85; }
    .ops-section {
      --section-accent: var(--st-new);
      border-bottom: 1px solid var(--line);
    }
    .ops-section:last-child { border-bottom: none; }
    .ops-section[data-section="new"] { --section-accent: var(--st-new); }
    .ops-section[data-section="preparing"] { --section-accent: var(--st-work); }
    .ops-section[data-section="ready"] { --section-accent: var(--st-ready); }
    .ops-section[data-section="out_for_delivery"] { --section-accent: var(--st-out); }
    .ops-section[data-section="delivered"] { --section-accent: var(--st-done); }
    .ops-section[data-section="cancelled"] { --section-accent: var(--st-cancel); }
    .ops-section__head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin: 0;
      padding: 10px 14px 10px 12px;
      border: none;
      border-bottom: 1px solid var(--line);
      background: #f3f4f6;
      color: var(--txt);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-sizing: border-box;
    }
    .ops-section__head:hover { background: #e5e7eb; }
    .ops-section__bar {
      width: 4px;
      height: 1.25rem;
      border-radius: 2px;
      background: var(--section-accent);
      flex-shrink: 0;
    }
    .ops-section__title {
      margin: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted2);
      flex: 1 1 auto;
      min-width: 0;
    }
    .ops-section__count {
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted2);
      flex-shrink: 0;
    }
    .ops-section__chev {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }
    .ops-section--collapsed .ops-section__chev { transform: rotate(-90deg); }
    .ops-section__stale {
      font-size: 10px;
      font-weight: 600;
      color: var(--warn);
      padding: 2px 6px;
      border-radius: 4px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      flex-shrink: 0;
    }
    .ops-section__body { display: block; }
    .ops-section--collapsed .ops-section__body { display: none; }
    .ops-section__empty {
      padding: 14px 16px;
      font-size: var(--font-xs);
      color: var(--muted);
      text-align: center;
    }
    .ops-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px 12px;
      min-height: var(--row-h);
      padding: 8px 14px 8px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--card);
      cursor: pointer;
      position: relative;
      box-sizing: border-box;
    }
    .ops-row::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--row-accent, var(--st-new));
      opacity: 0.85;
    }
    .ops-row:hover { background: #f9fafb; }
    .ops-row--new { --row-accent: var(--st-new); }
    .ops-row--work { --row-accent: var(--st-work); }
    .ops-row--ready { --row-accent: var(--st-ready); }
    .ops-row--out { --row-accent: var(--st-out); }
    .ops-row--done { --row-accent: var(--st-done); }
    .ops-row--cancel { --row-accent: var(--st-cancel); }
    .ops-row__main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 8px;
      min-width: 0;
      font-size: var(--font-sm);
      line-height: 1.35;
    }
    .ops-row__id {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--txt);
      flex-shrink: 0;
    }
    .ops-row__sum {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--txt);
      flex-shrink: 0;
    }
    .ops-row__dot {
      color: var(--line-strong);
      user-select: none;
      flex-shrink: 0;
    }
    .ops-row__time {
      color: var(--muted);
      font-size: var(--font-xs);
      flex-shrink: 0;
    }
    .ops-row__name {
      font-weight: 500;
      color: var(--txt);
      max-width: 12rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ops-row__phone {
      color: var(--muted2);
      font-size: var(--font-xs);
      flex-shrink: 0;
    }
    .ops-row__phone a {
      color: #2563eb;
      text-decoration: none;
    }
    .ops-row__phone a:hover { text-decoration: underline; }
    .ops-row__addr {
      color: var(--muted);
      font-size: var(--font-xs);
      min-width: 0;
      flex: 1 1 8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ops-row__end {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .ops-row__end .pill {
      font-size: 10px;
      padding: 2px 7px;
    }
    .ops-row__sla {
      margin: 0;
      font-size: 10px;
      padding: 2px 6px;
    }
    .ops-row__btn {
      min-height: 34px;
      max-height: 34px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .token-input-wrap {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--card);
      overflow: hidden;
    }
    .token-input-wrap input {
      border: none;
      border-radius: 0;
      min-width: 140px;
      max-width: 200px;
      background: transparent;
    }
    .token-input-wrap input:focus {
      outline: none;
    }
    #tokenRevealBtn {
      border: none;
      border-left: 1px solid var(--line);
      border-radius: 0;
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      background: #f9fafb;
    }
    #focusModeBtn.on {
      border-color: #86efac;
      color: #065f46;
      background: #ecfdf5;
    }
    #fullscreenBtn.primary {
      background: var(--card);
      color: var(--muted2);
      border: 1px solid var(--line);
    }
    #fullscreenBtn.primary:hover { background: #f3f4f6; color: var(--txt); }
    .settings-modal {
      width: min(420px, 100%);
    }
    .settings-modal label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .settings-modal .token-input-wrap { width: 100%; }
    .settings-modal .token-input-wrap input { max-width: none; flex: 1; }
    .pill {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #f9fafb;
      color: var(--muted2);
      text-transform: capitalize;
      letter-spacing: 0.02em;
    }
    .pill.payme { border-color: #a7f3d0; color: #065f46; background: #ecfdf5; }
    .pill.cash { border-color: #fde68a; color: #92400e; background: #fffbeb; }
    .pill.paid { border-color: #a7f3d0; background: #ecfdf5; color: #065f46; }
    .pill.unpaid { border-color: #fecaca; color: #991b1b; background: #fef2f2; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.45);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 50;
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(920px, 100%);
      max-height: 95vh;
      overflow: auto;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .modal h2 { margin: 0; font-size: 20px; flex: 1 1 auto; min-width: 0; overflow-wrap: anywhere; }
    .items { display: grid; gap: 10px; margin-top: 12px; }
    .item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 10px;
    }
    .item img { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; background: #fff; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .actions button { min-height: 52px; font-size: 16px; font-weight: 700; }
    .actions a.primary { min-height: 52px; font-size: 16px; grid-column: 1 / -1; }
    .full { grid-column: 1 / -1; }
    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      max-width: 360px;
      background: var(--bg2);
      color: var(--txt);
      border: 1px solid var(--line);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      display: none;
      z-index: 60;
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }
    .toast.err { border-color: #fecaca; color: #991b1b; background: #fef2f2; }
    .sound-tools {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sound-tools input[type="range"]#soundVolume {

      const STORAGE_KEY = 'gm_frontend_errors';
      const MAX_ITEMS = 60;
      function readSafe() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) { return []; }
      }
      function writeSafe(items) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (_) {}
      }
      function push(type, message, extra) {
        const items = readSafe();
        items.push({ type, message: String(message || 'unknown'), ts: Date.now(), extra: extra || null });
        while (items.length > MAX_ITEMS) items.shift();
        writeSafe(items);
      }
      window.addEventListener('error', (event) => {
        push('error', event?.message, { source: event?.filename, line: event?.lineno, col: event?.colno });
      });
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event?.reason;
        push('unhandledrejection', reason?.message || String(reason || 'promise rejected'));
      });

    };
    function t(key) {
      return (i18n[currentLang] || i18n.uz)[key] || key;
    }
    const STORE_LOCATION = {

    const BOARD_BP = { compact: '(max-width: 899px)' };
    const statusGroups = [
      { key: 'new', labelKey: 'colNew', colIcon: '✦', statuses: ['created', 'payment_pending', 'payment_confirmed'] },

      { key: 'cancelled', labelKey: 'colCancelled', colIcon: '✕', statuses: ['cancelled'] }
    ];
    const focusModeKey = 'gm_ops_focus';
    const collapsedSectionsKey = 'gm_ops_collapsed_sections';
    let collapsedSections = new Set(
      (() => {
        try {
          const raw = localStorage.getItem(collapsedSectionsKey);
          if (raw !== null) {
            const arr = JSON.parse(raw);
            return new Set(Array.isArray(arr) ? arr : []);
          }
        } catch (_) {}
        return new Set(['delivered', 'cancelled']);
      })()
    );
    let orders = [];
    let courierApplications = [];
    let activeOrder = null;
    const POLL_MS_FALLBACK = 3000;
    const POLL_MS_HIDDEN = 20000;
    let pollDelay = POLL_MS_FALLBACK;
    let pollTimer = null;
    let sseRetryTimer = null;
    let feedStream = null;
    let liveState = 'connecting';
    let feedApplyCount = 0;
    let isRefreshing = false;
    let lastBoardFingerprint = '';
    let lastStatsFingerprint = '';
    let columnsRenderRaf = 0;
    let courierStaffPollSkip = 0;

    function saveCollapsedSections() {
      localStorage.setItem(collapsedSectionsKey, JSON.stringify([...collapsedSections]));
    }
    function isSectionCollapsed(sectionKey) {
      if (!ACCORDION_SECTIONS.has(sectionKey)) return false;

    function toggleSectionCollapsed(sectionKey) {
      if (!ACCORDION_SECTIONS.has(sectionKey)) return;
      if (collapsedSections.has(sectionKey)) collapsedSections.delete(sectionKey);

        return Number.isFinite(ts) && Date.now() - ts > 20 * 60000;

      const compact = window.matchMedia(BOARD_BP.compact).matches;
      const saved = localStorage.getItem(focusModeKey);
      if (compact) return saved !== '0';

    function syncCourierBarToggle() {
      const toggle = document.getElementById('courierBarToggle');
      const bar = document.getElementById('courierStaffBar');
      if (!toggle || !bar) return;
      const compact = window.matchMedia(BOARD_BP.compact).matches;
      const list = Array.isArray(courierApplications) ? courierApplications : [];
      const n = list.length;
      const hasBar = !bar.hidden && n > 0;

      toggle.hidden = !visible;
      toggle.classList.toggle('is-visible', visible);
      const open = document.body.classList.contains('courier-bar-open');
      toggle.classList.toggle('on', open);

      toggle.textContent = open ? t('courierBarHide') : label;

    const allowedTransitions = {
      created: ['payment_pending', 'payment_confirmed', 'preparing', 'cancelled'],
      payment_pending: ['payment_confirmed', 'preparing', 'cancelled'],
      payment_confirmed: ['preparing', 'cancelled'],

      ready_for_courier: ['courier_assigned', 'out_for_delivery', 'cancelled'],

    };

    function normalizeStatus(status) {
      return String(status || '').trim().toLowerCase();
    }

    const SOUND_LS = 'gm_orders_sound_on';
    const SOUND_VOL_LS = 'gm_orders_sound_vol';
    let webAudioCtx = null;

    function getSoundOn() {
      return localStorage.getItem(SOUND_LS) !== '0';
    }
    function setSoundOn(on) {
      localStorage.setItem(SOUND_LS, on ? '1' : '0');
    }
    function getSoundVolume() {
      const raw = localStorage.getItem(SOUND_VOL_LS);
      if (raw === null || raw === '') return 200;
      const n = Number(raw);
      if (!Number.isFinite(n)) return 200;
      return Math.max(0, Math.min(200, Math.round(n)));
    }
    function setSoundVolume(v) {
      const n = Math.max(0, Math.min(200, Math.round(Number(v))));
      localStorage.setItem(SOUND_VOL_LS, String(n));
    }
    function syncSoundVolumeUi() {
      const range = document.getElementById('soundVolume');
      const wrap = document.querySelector('.sound-tools');
      if (range) {
        range.value = String(getSoundVolume());
        range.disabled = !getSoundOn();
        range.setAttribute('aria-label', t('soundVol'));
      }
      if (wrap) wrap.title = t('soundVol');
    }
    function syncSoundToggle() {
      const btn = document.getElementById('soundToggle');
      if (!btn) return;
      const on = getSoundOn();
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      btn.classList.toggle('on', on);
      btn.textContent = on ? 'Ovoz' : 'Sukut';
      btn.title = on ? t('soundOnLabel') : t('soundOffLabel');
      syncSoundVolumeUi();
    }
    function getAudioContext() {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      if (!webAudioCtx) webAudioCtx = new AC();
      return webAudioCtx;
    }
    /** kind 'new' = yangi buyurtma (zangdor chim); 'route' = yo'lda (muloyimroq) */
    function playBeep(kind) {
      if (!getSoundOn()) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      const drive = getSoundVolume() / 100;
      if (drive <= 0) return;
      try {
        const t0 = ctx.currentTime;
        const makeup = ctx.createGain();
        makeup.gain.value = drive * 4.75;
        makeup.connect(ctx.destination);

        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(6800, t0);
        lp.Q.setValueAtTime(0.45, t0);
        lp.connect(makeup);

        function bellPartial(start, freq, dur, peak, type) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t0 + start);
          const a = t0 + start;
          const b = a + dur;
          const p = Math.max(0.0008, peak);
          g.gain.setValueAtTime(0.0001, a);
          g.gain.exponentialRampToValueAtTime(p, a + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, b);
          osc.connect(g);
          g.connect(lp);
          osc.start(a);
          osc.stop(b + 0.03);
        }

        if (kind === 'route') {
          bellPartial(0, 196, 0.14, 0.42, 'sine');
          bellPartial(0, 392, 0.3, 0.78, 'triangle');
          bellPartial(0.06, 523.25, 0.26, 0.62, 'sine');
          bellPartial(0.12, 659.25, 0.22, 0.5, 'sine');
        } else {
          bellPartial(0, 392, 0.16, 0.52, 'sine');
          bellPartial(0, 783.99, 0.44, 1, 'triangle');
          bellPartial(0.1, 987.77, 0.38, 0.82, 'triangle');
          bellPartial(0.2, 1174.66, 0.32, 0.62, 'sine');
          bellPartial(0.32, 1318.51, 0.24, 0.44, 'sine');
        }
      } catch (_) {}
    }
    function hapticPing(kind) {
      try {
        if (typeof navigator === 'undefined' || !navigator.vibrate) return;
        if (kind === 'route') navigator.vibrate([65, 40, 95]);
        else navigator.vibrate([95, 55, 95, 55, 180]);
      } catch (_) {}
    }
    function snapshotFeed(list) {
      const arr = Array.isArray(list) ? list : [];
      return {
        ids: new Set(arr.map((o) => String(o.id))),
        status: new Map(arr.map((o) => [String(o.id), normalizeStatus(o.status)]))
      };
    }
    function notifyFeedChanges(prev, next) {
      if (!prev || !prev.ids || prev.ids.size === 0) return;
      const nextArr = Array.isArray(next) ? next : [];
      const newOnes = nextArr.filter((o) => !prev.ids.has(String(o.id)));
      if (newOnes.length) {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
        return;
      }
      let route = false;
      for (const o of nextArr) {
        const id = String(o.id);
        const nowS = normalizeStatus(o.status);
        const was = prev.status.get(id);
        if (was !== undefined && was !== nowS && nowS === 'out_for_delivery') route = true;
      }
      if (route && getSoundOn()) {
        playBeep('route');
        hapticPing('route');
      }
    }

    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')

    function moneyFmt(n) {

    function relTime(iso) {
      if (!iso) return '—';
      const ts = new Date(iso).getTime();
      if (!Number.isFinite(ts)) return '—';
      const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
      if (sec < 45) return t('relNow');
      if (sec < 3600) return t('relMin').replace('{n}', String(Math.max(1, Math.floor(sec / 60))));
      if (sec < 86400) return t('relHour').replace('{n}', String(Math.max(1, Math.floor(sec / 3600))));
      return t('relDay').replace('{n}', String(Math.max(1, Math.floor(sec / 86400))));
    }

    function slaTierFromCreated(ts) {
      if (!Number.isFinite(ts)) return { mins: 0, tier: 'sla-ok' };
      const mins = Math.floor((Date.now() - ts) / 60000);
      let tier = 'sla-ok';
      if (mins >= 45) tier = 'sla-hot';
      else if (mins >= 15) tier = 'sla-warn';
      return { mins, tier };
    }
    function formatSlaLabel(mins) {
      const m = Math.max(0, Math.floor(Number(mins) || 0));
      if (m < 90) return t('slaMins').replace('{n}', String(m));
      if (m < 1440) return t('slaHours').replace('{n}', String(Math.floor(m / 60)));
      return t('slaDays').replace('{n}', String(Math.floor(m / 1440)));
    }
    function slaBlockHtml(o) {
      const st = normalizeStatus(o.status);
      if (st === 'delivered' || st === 'cancelled') return '';
      const raw = o.created_at;
      if (!raw) return '';
      const ts = new Date(raw).getTime();
      if (!Number.isFinite(ts)) return '';
      const { mins, tier } = slaTierFromCreated(ts);
      if (tier === 'sla-ok') return '';
      const label = formatSlaLabel(mins);
      return `<div class="sla-live sla ${tier}" data-created-ts="${ts}">${escapeHtml(label)}</div>`;
    }
    function tickLiveLabels() {
      document.querySelectorAll('.sla-live[data-created-ts]').forEach((el) => {
        const ts = Number(el.dataset.createdTs);
        const { mins, tier } = slaTierFromCreated(ts);
        if (tier === 'sla-ok') {
          el.remove();
          return;
        }
        el.textContent = formatSlaLabel(mins);
        el.className = `sla-live sla ${tier}`;

    function buildStatsFingerprint(list) {
      const arr = Array.isArray(list) ? list : [];
      if (!arr.length) return '0';
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const today = arr.filter((o) => new Date(o.created_at || 0) >= start);
      const active = arr.filter((o) => !['delivered', 'cancelled'].includes(normalizeStatus(o.status)));
      const sum = (xs) => xs.reduce((s, o) => s + Number(o.total || 0), 0);
      return `${arr.length}:${today.length}:${active.length}:${sum(arr)}:${sum(today)}`;
    }
    function buildBoardFingerprint() {
      return getFilteredOrders()
        .map((o) => {
          const next = getNextTransition(o);
          return [
            o.id,
            normalizeStatus(o.status),
            o.total || 0,
            o.courierName || '',
            o.paymentStatus || '',
            o.paymentMethod || '',
            (o.items || []).length,
            next ? next.to : ''
          ].join(':');
        })
        .sort()
        .join('|');
    }

        if (tb !== ta) return tb - ta;
        return String(b.id || '').localeCompare(String(a.id || ''));
      });
    }

    function stopLiveFeed() {
      if (feedStream) {
        feedStream.close();
        feedStream = null;
      }
    }

    function schedulePollFallback() {
      clearTimeout(pollTimer);
      if (document.hidden) return;
      pollTimer = setTimeout(() => refresh({ silent: true }), pollDelay);
    }

    function scheduleSseRetry() {
      if (sseRetryTimer || document.hidden) return;
      sseRetryTimer = setTimeout(() => {
        sseRetryTimer = null;
        if (!document.hidden && liveState !== 'live') startLiveFeed();
      }, 12000);
    }

    function startLiveFeed() {
      stopLiveFeed();
      if (document.hidden) {
        setLiveStatus('paused');
        return;
      }
      if (typeof EventSource === 'undefined') {
        setLiveStatus('offline');
        schedulePollFallback();
        return;
      }
      setLiveStatus('connecting');
      feedStream = new EventSource('/api/v1/orders-display/stream');
      feedStream.addEventListener('feed', (ev) => {
        try {
          const data = JSON.parse(ev.data);
          applyFeedFromServer(Array.isArray(data.orders) ? data.orders : [], 'display-stream');
        } catch (_) {
          /* ignore malformed chunk */
        }
      });
      feedStream.addEventListener('error', () => {
        /* server error event */
      });
      feedStream.onopen = () => {
        clearTimeout(pollTimer);
        setLiveStatus('live', 'SSE');
      };
      feedStream.onerror = () => {
        stopLiveFeed();
        setLiveStatus('offline');
        pollDelay = POLL_MS_FALLBACK;
        schedulePollFallback();
        scheduleSseRetry();
      };
    }

    function applyFeedFromServer(list, source) {

      const prevColFp = buildBoardFingerprint();
      orders = list || [];
      notifyFeedChanges(prev, orders);
      renderStatsBar();
      feedApplyCount += 1;
      if (feedApplyCount % 5 === 0) loadCourierStaff();
      const nextColFp = buildBoardFingerprint();
      if (prevColFp === nextColFp && lastBoardFingerprint === nextColFp) {
        patchRowsLiveMeta();
      } else {
        lastBoardFingerprint = '';
        scheduleRenderBoard();
      }
      if (activeOrder) {
        const upd = orders.find((o) => o.id === activeOrder.id);
        if (upd) renderModal(upd);
      }
      document.getElementById('network').textContent =
        source === 'display-stream' || source === 'display-feed'
          ? ''
          : 'Display feed mavjud emas, admin feed ishlatilmoqda';
      if (liveState !== 'paused') setLiveStatus('live', source);
    }

            ${group.items.length ? group.items.map((o) => renderOrderRow(o)).join('') : `<p class="ops-section__empty">${escapeHtml(t('colEmpty'))}</p>`}
          </div>
        </section>`;
        })
        .join('');
      restoreBoardScroll(scrollTop);
    }
    const renderColumnsNow = renderBoardNow;

    function renderModal(order) {
      activeOrder = order;
      const status = normalizeStatus(order.status);
      document.getElementById('mOrderTitle').textContent = `${t('order')} #${order.orderNumber || order.id}`;
      const mapLink = (Number.isFinite(Number(order.locationLat)) && Number.isFinite(Number(order.locationLng)))
        ? `https://maps.google.com/?q=${order.locationLat},${order.locationLng}` : '';
      const courierMapLink = (Number.isFinite(Number(order.courierLocationLat)) && Number.isFinite(Number(order.courierLocationLng)))
        ? `https://maps.google.com/?q=${order.courierLocationLat},${order.courierLocationLng}` : '';
      document.getElementById('mMeta').innerHTML = `${escapeHtml(String(order.customerName || '').trim() || t('guest'))} | ${escapeHtml(
        String(order.customerPhone || '-').trim()
      )} | ${escapeHtml(
        String(order.customerAddress || order.addressText || order.location || '-').trim()
      )}<br>Orientir: ${escapeHtml(String(order.landmarkText || '-').trim())}${
        mapLink ? ` | <a href="${escapeHtml(mapLink)}" target="_blank" rel="noopener">Map</a>` : ''
      }<br>Do‘kon manzili: <a href="${escapeHtml(STORE_LOCATION.mapsUrl)}" target="_blank" rel="noopener">${escapeHtml(
        STORE_LOCATION.name
      )}</a><br>Status: ${escapeHtml(String(order.statusLabel || orderStatusLabel(order.status)))}<br>To‘lov: ${escapeHtml(
        String(order.paymentMethod || '-')
      )} / ${escapeHtml(String(order.paymentStatusLabel || order.paymentStatus || '-'))}<br>Cash agreement: ${
        order.cashAgreementAccepted ? 'ha' : 'yo‘q'
      }<br>${
        order.paymentProofUrl
          ? `<a href="${escapeHtml(String(order.paymentProofUrl))}" target="_blank" rel="noopener">Payment proof</a>`
          : 'Payment proof: -'
      }<br>${
        order.courierLocationUpdatedAt
          ? `Kurier joylashuvi: yangilangan ${escapeHtml(fmt(order.courierLocationUpdatedAt))}`
          : 'Kurier joylashuvi: -'
      }${
        courierMapLink
          ? ` | <a href="${escapeHtml(courierMapLink)}" target="_blank" rel="noopener">Xaritada ko‘rish</a>`
          : ''
      }`;
      document.getElementById('mItems').innerHTML = (order.items || []).map((it) => `
        <div class="item">
          ${it.image_url ? `<img src="${escapeHtml(String(it.image_url))}" alt="${escapeHtml(String(it.name || ''))}" />` : `<img alt="" />`}
          <div>
            <div><b>${escapeHtml(String(it.name || '-'))}</b></div>
            <div class="muted">qty: ${escapeHtml(String(it.quantity || 0))} · narx: ${Number(it.price||0).toLocaleString('ru-RU')} so'm</div>
            <div class="muted">stock: ${Number(it.stock || 0)}</div>
          </div>
          <div><strong>${Number(it.subtotal || 0).toLocaleString('ru-RU')} so'm</strong></div>
        </div>
      `).join('');

      const actions = [];
      const courierTok = String(order.courierToken || '').trim();
      if (courierTok && !['delivered', 'cancelled'].includes(status)) {
        const href = `${window.location.origin}/courier/${encodeURIComponent(courierTok)}`;
        actions.push(
          `<a class="primary" href="${escapeHtml(href)}" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:52px;border-radius:12px;font-weight:700;">${escapeHtml(
            t('courierAppLink')
          )}</a>`
        );
      }
      const next = getNextTransition(order);
      if (next) {
        actions.push(
          `<button type="button" class="primary" data-next="${escapeHtml(String(next.to))}">${escapeHtml(
            String(next.label)
          )}</button>`
        );
      }
      if (status !== 'delivered' && status !== 'cancelled') {
        actions.push('<button type="button" class="full" data-cancel="1">Bekor qilish</button>');
      }
      if (status === 'out_for_delivery') {
        actions.push(
          `<button type="button" disabled class="full">Kurierda: ${escapeHtml(
            String(order.courierName || '-').trim()
          )} ${escapeHtml(String(order.courierPhone || '').trim())}</button>`
        );
      }
      if (status === 'delivered') {
        actions.push('<button type="button" disabled class="full">Yetkazildi</button>');
      }
      document.getElementById('mActions').innerHTML = actions.join('');
      document.getElementById('modalOverlay').classList.add('show');
    }

    async function transitionOrder(orderId, nextStatus) {
      const target = orders.find((o) => String(o.id) === String(orderId));
      if (!target) throw new Error('Order topilmadi');
      const currentStatus = normalizeStatus(target.status);
      const targetStatus = normalizeStatus(nextStatus);
      const allowed = allowedTransitions[currentStatus] || [];
      if (!allowed.includes(targetStatus)) throw new Error(`Mumkin bo‘lmagan status o‘tishi: ${currentStatus} -> ${targetStatus}`);
      const previous = orders.map((o) => ({ ...o }));
      const now = new Date().toISOString();
      orders = orders.map((o) => String(o.id) === String(orderId) ? { ...o, status: targetStatus, updated_at: now } : o);
      renderStatsBar();
      renderColumns();
      try {
        await api(`/admin/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status: targetStatus }) });
        showToast(`${t('statusUpdated')}: ${targetStatus}`);
        await refresh({ silent: true });
      } catch (err) {
        orders = previous;
        renderStatsBar();
        renderColumns();
        await refresh({ silent: true });
        throw err;
      }
    }

    async function printReceipt(order) {
      const qr = await api(`/admin/orders/${order.id}/qr`);
      if (!qr.qrDataUrl) throw new Error('QR render bo‘lmadi');
      const w = window.open('', '_blank', 'width=420,height=700');
      if (!w) throw new Error('Print oynasi ochilmadi');
      const rows = (order.items || []).map((it)=>`<tr><td>${it.name||''}</td><td>${it.quantity||0}</td><td>${Number(it.price||0).toLocaleString('ru-RU')}</td><td>${Number(it.subtotal||0).toLocaleString('ru-RU')}</td></tr>`).join('');
      w.document.write(`
        <html><head><title>Chek</title><style>
          body{font-family:Arial;font-size:12px;width:58mm;max-width:58mm;margin:0 auto}
          table{width:100%;border-collapse:collapse}td{padding:2px 0;border-bottom:1px dashed #ccc;vertical-align:top}
          .center{text-align:center}
          .qr{width:150px;height:150px;object-fit:contain}
          @media print { body{width:58mm} }
        </style></head><body>
        <h3 class="center">GlobusMarket</h3>
        <div>Order: ${order.orderNumber}</div>
        <div>Sana: ${new Date().toLocaleString('ru-RU')}</div>
        <div>Mijoz: ${order.customerName||'-'}</div>
        <div>Tel: ${order.customerPhone||'-'}</div>
        <div>Manzil: ${order.customerAddress||order.location||'-'}</div>
        <table><tr><td><b>Nomi</b></td><td><b>Soni</b></td><td><b>Narx</b></td><td><b>Sum</b></td></tr>${rows}</table>
        <h4>Jami: ${Number(order.total||0).toLocaleString('ru-RU')} so'm</h4>
        <div>Status: ${order.status}</div>
        <div class="center" style="margin-top:8px;"><img id="receiptQr" class="qr" src="${qr.qrDataUrl}" alt="courier qr" /></div>
        <div class="center" style="font-size:11px;margin-top:4px;">Kurier buyurtmani qabul qilish uchun QR kodni skaner qiling</div>
        <div style="word-break:break-all;font-size:10px;margin-top:4px;">${qr.courierUrl}</div>
        </body></html>
      `);
      w.document.close();
      const img = w.document.getElementById('receiptQr');
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('QR render bo‘lmadi')), 2500);
        img.onload = () => { clearTimeout(timeout); resolve(); };
        img.onerror = () => { clearTimeout(timeout); reject(new Error('QR render bo‘lmadi')); };
      });
      w.focus();
      w.print();
    }

    async function loadDisplayOrders() {
      try {
        const { orders: feedOrders } = await fetch('/api/v1/orders-display/feed', {
          headers: { 'Content-Type': 'application/json' }
        }).then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || 'Display feed error');
          return data;
        });
        return { orders: Array.isArray(feedOrders) ? feedOrders : [], source: 'display-feed' };
      } catch (_) {
        const { orders: adminOrders } = await api('/admin/orders');
        return { orders: Array.isArray(adminOrders) ? adminOrders : [], source: 'admin-feed' };
      }
    }

    async function refresh({ silent = false } = {}) {
      if (isRefreshing) return;
      isRefreshing = true;
      const boardEl = document.getElementById('ordersBoard');
      if (boardEl && !silent) boardEl.classList.add('is-loading');
      const token = getToken();
      document.getElementById('tokenRequired').style.display = 'none';
      try {
        const { orders: list, source } = await loadDisplayOrders();
        courierStaffPollSkip += 1;
        if (courierStaffPollSkip % 5 === 0) await loadCourierStaff();
        applyFeedFromServer(list, source);
        pollDelay = document.hidden ? POLL_MS_HIDDEN : POLL_MS_FALLBACK;
      } catch (e) {
        document.getElementById('tokenRequired').style.display = token ? 'none' : 'block';
        setLiveStatus('offline');
        document.getElementById('network').textContent = token ? 'Aloqa uzildi, qayta ulanmoqda...' : 'Display uchun token yoki server aloqasi kerak';
        if (!silent) showToast(e.message || t('refreshError'), true);
        pollDelay = Math.min(12000, Math.round(pollDelay * 1.5));
        scheduleSseRetry();
      } finally {
        if (boardEl) boardEl.classList.remove('is-loading');
        isRefreshing = false;
        if (liveState === 'live' && feedStream) {
          clearTimeout(pollTimer);
        } else {
          schedulePollFallback();
        }
      }
    }

    document.getElementById('tokenInput').value = getToken();
    document.getElementById('tokenRevealBtn').onclick = () => {
      const inp = document.getElementById('tokenInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      syncTokenRevealUi();
    };
    function persistToken(val) {
      localStorage.setItem(tokenKey, val);
      syncSettingsTokenFields();
      const inp = document.getElementById('tokenInput');
      if (inp) {
        inp.value = val;
        inp.type = 'password';
      }
      syncTokenRevealUi();
      refresh();
    }
    document.getElementById('saveTokenBtn').onclick = () => {
      persistToken(document.getElementById('tokenInput').value.trim());
    };
    document.getElementById('saveTokenSettingsBtn').onclick = () => {
      persistToken(document.getElementById('tokenInputSettings').value.trim());
      closeSettings();
    };
    document.getElementById('settingsBtn').onclick = () => openSettings();
    document.getElementById('closeSettings').onclick = () => closeSettings();
    document.getElementById('settingsOverlay').onclick = (e) => {
      if (e.target.id === 'settingsOverlay') closeSettings();
    };
    document.getElementById('tokenRevealSettingsBtn').onclick = () => {
      const inp = document.getElementById('tokenInputSettings');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    };
    document.getElementById('focusModeBtn').onclick = () => {
      setFocusMode(!document.body.classList.contains('mode-focus'));
    };
    document.getElementById('courierBarToggle').onclick = () => {
      document.body.classList.toggle('courier-bar-open');
      syncCourierBarToggle();
    };

    document.getElementById('fullscreenBtn').onclick = async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(()=>{});
      else await document.exitFullscreen().catch(()=>{});
    };

    document.getElementById('soundToggle').onclick = () => {
      setSoundOn(!getSoundOn());
      syncSoundToggle();
      if (getSoundOn()) {
        const ctx = getAudioContext();
        if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        playBeep('new');
        hapticPing('new');
      }
    };

    (function bindSoundVolume() {
      const el = document.getElementById('soundVolume');
      if (!el) return;
      el.addEventListener('input', (e) => {
        setSoundVolume(e.target.value);
      });
      el.addEventListener('change', () => {
        if (getSoundOn()) {
          playBeep('new');
          hapticPing('new');
        }
      });
    })();

    document.getElementById('ordersBoard').onclick = (e) => {
      const sectionBtn = e.target.closest('[data-section-toggle]');
      if (sectionBtn) {
        e.preventDefault();
        toggleSectionCollapsed(sectionBtn.dataset.sectionToggle);
        lastBoardFingerprint = '';
        scheduleRenderBoard();
        return;
      }
      const quickBtn = e.target.closest('[data-quick-next]');
      if (quickBtn) {
        e.preventDefault();
        e.stopPropagation();
        if (quickBtn.disabled) return;
        const orderId = quickBtn.dataset.orderId;
        const prevText = quickBtn.textContent;
        quickBtn.disabled = true;
        quickBtn.textContent = t('loading');
        transitionOrder(orderId, quickBtn.dataset.quickNext).catch((err) => {
          showToast(err.message || t('statusChangeError'), true);
        }).finally(() => {
          quickBtn.disabled = false;
          quickBtn.textContent = prevText;
        });
        return;
      }
      const card = e.target.closest('[data-order-id]');
      if (!card) return;
      const order = orders.find((o) => o.id === card.dataset.orderId);
      if (order) renderModal(order);
    };

    document.getElementById('closeModal').onclick = () => {
      activeOrder = null;
      document.getElementById('modalOverlay').classList.remove('show');
    };

    document.getElementById('mActions').onclick = async (e) => {
      const btn = e.target.closest('button');
      if (!btn || !activeOrder) return;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = t('loading');
      try {
        if (btn.dataset.next) {
          await transitionOrder(activeOrder.id, btn.dataset.next);
        } else if (btn.dataset.cancel) {
          await api(`/admin/orders/${activeOrder.id}/cancel`, { method: 'POST' });
          showToast('Buyurtma bekor qilindi');
        } else if (btn.dataset.tsd) {
          await api(`/admin/orders/${activeOrder.id}/send-to-tsd`, { method: 'POST' });
        } else if (btn.dataset.print) {
          await printReceipt(activeOrder);
        }
        await refresh({ silent: true });
      } catch (err) {
        showToast(err.message || 'Xatolik', true);
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    };

    (function startOpsClock() {
      const tick = () => {
        const el = document.getElementById('clock');
        if (!el) return;
        const loc = currentLang === 'ru' ? 'ru-RU' : 'uz-UZ';
        el.textContent = new Date().toLocaleTimeString(loc, {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
      };
      tick();
      setInterval(tick, 1000);
    })();

    setInterval(tickLiveLabels, 30000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopLiveFeed();
        clearTimeout(pollTimer);
        clearTimeout(sseRetryTimer);
        sseRetryTimer = null;
        setLiveStatus('paused');
      } else {
        pollDelay = POLL_MS_FALLBACK;
        startLiveFeed();
        refresh({ silent: true });
      }
    });

    document.getElementById('filterChips').addEventListener('click', (e) => {
      const b = e.target.closest('[data-filter]');
      if (!b) return;
      const k = b.dataset.filter;
      if (!Object.prototype.hasOwnProperty.call(viewFilters, k)) return;
      viewFilters[k] = !viewFilters[k];
      if (k === 'payme' && viewFilters.payme) viewFilters.cash = false;
      if (k === 'cash' && viewFilters.cash) viewFilters.payme = false;
      renderFilterChips();
      lastBoardFingerprint = '';
      scheduleRenderBoard();
    });

    document.getElementById('langUzBtn').onclick = () => { currentLang = 'uz'; localStorage.setItem(langKey, currentLang); applyLang(); };
    document.getElementById('langRuBtn').onclick = () => { currentLang = 'ru'; localStorage.setItem(langKey, currentLang); applyLang(); };
    window.addEventListener('resize', () => {
      syncViewportChrome();
    });
    applyLang();
    syncViewportChrome();
    setFocusMode(resolveFocusMode());
    startLiveFeed();
    refresh({ silent: true });
  </script>
</body>
</html>
